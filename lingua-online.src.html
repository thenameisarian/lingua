<style>
  :root{--teal:#0f9d8e;--teal-dark:#0b7d72;--teal-soft:#e6f6f3;--ink:#16302c;--muted:#6b8480;--line:#e4ecea;--bg:#f4f8f7;--rose:#e85d6b;--amber:#f0a020;--blue:#3b82c4;--violet:#7b6cf6;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;min-height:100vh}
  h1,h2{font-family:'Lora',serif}
  .wrap{max-width:500px;margin:0 auto;min-height:100vh;padding:16px 16px 40px;position:relative;z-index:2}
  .eyebrow{text-transform:uppercase;letter-spacing:.14em;font-size:11px;font-weight:700;color:var(--teal);margin-bottom:6px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 6px 22px rgba(16,60,55,.06);padding:18px;margin-bottom:14px;color:var(--ink)}
  .btn{border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:15px;border-radius:13px;padding:13px 16px;background:var(--teal);color:#fff;width:100%;box-shadow:0 4px 12px rgba(15,157,142,.25)}

  .btn.row{display:flex;gap:10px}.btn.row>*{flex:1}
  .btn:disabled{opacity:.55;cursor:default}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .chips{display:flex;gap:10px;font-weight:700;font-size:14px}
  .progress-top{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .x{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)}
  .bar{flex:1;height:9px;background:var(--line);border-radius:99px;overflow:hidden}.bar>i{display:block;height:100%;background:var(--teal);transition:width .3s}
  .tag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#fff;padding:3px 8px;border-radius:99px}
  .tag.out{background:var(--amber)}.tag.in{background:var(--blue)}.tag.say{background:var(--teal)}.tag.voc{background:var(--violet)}
  .chunk{font-family:'Lora';font-size:25px;font-weight:700;line-height:1.3;margin:6px 0}
  .use{color:var(--muted);font-size:14px;margin-top:6px}
  .eg{background:var(--teal-soft);border-radius:11px;padding:11px 13px;margin-top:12px;font-size:15px}
  .passage{font-size:17px;line-height:1.75}.passage b{color:var(--teal-dark)}
  .q{font-family:'Lora';font-size:20px;font-weight:600;margin:6px 0}
  .choices{display:flex;flex-direction:column;gap:9px;margin-top:14px}
  .choice{padding:13px;border:1.5px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;font-weight:600;text-align:left;font-size:15px}

  input,textarea,select{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:12px;font:inherit;font-size:15px;margin-top:10px;background:#fff}
  textarea{min-height:90px} input:focus,textarea:focus,select:focus{outline:none;border-color:var(--teal)}
  .mic{width:74px;height:74px;border-radius:50%;border:none;background:var(--teal);color:#fff;font-size:28px;cursor:pointer;margin:14px auto 4px;display:block;box-shadow:0 6px 16px rgba(15,157,142,.35)}
  .mic.rec{background:var(--rose);animation:pp 1s infinite}@keyframes pp{0%{box-shadow:0 0 0 0 rgba(232,93,107,.5)}70%{box-shadow:0 0 0 14px rgba(232,93,107,0)}100%{box-shadow:0 0 0 0 rgba(232,93,107,0)}}
  .stars{font-size:22px;text-align:center}
  .heard{background:#f0f4f3;border-radius:10px;padding:9px 11px;font-size:14px;margin-top:8px}.heard b{color:var(--teal-dark)}
  .dline{display:flex;gap:10px;margin:7px 0}.dline .who{font-weight:700;color:var(--teal);width:20px}
  .fb{border-radius:10px;padding:10px 12px;font-weight:600;margin-top:12px}.fb.ok{background:#e9f8f0;color:var(--teal-dark)}.fb.no{background:#fdeef0;color:var(--rose)}
  .row-item{display:flex;align-items:center;gap:12px;cursor:pointer}.dot{width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:20px;background:var(--teal-soft)}
  .meta{flex:1}.meta b{font-size:15px}.meta small{color:var(--muted);display:block;font-size:12px}
  .big{font-size:48px;text-align:center}.center{text-align:center}.muted{color:var(--muted)}
  .grade-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
  .grade{padding:11px 4px;border-radius:12px;border:1.5px solid var(--line);background:#fff;cursor:pointer;font-weight:700;font-size:13px;text-align:center}
  .grade small{display:block;font-weight:500;font-size:10px;color:var(--muted)}
  .timer{font-family:'Lora';font-size:40px;text-align:center;margin:10px 0}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--teal-soft);color:var(--teal-dark)}
  .why{font-size:12px;color:var(--muted);background:#fff;border:1px dashed #cdded9;border-radius:11px;padding:10px;margin-top:10px}.why b{color:var(--teal-dark)}
  .status{font-weight:700;color:var(--muted)}
  .code{font-family:ui-monospace,Menlo,monospace;font-size:20px;font-weight:800;letter-spacing:.16em;color:var(--teal-dark);background:var(--teal-soft);padding:8px 12px;border-radius:10px;display:inline-block}
  table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;color:var(--muted);font-weight:600;padding-bottom:4px}td{padding:7px 0;border-top:1px solid var(--line)}
  .brand{font-family:'Lora';font-weight:700;font-size:26px;text-align:center;color:var(--teal-dark)}
  .aurora,.wall,.grain{display:none}
  body.wallon{background:radial-gradient(120% 120% at 50% 0%,#0c2e29,#04201c 70%);color:#eafdf8}
  body.wallon .aurora,body.wallon .wall,body.wallon .grain{display:block}
  body.wallon .top>div:first-child{color:#eafdf8} body.wallon .muted{color:#9fc7bf}
  body.wallon .brand{color:#eafdf8}
  .aurora,.aurora::before{position:fixed;inset:-30%;z-index:-2;content:""}
  .aurora{background:radial-gradient(40% 50% at 20% 25%,rgba(31,182,166,.55),transparent 60%),radial-gradient(45% 55% at 80% 20%,rgba(22,160,106,.45),transparent 60%),radial-gradient(50% 50% at 65% 80%,rgba(64,224,208,.40),transparent 60%),radial-gradient(40% 45% at 30% 85%,rgba(20,120,140,.45),transparent 60%);filter:blur(20px);animation:drift 22s ease-in-out infinite alternate}
  .aurora::before{background:radial-gradient(35% 40% at 70% 35%,rgba(120,255,220,.30),transparent 60%),radial-gradient(40% 45% at 25% 60%,rgba(31,182,166,.35),transparent 60%);animation:drift2 28s ease-in-out infinite alternate}
  @keyframes drift{0%{transform:translate(0,0) scale(1) rotate(0)}50%{transform:translate(4%,-3%) scale(1.1) rotate(4deg)}100%{transform:translate(-3%,4%) scale(1.05) rotate(-3deg)}}
  @keyframes drift2{0%{transform:translate(0,0) scale(1.1)}100%{transform:translate(5%,-5%) scale(1)}}
  .grain{position:fixed;inset:0;z-index:-1;opacity:.05;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.6) .5px,transparent .5px);background-size:3px 3px}
  .wall{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none}
  .appx{pointer-events:auto;text-decoration:none;display:flex;align-items:center;justify-content:center;position:absolute;opacity:.45;filter:saturate(.72);transition:opacity .2s,transform .2s}
  .appx:hover{opacity:1;filter:saturate(1);transform:scale(1.12);z-index:2}
  .appx .tile{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;border:1px solid rgba(255,255,255,.18);box-shadow:0 10px 22px -12px rgba(0,0,0,.7)}
  .appx .tile svg{width:24px;height:24px}.appx .tile img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
  @media(max-width:560px){.appx{opacity:.35}}
</style>

let _ac;function beep(freq,ms){try{_ac=_ac||new (window.AudioContext||window.webkitAudioContext)();if(_ac.state==='suspended')_ac.resume();const o=_ac.createOscillator(),g=_ac.createGain();o.type='sine';o.frequency.value=freq||760;o.connect(g);g.connect(_ac.destination);const t=_ac.currentTime;g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.3,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+((ms||220)/1000));o.start(t);o.stop(t+((ms||220)/1000)+0.02);}catch(e){}}

function listen(onR,onE){if(!SRsup){onE&&onE(null);return null;}const r=new SRsup();r.lang='en-US';r.interimResults=false;r.onresult=e=>onR(e.results[0][0].transcript);r.onerror=()=>onE&&onE('e');r.onend=()=>onE&&onE('d');try{r.start();}catch(e){}return r;}
function matchScore(t,s){const T=norm(t).split(' ').filter(Boolean),H=norm(s).split(' ').filter(Boolean);if(!T.length)return 0;let m=0,p=[...H];T.forEach(w=>{const i=p.indexOf(w);if(i>=0){m++;p.splice(i,1);}});return m/T.length;}
const stars=r=>{const n=r>=.85?3:r>=.6?2:r>=.3?1:0;return '★'.repeat(n)+'☆'.repeat(3-n);};
function esc(s){return (s||'').replace(/'/g,"\\'");}
function escH(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){return new Date().toISOString().slice(0,10);}
function toast(m){const d=document.createElement('div');d.style.cssText='position:fixed;left:50%;top:18px;transform:translateX(-50%);z-index:130;background:#0c2a26;color:#eafdf8;padding:9px 15px;border-radius:12px;font-weight:600;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4)';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2000);}

/* FSRS-5 */
const FSRS_W=[0.40255,1.18385,3.173,15.69105,7.1949,0.5345,1.4604,0.0046,1.54575,0.1192,1.01925,1.9395,0.11,0.29605,2.2698,0.2315,2.9898,0.51655,0.6621];
const DECAY=-0.5, FACTOR=Math.pow(0.9,1/DECAY)-1, REQ=0.9;
const clampD=d=>Math.min(10,Math.max(1,d));
function fsrsInitD(g){return clampD(FSRS_W[4]-Math.exp(FSRS_W[5]*(g-1))+1);}
function fsrsInitS(g){return Math.max(0.1,FSRS_W[g-1]);}
function ivlFromS(S){return Math.max(1,Math.round(S/FACTOR*(Math.pow(REQ,1/DECAY)-1)));}
function fsrsReview(card,g,nowMs){nowMs=nowMs||Date.now();
  if(!card||!card.S){const S=fsrsInitS(g),D=fsrsInitD(g);const ivl=ivlFromS(S);return {S,D,ivl,due:nowMs+ivl*864e5,reps:1,lapses:g===1?1:0,last:nowMs};}
  const t=Math.max(0,(nowMs-card.last)/864e5);const R=Math.pow(1+FACTOR*t/card.S,DECAY);
  let D=card.D-FSRS_W[6]*(g-3);D=clampD(FSRS_W[7]*fsrsInitD(4)+(1-FSRS_W[7])*D);let S;
  if(g===1){S=FSRS_W[11]*Math.pow(D,-FSRS_W[12])*(Math.pow(card.S+1,FSRS_W[13])-1)*Math.exp(FSRS_W[14]*(1-R));S=Math.min(S,card.S);}
  else{const hard=g===2?FSRS_W[15]:1,easy=g===4?FSRS_W[16]:1;S=card.S*(1+Math.exp(FSRS_W[8])*(11-D)*Math.pow(card.S,-FSRS_W[9])*(Math.exp(FSRS_W[10]*(1-R))-1)*hard*easy);}
  S=Math.max(0.1,S);const ivl=ivlFromS(S);return {S,D,ivl,due:nowMs+ivl*864e5,reps:(card.reps||0)+1,lapses:(card.lapses||0)+(g===1?1:0),last:nowMs};}

/* gamification */
const LV=[0,50,150,300,500,800,1200,1800,2600,3600,5000];
const LVNAME=['Newcomer','Beginner','Explorer','Talker','Connector','Achiever','Confident','Advanced','Fluent','Expert','Master'];
function levelInfo(){const xp=S.xp;let l=0;for(let i=0;i<LV.length;i++){if(xp>=LV[i])l=i;}const cur=LV[l],next=LV[l+1];const need=next?next-cur:0;const into=xp-cur;const pct=need?Math.min(100,Math.round(into/need*100)):100;return {level:l,name:LVNAME[l],pct,into,need};}
const BADGES=[
 {id:'first',ic:'🌱',t:'First steps',d:'Finish your first unit',f:S=>Object.keys(S.unitsDone).length>=1},

function buildWall(){const wall=$('wall');if(!wall)return;
  function node(a){const el=document.createElement('a');el.href=a.url;el.target='_blank';el.rel='noopener';el.className='appx';
    const tile=document.createElement('span');tile.className='tile';tile.style.background=a.color||'#0c2a26';
    if(a.logo){const img=document.createElement('img');img.alt=a.name;img.loading='lazy';const fb='https://www.google.com/s2/favicons?domain='+a.logo+'&sz=128';img.src='https://'+a.logo+'/apple-touch-icon.png';img.onerror=function(){this.onerror=null;this.src=fb;};tile.appendChild(img);}
    else if(a.icon){tile.innerHTML=WALL_ICONS[a.icon];}else{tile.innerHTML='<span style="font-size:15px">'+(a.mono||'')+'</span>';}
    el.appendChild(tile);return el;}
  wall.innerHTML='';const mob=innerWidth<560,cell=mob?64:92,jit=mob?12:26;let i=0;
  const cols=Math.ceil(innerWidth/cell)+1,rows=Math.ceil(innerHeight/cell)+1;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const a=WALL_APPS[i%WALL_APPS.length];i++;const n=node(a);
    const x=c*cell+(Math.random()*2-1)*jit+(r%2?cell/2:0),y=r*cell+(Math.random()*2-1)*jit;
    n.style.left=Math.round(x)+'px';n.style.top=Math.round(y)+'px';
    const sz=mob?(34+Math.round(Math.random()*8)):(44+Math.round(Math.random()*16));const t=n.querySelector('.tile');t.style.width=sz+'px';t.style.height=sz+'px';wall.appendChild(n);}}
let _ww=innerWidth;addEventListener('resize',()=>{if(!document.body.classList.contains('wallon'))return;if(Math.abs(innerWidth-_ww)<60)return;_ww=innerWidth;buildWall();});
function wallOn(){document.body.classList.add('wallon');buildWall();}
function wallOff(){document.body.classList.remove('wallon');}

async function doLogin(){const em=$('em').value.trim(),pw=$('pw').value;$('ago').disabled=true;$('aerr').textContent='';

  await route();}
async function doSignup(){const em=$('em').value.trim(),pw=$('pw').value,nm=$('nm').value.trim(),role=$('role').value;
  if(!nm){$('aerr').textContent='Please enter your name.';return;}
  $('ago').disabled=true;$('aerr').textContent='';

    localStorage.setItem('lingua_pending',JSON.stringify({name:nm,role}));return;}
  await SUPA.from('lingua_profiles').upsert({id:data.user.id,name:nm,role});

async function route(){
  const {data:{user}}=await SUPA.auth.getUser();
  if(!user){authScreen();return;}
  CTX.user=user;
  let prof=(await SUPA.from('lingua_profiles').select('*').eq('id',user.id).maybeSingle()).data;
  if(!prof){const pend=localStorage.getItem('lingua_pending');const p=pend?JSON.parse(pend):{name:(user.email||'').split('@')[0],role:'student'};
    await SUPA.from('lingua_profiles').upsert({id:user.id,name:p.name,role:p.role});localStorage.removeItem('lingua_pending');
    prof={id:user.id,name:p.name,role:p.role};}
  CTX.role=prof.role;CTX.name=prof.name;CTX.placed=prof.placed_level||null;
  if(prof.role==='admin'){adminHome();return;}
  if(prof.role==='teacher'){teacherHome();return;}
  const enr=(await SUPA.from('lingua_enrollments').select('class_id,lingua_classes(id,name,level)').eq('student_id',user.id).limit(1)).data;
  if(enr&&enr.length&&enr[0].lingua_classes){const c=enr[0].lingua_classes;CTX.classId=c.id;CTX.className=c.name;CTX.level=c.level;await hydrate();home();}
  else if(!prof.placed_level){placementTest();}
  else studentJoin();
}
async function logout(){await SUPA.auth.signOut();CTX={user:null,role:null,name:'',classId:null,className:'',level:null};S=fresh();authScreen();}

async function hydrate(){const r=(await SUPA.from('lingua_progress').select('state').eq('student_id',CTX.user.id).eq('class_id',CTX.classId).maybeSingle()).data;
  const ur=await SUPA.from('lingua_unlocks').select('unit_id').eq('student_id',CTX.user.id).eq('class_id',CTX.classId);UNLOCKS=(ur.data||[]).map(x=>x.unit_id);

/* ===== level test + certificate (only the class level) ===== */
var TEST=null;
function levelDone(L){const us=UNITS.filter(u=>u.level===L);return us.length>0&&us.every(u=>S.unitsDone[u.id]);}
function certBlock(){const L=CTX.level;if(!UNITS.some(u=>u.level===L))return '';let h='';
  if(S.certs&&S.certs[L])h+='<div class="card row-item" onclick="showCert(\''+L+'\')"><div class="dot">🎓</div><div class="meta"><b>'+L+' certificate</b><small>Passed '+S.certs[L].date+' · '+S.certs[L].score+'%</small></div><span class="status">view</span></div>';
  else if(levelDone(L))h+='<div class="card row-item" onclick="startTest(\''+L+'\')"><div class="dot">📝</div><div class="meta"><b>'+L+' level test</b><small>All lessons done — earn your certificate</small></div><span class="pill">Test →</span></div>';
  return h?('<div class="eyebrow" style="margin-top:6px">Test &amp; certificate</div>'+h):'';}
function startTest(L){wallOff();const items=[];UNITS.filter(u=>u.level===L).forEach(u=>(u.quiz||[]).forEach(q=>items.push(q)));TEST={L,items:shuffle(items).slice(0,10),i:0,correct:0};testStep();}
function testStep(){const t=TEST;if(t.i>=t.items.length)return testDone();const q=t.items[t.i];
  const head='<div class="progress-top"><button class="x" onclick="home()">✕</button><div class="bar"><i style="width:'+(t.i/t.items.length*100)+'%"></i></div></div><div class="eyebrow">'+t.L+' level test · '+(t.i+1)+'/'+t.items.length+'</div>';
  if(q.type==='situation'){$('app').innerHTML=head+'<div class="card"><p style="font-size:16px">'+q.q+'</p><div class="choices" id="tq">'+q.options.map((o,x)=>'<button class="choice" data-x="'+x+'">'+o+'</button>').join('')+'</div></div>';
    document.querySelectorAll('#tq .choice').forEach(b=>b.onclick=()=>{document.querySelectorAll('#tq .choice').forEach(z=>{z.style.pointerEvents='none';z.classList.add('dim');});const ok=(+b.dataset.x)===q.a;b.classList.remove('dim');b.classList.add(ok?'correct':'wrong');if(!ok)document.querySelectorAll('#tq .choice')[q.a].classList.add('correct');if(ok)t.correct++;t.i++;setTimeout(testStep,ok?450:900);});}
  else{$('app').innerHTML=head+'<div class="card"><div class="q" style="font-size:18px">'+q.q+'</div><input id="tc" placeholder="answer"><div id="tcf"></div></div><button class="btn" id="tcb">Check</button>';
    const go=()=>{const v=norm($('tc').value);const ok=(q.accept||[q.a]).some(a=>norm(a)===v);$('tcf').innerHTML='<div class="fb '+(ok?'ok':'no')+'">'+(ok?'Correct ✓':'Answer: '+q.a)+'</div>';if(ok)t.correct++;t.i++;setTimeout(testStep,ok?500:1000);};
    $('tcb').onclick=go;setTimeout(()=>{const el=$('tc');if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')go();});},40);}}
function testDone(){const t=TEST;const pct=Math.round(t.correct/t.items.length*100);const pass=pct>=80;
  if(pass){if(!S.certs)S.certs={};S.certs[t.L]={date:today(),score:pct};S.gems+=20;save();confetti();checkBadges();}
  $('app').innerHTML='<div class="card center"><div class="big">'+(pass?'🎓':'💪')+'</div><h1 style="font-size:22px">'+(pass?t.L+' passed!':'Almost there')+'</h1><p class="muted">You scored '+pct+'%'+(pass?'':' — you need 80% to pass.')+'</p><button class="btn" style="margin-top:12px" onclick="'+(pass?'showCert(\''+t.L+'\')':'home()')+'">'+(pass?'View certificate':'Back home')+'</button></div>';}
function showCert(L){wallOff();const c=(S.certs&&S.certs[L])||{date:today(),score:100};
  $('app').innerHTML='<div class="progress-top"><button class="x" onclick="home()">✕</button></div><div class="card" style="text-align:center;border:2px solid var(--teal);padding:26px"><div class="eyebrow">Arian Academy · Lingua</div><div class="big">🎓</div><h1 style="font-size:23px;margin:6px 0">Certificate of Achievement</h1><p class="muted">This certifies that</p><h2 style="color:var(--teal);font-size:22px;margin:6px 0">'+escH(CTX.name)+'</h2><p class="muted">completed CEFR Level</p><h2 style="color:var(--teal);font-size:28px;margin:6px 0">'+L+'</h2><p class="muted">score '+c.score+'% · '+c.date+'</p></div><button class="btn" onclick="window.print()">Print / Save as PDF</button>';}

/* ===== vocabulary ===== */
function vocabStudy(){wallOff();
  const freshC=VOCAB.filter(v=>!S.cards[v.id]); const due=VOCAB.filter(v=>S.cards[v.id]&&S.cards[v.id].due<=Date.now());
  let queue=shuffle(freshC).slice(0,8); if(!queue.length)queue=shuffle(due).slice(0,12);
  if(!queue.length){$('app').innerHTML='<div class="card center"><div class="big">✅</div><h2 style="font-size:20px">All caught up!</h2><p class="muted">No new or due vocabulary right now.</p><button class="btn" style="margin-top:12px" onclick="home()">Back home</button></div>';return;}
  let i=0;
  function card(){if(i>=queue.length){save();home();return;}const v=queue[i];
    const typeName={word:'Word',collocation:'Collocation',phrasal:'Phrasal verb',idiom:'Idiom'}[v.type]||'Phrase';
    $('app').innerHTML=`<div class="progress-top"><button class="x" onclick="home()">✕</button><div class="bar"><i style="width:${i/queue.length*100}%"></i></div></div>
      <div class="card center"><div class="eyebrow"><span class="tag voc">${typeName}</span></div><div class="chunk">${v.term}</div>
      <div id="rev" style="display:none"><div class="use">${v.meaning}</div><div class="eg" style="margin-top:8px">${v.example}</div></div></div>
      <div id="f"><div class="btn row"><button class="btn ghost" onclick="speak('${esc(v.term)}')">🔊 Hear it</button><button class="btn" id="show">What does it mean?</button></div></div>`;
    $('show').onclick=()=>{$('rev').style.display='';$('f').innerHTML=`<div class="grade-row"><div class="grade" onclick="vg(1)">Again<small>didn't know</small></div><div class="grade" onclick="vg(2)">Hard</div><div class="grade" onclick="vg(3)">Good</div><div class="grade" onclick="vg(4)">Easy</div></div>`;};
    window.vg=(g)=>{S.cards[v.id]=fsrsReview(S.cards[v.id],g);gainXP(g>=3?5:2);save();i++;card();};}
  card();}

/* ===== unit player ===== */
function startUnit(id){wallOff();const u=UNITS.find(x=>x.id===id);if(!u)return;if(!unlocked(u)){toast('Finish the previous lesson to unlock this');return;}touchDay();
  const steps=[{t:'unitintro'}];u.chunks.forEach(c=>steps.push({t:'chunk',c}));steps.push({t:'grammar'});steps.push({t:'reading'});
  u.reading.questions.forEach(q=>steps.push({t:'mc',q}));if(u.reading.vocabInContext)steps.push({t:'mc',q:u.reading.vocabInContext});

async function postAnnouncement(cid){const b=$('annbody').value.trim();if(!b){toast('Write something first');return;}const {error}=await SUPA.from('lingua_announcements').insert({class_id:cid,body:b});if(error){toast('Could not post');return;}toast('Posted');classView(cid);}
async function delAnnouncement(id,cid){if(!confirm('Delete this announcement?'))return;await SUPA.from('lingua_announcements').delete().eq('id',id);classView(cid);}
async function createAssignment(cid){const title=$('asgt').value.trim()||'Assignment';const units=[...document.querySelectorAll('[data-au]:checked')].map(x=>x.value);const vocab=parseInt($('asgv').value,10)||0;const due=$('asgd').value||null;const live=$('asgl').value.trim()||null;const note=$('asgn').value.trim()||null;const {error}=await SUPA.from('lingua_assignments').insert({class_id:cid,title,unit_ids:units,vocab_count:vocab,due_date:due,live_info:live,note});if(error){toast('Could not create');return;}toast('Assignment created');classView(cid);}
async function delAssignment(id,cid){if(!confirm('Delete this assignment?'))return;await SUPA.from('lingua_assignments').delete().eq('id',id);classView(cid);}
async function loadFeed(){const el=$('feed');if(!el||!CTX.classId)return;
  const [aR,asR]=await Promise.all([SUPA.from('lingua_announcements').select('body,created_at').eq('class_id',CTX.classId).order('created_at',{ascending:false}).limit(3),SUPA.from('lingua_assignments').select('*').eq('class_id',CTX.classId).order('due_date',{ascending:true})]);
  let h='';
  (aR.data||[]).forEach(a=>{h+=`<div class="card" style="border-left:3px solid var(--amber)"><div class="eyebrow" style="color:var(--amber);margin-bottom:2px">📣 Announcement</div><div style="font-size:14px;white-space:pre-wrap">${escH(a.body)}</div><div class="muted" style="font-size:11px;margin-top:4px">${(a.created_at||'').slice(0,10)}</div></div>`;});
  (asR.data||[]).forEach(a=>{const units=(a.unit_ids||[]).filter(id=>UNITS.find(u=>u.id===id));const done=units.filter(id=>S.unitsDone[id]).length;const pct=units.length?Math.round(done/units.length*100):0;const overdue=a.due_date&&a.due_date<today();
    h+=`<div class="card" style="border-left:3px solid var(--teal)"><div class="top" style="margin-bottom:4px"><b style="font-size:15px">📌 ${escH(a.title)}</b>${a.due_date?`<span class="pill" style="${overdue?'background:#fdeef0;color:var(--rose)':''}">due ${a.due_date}</span>`:''}</div>${a.live_info?`<div class="muted" style="font-size:12px">📅 ${escH(a.live_info)}</div>`:''}${a.note?`<div class="why" style="text-align:left">${escH(a.note)}</div>`:''}<div class="bar" style="margin:8px 0"><i style="width:${pct}%"></i></div><div class="muted" style="font-size:12px">Units ${done}/${units.length}${a.vocab_count?` · vocab ${Math.min(vocabSeen(),a.vocab_count)}/${a.vocab_count}`:''}</div>${units.map(id=>{const u=UNITS.find(x=>x.id===id);return `<div class="row-item" style="margin:4px 0" onclick="startUnit('${id}')"><div class="dot" style="width:30px;height:30px;font-size:14px">${S.unitsDone[id]?'✓':'📘'}</div><div class="meta"><small>${escH(u.title)}</small></div><span class="status">${S.unitsDone[id]?'✓':'›'}</span></div>`;}).join('')}</div>`;});
  el.innerHTML=h;}
async function analyticsView(){wallOff();
  $('app').innerHTML='<div class="center muted" style="margin-top:40px">Crunching numbers…</div>';
  const [clsR,enrR,progR]=await Promise.all([SUPA.from('lingua_classes').select('*'),SUPA.from('lingua_enrollments').select('class_id,student_id,student_name'),SUPA.from('lingua_progress').select('student_id,class_id,state,updated_at')]);
  const cls=clsR.data||[],enr=enrR.data||[],prog=progR.data||[];
  const cmap={};cls.forEach(c=>cmap[c.id]=c);
  const pk={};prog.forEach(p=>pk[p.student_id+'|'+p.class_id]=p);
  const tdy=today();const dnum=d=>d?Math.floor((Date.now()-new Date(d).getTime())/864e5):999;
  let activeToday=0,active7=0,totXP=0,n=enr.length;
  const rows=enr.map(e=>{const st=(pk[e.student_id+'|'+e.class_id]||{}).state||{};const c=cmap[e.class_id]||{};const units=UNITS.filter(u=>u.level===c.level);const done=units.filter(u=>(st.unitsDone||{})[u.id]).length;const la=st.lastActive;const days=dnum(la);if(la===tdy)activeToday++;if(days<=7)active7++;totXP+=st.xp||0;return {name:e.student_name||'Student',cid:e.class_id,cls:c.name||'—',level:c.level||'',xp:st.xp||0,streak:st.streak||0,done,tot:units.length,la,days};});
  const attention=rows.filter(r=>r.days>=7||r.xp===0).sort((a,b)=>b.days-a.days);
  const atRisk=rows.filter(r=>r.streak>=2&&r.la!==tdy&&r.days<=2);
  const top=rows.slice().sort((a,b)=>b.xp-a.xp).slice(0,5).filter(r=>r.xp>0);
  const stat=(ic,v,l)=>`<div class="card" style="margin:0;text-align:center;padding:12px 4px"><div style="font-size:20px">${ic}</div><div style="font-size:20px;font-weight:800;font-family:Lora">${v}</div><div class="muted" style="font-size:11px">${l}</div></div>`;
  let h=`<div class="progress-top"><button class="x" onclick="adminHome()">✕</button></div><div class="eyebrow">Analytics</div><h1 style="font-size:22px;margin-bottom:10px">Class insights</h1>
   <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">${stat('🧑‍🎓',n,'Students')}${stat('🔥',activeToday,'Active today')}${stat('📆',active7,'Active 7d')}${stat('⭐',n?Math.round(totXP/n):0,'Avg XP')}</div>`;
  h+=`<div class="eyebrow">⚠️ Needs attention (${attention.length})</div>`;
  h+=attention.length?`<div class="card">`+attention.map(r=>`<div class="row-item" style="cursor:default;padding:6px 0"><div class="meta"><b style="font-size:14px">${escH(r.name)}</b><small>${escH(r.cls)} · ${r.xp===0?'no progress yet':(r.days>=999?'never active':r.days+' days inactive')}</small></div><div class="pill" style="background:#fdeef0;color:var(--rose)">${r.xp} XP</div></div>`).join('')+`</div>`:`<p class="muted center" style="font-size:13px">Everyone is active 🎉</p>`;
  h+=`<div class="eyebrow" style="margin-top:6px">🔥 Streak at risk (${atRisk.length})</div>`;
  h+=atRisk.length?`<div class="card">`+atRisk.map(r=>`<div class="row-item" style="cursor:default;padding:6px 0"><div class="meta"><b style="font-size:14px">${escH(r.name)}</b><small>${escH(r.cls)} · ${r.streak}-day streak, not active today</small></div></div>`).join('')+`</div>`:`<p class="muted center" style="font-size:13px">No streaks about to break.</p>`;
  if(top.length){h+=`<div class="eyebrow" style="margin-top:6px">🌟 Top learners</div><div class="card">`+top.map((r,i)=>`<div class="row-item" style="cursor:default;padding:6px 0"><div style="width:28px;font-weight:700">${i+1}.</div><div class="meta"><b style="font-size:14px">${escH(r.name)}</b><small>${escH(r.cls)}</small></div><div style="font-weight:700">⭐ ${r.xp}</div></div>`).join('')+`</div>`;}
  h+=`<div class="eyebrow" style="margin-top:6px">By class</div><div class="card"><table><tr><th>Class</th><th>Students</th><th>Avg units</th><th>Active 7d</th></tr>`;
  cls.forEach(c=>{const cr=rows.filter(r=>r.cid===c.id);const avg=cr.length?Math.round(cr.reduce((s,r)=>s+r.done,0)/cr.length*10)/10:0;const a7=cr.filter(r=>r.days<=7).length;h+=`<tr><td><b>${escH(c.name)}</b> <span class="muted">${c.level}</span></td><td>${cr.length}</td><td>${cr.length?avg:'—'}</td><td>${a7}</td></tr>`;});
  h+=`</table></div>`;
  $('app').innerHTML=h;}
async function saveNote(sid){const body=$('snote').value;const {error}=await SUPA.from('lingua_notes').upsert({author_id:CTX.user.id,student_id:sid,body,updated_at:new Date().toISOString()},{onConflict:'author_id,student_id'});if(error){toast('Could not save note');return;}toast('Note saved');}
async function loadContentOverrides(){try{const r=await SUPA.from('lingua_content').select('id,kind,data,deleted');(r.data||[]).forEach(row=>{const arr=row.kind==='unit'?UNITS:VOCAB;const i=arr.findIndex(x=>x.id===row.id);if(row.deleted){if(i>=0)arr.splice(i,1);}else{if(i>=0)arr[i]=row.data;else arr.push(row.data);}});}catch(e){}}
let CMS_VQ='';
function cmsHome(){wallOff();$('app').innerHTML=`<div class="progress-top"><button class="x" onclick="adminHome()">✕</button></div><div class="eyebrow">Content manager</div><h1 style="font-size:22px;margin-bottom:10px">Edit lessons & vocabulary</h1><div class="card row-item" onclick="cmsVocab()"><div class="dot">📚</div><div class="meta"><b>Vocabulary</b><small>${VOCAB.length} cards · add, edit, delete</small></div><span class="status">›</span></div><div class="card row-item" onclick="cmsUnits()"><div class="dot">📘</div><div class="meta"><b>Units</b><small>${UNITS.length} lessons · edit, add, delete</small></div><span class="status">›</span></div><p class="muted center" style="font-size:11px;margin-top:8px">Changes save to your database and appear for everyone on next load.</p>`;}
function cmsVocab(){wallOff();$('app').innerHTML=`<div class="progress-top"><button class="x" onclick="cmsHome()">✕</button></div><div class="eyebrow">Vocabulary (${VOCAB.length})</div><input id="vq" placeholder="Search a term…" value="${escH(CMS_VQ)}"><button class="btn" style="margin-top:8px" onclick="cmsVocabEdit()">+ Add new card</button><div id="vlist" style="margin-top:10px"></div>`;const el=$('vq');el.addEventListener('input',e=>{CMS_VQ=e.target.value;renderVList();});renderVList();}
function renderVList(){const ql=(CMS_VQ||'').toLowerCase();const list=VOCAB.filter(v=>!ql||(v.term||'').toLowerCase().includes(ql)).slice(0,60);let h=`<p class="muted" style="font-size:11px">${list.length} shown${(!ql&&VOCAB.length>60)?' — search to see more':''}</p>`;list.forEach(v=>{const t=({word:'W',collocation:'C',phrasal:'PV',idiom:'ID'})[v.type]||'?';h+=`<div class="card row-item" onclick="cmsVocabEdit('${v.id}')"><div class="dot" style="background:var(--violet);color:#fff;width:34px;height:34px;font-size:12px">${t}</div><div class="meta"><b style="font-size:14px">${escH(v.term)}</b><small>${escH(v.meaning)}</small></div><span class="status">edit</span></div>`;});const lf=$('vlist');if(lf)lf.innerHTML=h;}
function cmsVocabEdit(id){wallOff();const v=id?VOCAB.find(x=>x.id===id):{id:'',term:'',meaning:'',example:'',type:'word'};if(!v){toast('Not found');return;}const ex=(v.example||'').split('<br>').join('\n');
  $('app').innerHTML=`<div class="progress-top"><button class="x" onclick="cmsVocab()">✕</button></div><div class="eyebrow">${id?'Edit':'New'} vocabulary card</div><div class="card"><label class="muted" style="font-size:12px">Term</label><input id="ev_term" value="${escH(v.term)}"><label class="muted" style="font-size:12px;margin-top:6px;display:block">Meaning</label><input id="ev_mean" value="${escH(v.meaning)}"><label class="muted" style="font-size:12px;margin-top:6px;display:block">Examples (one per line)</label><textarea id="ev_ex" style="min-height:90px">${escH(ex)}</textarea><label class="muted" style="font-size:12px;margin-top:6px;display:block">Type</label><select id="ev_type">${['word','collocation','phrasal','idiom'].map(t=>`<option value="${t}" ${t===v.type?'selected':''}>${t}</option>`).join('')}</select><button class="btn" style="margin-top:12px" onclick="cmsVocabSave('${id||''}')">Save card</button>${id?`<button class="btn ghost" style="margin-top:8px" onclick="cmsDelete('vocab','${id}')">Delete card</button>`:''}</div>`;}
async function cmsVocabSave(id){const term=$('ev_term').value.trim();if(!term){toast('Term is required');return;}const ex=$('ev_ex').value.split('\n').map(x=>x.trim()).filter(Boolean).join('<br>');const obj={id:id||('cv_'+Date.now().toString(36)),term,meaning:$('ev_mean').value.trim(),example:ex,type:$('ev_type').value};const {error}=await SUPA.from('lingua_content').upsert({id:obj.id,kind:'vocab',data:obj,deleted:false,updated_at:new Date().toISOString()},{onConflict:'id'});if(error){toast('Save failed');return;}const i=VOCAB.findIndex(x=>x.id===obj.id);if(i>=0)VOCAB[i]=obj;else VOCAB.push(obj);toast('Saved');cmsVocab();}
async function cmsDelete(kind,id){if(!confirm('Delete this item? It will be hidden from everyone.'))return;const arr=kind==='unit'?UNITS:VOCAB;const cur=arr.find(x=>x.id===id)||{id};const {error}=await SUPA.from('lingua_content').upsert({id,kind,data:cur,deleted:true,updated_at:new Date().toISOString()},{onConflict:'id'});if(error){toast('Delete failed');return;}const i=arr.findIndex(x=>x.id===id);if(i>=0)arr.splice(i,1);toast('Deleted');if(kind==='unit')cmsUnits();else cmsVocab();}
function cmsUnits(){wallOff();let h=`<div class="progress-top"><button class="x" onclick="cmsHome()">✕</button></div><div class="eyebrow">Units (${UNITS.length})</div><button class="btn" style="margin:8px 0" onclick="cmsUnitEdit()">+ Add new unit</button>`;['A1','A2','B1','B2','C1','C2'].forEach(L=>{const us=UNITS.filter(u=>u.level===L);if(!us.length)return;h+=`<div class="eyebrow" style="margin-top:6px">${L}</div>`;us.forEach(u=>{h+=`<div class="card row-item" onclick="cmsUnitEdit('${u.id}')"><div class="dot">📘</div><div class="meta"><b style="font-size:14px">${escH(u.title)}</b><small>${escH(u.theme||'')}</small></div><span class="status">edit</span></div>`;});});$('app').innerHTML=h;}
function cmsUnitEdit(id){wallOff();const u=id?UNITS.find(x=>x.id===id):null;const tmpl={id:"newunit1",level:"A2",module:1,title:"",theme:"",canDo:"",chunks:[],grammar:{focus:"",pattern:"",examples:[]},reading:{passage:"",questions:[],vocabInContext:null},listening:{script:[],gist:{q:"",choices:[],a:0},dictogloss:{sentence:""},gap:{q:"",a:""}},speaking:{minimalPair:{a:"",b:"",note:""},fluency432:{prompt:""},retell:{prompt:"",useChunks:[]},task:{prompt:"",useChunks:[]}},writing:{model:"",sentenceCombining:[],task:{prompt:"",minWords:30}},review:{srItems:[]},quiz:[]};const json=JSON.stringify(u||tmpl,null,2);
  $('app').innerHTML=`<div class="progress-top"><button class="x" onclick="cmsUnits()">✕</button></div><div class="eyebrow">${id?'Edit':'New'} unit</div><p class="muted" style="font-size:12px">Edit the unit's content as JSON. Keep the structure valid (same shape as other units).</p><textarea id="ujson" spellcheck="false" style="min-height:360px;font-family:ui-monospace,monospace;font-size:12px">${escH(json)}</textarea><button class="btn" style="margin-top:10px" onclick="cmsUnitSave('${id||''}')">Save unit</button>${id?`<button class="btn ghost" style="margin-top:8px" onclick="cmsDelete('unit','${id}')">Delete unit</button>`:''}`;}
async function cmsUnitSave(id){let obj;try{obj=JSON.parse($('ujson').value);}catch(e){toast('Invalid JSON: '+e.message);return;}if(!obj||!obj.id||!obj.level||!obj.title){toast('Need id, level and title');return;}const {error}=await SUPA.from('lingua_content').upsert({id:obj.id,kind:'unit',data:obj,deleted:false,updated_at:new Date().toISOString()},{onConflict:'id'});if(error){toast('Save failed');return;}const i=UNITS.findIndex(x=>x.id===obj.id);if(i>=0)UNITS[i]=obj;else UNITS.push(obj);toast('Unit saved');cmsUnits();}
let PREVIEW_LEVEL='A1';
function startPreview(){CTX.preview=true;CTX.classId=null;CTX.level=PREVIEW_LEVEL;CTX.className='Preview';S=fresh();home();}
function exitPreview(){CTX.preview=false;CTX.level=null;CTX.className='';adminHome();}
function setPreviewLevel(l){PREVIEW_LEVEL=l;CTX.level=l;S=fresh();home();}
function previewBar(){return `<div class="card" style="background:var(--teal-soft);display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px"><b style="font-size:13px;color:var(--teal-dark)">👁 Student preview</b><select onchange="setPreviewLevel(this.value)" style="width:auto;margin:0">${['A1','A2','B1','B2','C1','C2'].map(l=>`<option value="${l}" ${l===CTX.level?'selected':''}>${l}</option>`).join('')}</select><button class="btn ghost" style="width:auto;padding:8px 12px;margin-left:auto" onclick="exitPreview()">← Admin</button></div>`;}
async function adminUnlock(sid,cid,uid){const {error}=await SUPA.from('lingua_unlocks').upsert({student_id:sid,class_id:cid,unit_id:uid},{onConflict:'student_id,unit_id'});if(error){toast('Could not unlock');return;}toast('Unlocked');studentView(sid,cid);}
async function adminLock(sid,cid,uid){await SUPA.from('lingua_unlocks').delete().eq('student_id',sid).eq('unit_id',uid);toast('Locked');studentView(sid,cid);}
boot();
</script>
