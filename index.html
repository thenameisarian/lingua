ence":"There's a subtle shade of meaning."},"gap":{"q":"It might come ___ as rude.","a":"across","accept":["across"]}},"speaking":{"shadow":["connote","loaded","prefer","shade","comeacross"],"minimalPair":{"a":"cheap","b":"chip","note":"/i:/ 'cheap' vs the short vowel in 'chip'."},"fluency432":{"prompt":"Compare two near-synonyms and explain when you'd use each."},"retell":{"prompt":"Summarise the writer's advice on word choice in your own words.","useChunks":["connote","loaded","prefer","comeacross"],"minWords":30},"task":{"prompt":"Discuss two near-synonyms, explaining the connotation of each and which you'd choose.","useChunks":["connote","prefer","comeacross"],"need":2}},"writing":{"model":"'Cheap' can connote poor quality, so I'd prefer 'affordable'. 'Regime' is a loaded word. There's a subtle shade of meaning, and it might come across as rude, so let me word it carefully.","sentenceCombining":[{"parts":["The word is negative.","I'd choose a softer one."],"answer":"Since the word is negative, I'd choose a softer one."},{"parts":["'Assertive' sounds positive.","'Aggressive' sounds hostile."],"answer":"'Assertive' sounds positive, whereas 'aggressive' sounds hostile."}],"task":{"prompt":"Write a short paragraph comparing two near-synonyms and their connotations.","genre":"opinion","mustInclude":["connote","prefer","shade"],"minWords":40}},"review":{"srItems":["connote","loaded","prefer","shade","comeacross","wordit"]},"quiz":[{"type":"situation","q":"You want to flag a word that carries strong overtones.","options":["Let me word it more carefully.","That's quite a loaded word.","There's a subtle shade of meaning."],"a":1},{"type":"situation","q":"You want to choose the more flattering synonym.","options":["It might come across as rude.","I'd prefer 'assertive' to 'aggressive'.","'Cheap' can connote poor quality."],"a":1},{"type":"cloze","q":"It might come ___ as rude.","a":"across","accept":["across"]}]},{"id":"c2-09","level":"C2","module":"Diplomacy","title":"Di class.<br>Don't fall behind on payments.<br>We fell behind schedule.","type":"phrasal","tier":3},{"id":"vp7_fitin","term":"fit in","meaning":"belong in a group; find time for","example":"She fits in well at work.<br>Can you fit me in today?<br>It's hard to fit in at first.","type":"phrasal","tier":3},{"id":"vp7_handout","term":"hand out","meaning":"give things to people in a group","example":"They handed out leaflets.<br>The teacher handed out tests.<br>We handed out free samples.","type":"phrasal","tier":3},{"id":"vp7_lookout","term":"look out","meaning":"be careful; watch for danger","example":"Look out, a car!<br>Look out for ice on the path.<br>Look out below!","type":"phrasal","tier":2},{"id":"vp7_payoff","term":"pay off","meaning":"bring a good result; or repay fully","example":"Hard work pays off.<br>The risk paid off.<br>She paid off her loan.","type":"phrasal","tier":3},{"id":"vp7_pulloff","term":"pull off","meaning":"succeed in something difficult","example":"They pulled off a win.<br>She pulled off the deal.<br>We actually pulled it off.","type":"phrasal","tier":4},{"id":"vp7_settledown","term":"settle down","meaning":"become calm; start a stable life","example":"Settle down, everyone.<br>They settled down in a small town.<br>He wants to settle down.","type":"phrasal","tier":3},{"id":"vp7_sinkin","term":"sink in","meaning":"be fully understood after time","example":"The news took time to sink in.<br>It finally sank in.<br>Let it sink in.","type":"phrasal","tier":4},{"id":"vp7_standfor","term":"stand for","meaning":"represent; or tolerate","example":"What does NASA stand for?<br>I won't stand for rudeness.<br>The flag stands for freedom.","type":"phrasal","tier":3},{"id":"vp8_addup","term":"add up","meaning":"make sense; or calculate a total","example":"His story doesn't add up.<br>Add up the costs.<br>The numbers don't add up.","type":"phrasal","tier":3},{"id":"vp8_breakoff","term":"break off","meaning":"stop suddenly; or end a relationship","example":"Sh ":"vp8_leadto","term":"lead to","meaning":"cause or result in something","example":"Stress can lead to illness.<br>It led to a big change.<br>One thing led to another.","type":"phrasal","tier":2},{"id":"vp8_messup","term":"mess up","meaning":"do something badly; spoil","example":"I messed up the test.<br>Don't mess it up.<br>He messed up the plan.","type":"phrasal","tier":3},{"id":"vp8_missout","term":"miss out","meaning":"lose a chance to do something","example":"Don't miss out on the sale.<br>I missed out on the trip.<br>You'll miss out if you wait.","type":"phrasal","tier":3},{"id":"vp8_movein","term":"move in","meaning":"start living in a new home","example":"We move in next week.<br>They moved in together.<br>She moved in upstairs.","type":"phrasal","tier":2},{"id":"vp8_setout","term":"set out","meaning":"begin a journey; or aim to do something","example":"We set out at dawn.<br>He set out to win.<br>They set out on foot.","type":"phrasal","tier":3},{"id":"vp8_showoff","term":"show off","meaning":"display something proudly to impress","example":"He likes to show off.<br>She showed off her ring.<br>Stop showing off!","type":"phrasal","tier":3},{"id":"vp8_slipup","term":"slip up","meaning":"make a small mistake","example":"I slipped up on the date.<br>Everyone slips up sometimes.<br>Don't slip up now.","type":"phrasal","tier":4},{"id":"vp8_turnout","term":"turn out","meaning":"happen in the end; or attend","example":"It turned out fine.<br>How did it turn out?<br>Many people turned out.","type":"phrasal","tier":3},{"id":"vp8_wrapup","term":"wrap up","meaning":"finish; or dress warmly","example":"Let's wrap up the meeting.<br>Wrap up warm, it's cold.<br>We wrapped up early.","type":"phrasal","tier":3},{"id":"vp9_breakin","term":"break in","meaning":"enter by force; or interrupt","example":"Thieves broke in last night.<br>She broke in to add a point.<br>Someone broke in through a window.","type":"phrasal","tier":3},{"id":"vp9_bringon","term":"bring on","meaning":"cause something to happen","example":"Stress can bring on a headache.<br>The cold brought on her cough.<br>What brought this on?","type":"phrasal","tier":4},{"id":"vp9_closedown","term":"close down","meaning":"stop operating permanently","example":"The factory closed down.<br>They closed down the shop.<br>Many firms closed down.","type":"phrasal","tier":3},{"id":"vp9_comeout","term":"come out","meaning":"become known; or be released","example":"The truth came out.<br>Her book comes out in May.<br>The stain won't come out.","type":"phrasal","tier":2},{"id":"vp9_dressup","term":"dress up","meaning":"wear smart or special clothes","example":"We dressed up for the party.<br>Kids love to dress up.<br>You don't need to dress up.","type":"phrasal","tier":2},{"id":"vp9_dropby","term":"drop by","meaning":"visit briefly without arranging it","example":"Drop by anytime.<br>She dropped by for tea.<br>I'll drop by later.","type":"phrasal","tier":3},{"id":"vp9_eatout","term":"eat out","meaning":"have a meal in a restaurant","example":"Let's eat out tonight.<br>We eat out on Fridays.<br>They rarely eat out.","type":"phrasal","tier":2},{"id":"vp9_fillout","term":"fill out","meaning":"complete a form with information","example":"Fill out this form.<br>She filled out the application.<br>Please fill out both sides.","type":"phrasal","tier":2},{"id":"vp9_getout","term":"get out","meaning":"leave a place; or become known","example":"Get out of the building!<br>Let's get out for a walk.<br>The news got out fast.","type":"phrasal","tier":2},{"id":"vp9_holdup","term":"hold up","meaning":"delay; or rob","example":"The traffic held us up.<br>Sorry to hold you up.<br>Robbers held up the bank.","type":"phrasal","tier":3},{"id":"vp9_passout","term":"pass out","meaning":"faint; lose consciousness","example":"He passed out from the heat.<br>She nearly passed out.<br>I almost passed out.","type":"phrasal","tier":3},{"id":"vp9_payback","term":"pay back","meaning":"return money you owe","example":"I'll pay you back on Friday.<br>She paid back the loan.<br>He never paid me back.","type":"phrasal","tier":2},{"id":"vp9_pickout","term":"pick out","meaning":"choose; or recognise from a group","example":"Pick out a dress.<br>She picked out the right one.<br>Can you pick him out?","type":"phrasal","tier":3},{"id":"vp9_playdown","term":"play down","meaning":"make something seem less important","example":"He played down the risk.<br>They played down the news.<br>Don't play down your success.","type":"phrasal","tier":4},{"id":"vp9_pullover","term":"pull over","meaning":"move to the side of the road and stop","example":"The police told him to pull over.<br>She pulled over to rest.<br>Pull over here.","type":"phrasal","tier":3},{"id":"vp9_sellout","term":"sell out","meaning":"sell all of something","example":"The tickets sold out fast.<br>We've sold out of bread.<br>The show sold out.","type":"phrasal","tier":3},{"id":"vp9_standup","term":"stand up","meaning":"rise to your feet; or fail to meet someone","example":"Please stand up.<br>He stood up to speak.<br>She stood me up.","type":"phrasal","tier":2},{"id":"vp9_stepin","term":"step in","meaning":"become involved to help","example":"A teacher stepped in.<br>The boss stepped in to help.<br>Someone had to step in.","type":"phrasal","tier":3},{"id":"vp9_takeback","term":"take back","meaning":"return something; or withdraw words","example":"Take back the faulty phone.<br>I take back what I said.<br>She took back the gift.","type":"phrasal","tier":3},{"id":"vp9_wakeup","term":"wake up","meaning":"stop sleeping","example":"I wake up at six.<br>Wake up, it's late!<br>She woke up early.","type":"phrasal","tier":1},{"id":"vp_giveup","term":"give up","meaning":"stop trying or quit","example":"Don't give up — keep practising.<br>She gave up smoking.<br>I give up; what's the answer?","type":"phrasal","tier":1},{"id":"vp_findout","term":"find out","meaning":"discover information","example":"I'll find out the time.<br>How did you find out?<br>We found out the truth.","type":"phrasal","tier":1},{"id":"vp_lookfor","term":"look for","meaning":"try to find","example":"I'm looking for my keys.<br>What are you looking for?<br>She's looking for a job.","type":"phrasal","tier":1},{"id":"vp_lookafter","term":"look after","meaning":"take care of","example":"Can you look after the kids?<br>He looks after his parents.<br>Look after yourself.","type":"phrasal","tier":1},{"id":"vp_pickup","term":"pick up","meaning":"collect someone or something","example":"I'll pick you up at eight.<br>Pick up the phone.<br>She picked up some milk.","type":"phrasal","tier":1},{"id":"vp_turnon","term":"turn on","meaning":"start a machine or light","example":"Turn on the lights.<br>He turned on the TV.<br>Turn the heating on.","type":"phrasal","tier":1},{"id":"vp_turnoff","term":"turn off","meaning":"stop a machine or light","example":"Turn off the TV.<br>Don't forget to turn off the tap.<br>Turn the lights off.","type":"phrasal","tier":1},{"id":"vp_getup","term":"get up","meaning":"leave your bed","example":"I get up at seven.<br>Get up, it's late!<br>She got up early.","type":"phrasal","tier":1},{"id":"vp_puton","term":"put on","meaning":"start wearing something","example":"Put on your coat.<br>He put on his shoes.<br>Put a jumper on.","type":"phrasal","tier":1},{"id":"vp_takeoff","term":"take off","meaning":"remove clothes; or (of a plane) leave the ground","example":"Take off your shoes.<br>The plane took off.<br>She took off her coat.","type":"phrasal","tier":2},{"id":"vp_comeback","term":"come back","meaning":"return","example":"She'll come back next week.<br>Come back soon!<br>He came back late.","type":"phrasal","tier":1},{"id":"vp_goon","term":"go on","meaning":"continue","example":"Go on, I'm listening.<br>The show must go on.<br>What's going on?","type":"phrasal","tier":1},{"id":"vp_runout","term":"run out (of)","meaning":"have no more left","example":"We've run out of milk.<br>Time is running out.<br>The printer ran const MISSIONS=[{"id":"sm1","num":11,"level":2,"category":"Social & Fun Challenges","title":"Tell a Joke in English","objective":"Learn how to tell a simple joke and make people laugh.","examples":["Why don't skeletons fight each other? Because they don't have the guts!","What do you call cheese that isn't yours? Nacho cheese!"],"activities":["Find & Tell a Joke: Search for an easy English joke and tell it to a friend.","Practice Delivery: Record yourself telling a joke and focus on timing.","Challenge: Tell a joke to someone in real life and see if they laugh!"],"tip":"The key to a good joke is timing and confidence—pause before the punchline!"},{"id":"sm2","num":12,"level":2,"category":"Social & Fun Challenges","title":"Give a Compliment","objective":"Practice giving and receiving compliments naturally.","examples":["\"I love your hairstyle! It looks amazing on you.\"","\"You're really good at explaining things. You make learning easy!\""],"activities":["Compliment Challenge: Give a compliment to three people today.","Role-Play: One person gives compliments, and the other responds naturally.","Real-life Test: Compliment a stranger (e.g., waiter, store employee) and see how they react."],"tip":"Be specific! Instead of \"Nice shirt,\" say, \"That blue shirt really suits you!\""},{"id":"sm3","num":13,"level":2,"category":"Social & Fun Challenges","title":"Describe a Movie You Love","objective":"Summarize a movie and explain why you like it.","examples":[],"activities":["Write a Summary: Write 5 sentences about your favorite movie.","Speaking Challenge: Describe a movie to a friend and make them interested in watching it.","Movie Trailer Game: Watch a trailer and explain the movie's story in your own words."],"tip":"Use adjectives like exciting, emotional, funny, scary to describe the movie."},{"id":"sm4","num":14,"level":2,"category":"Social & Fun Challenges","title":"Share a Funny Story","objective":"Tell a short, funny story from your life.","examples":[],"activities":["Story Writing: Write a short funny moment from your life.","Challenge: Tell your story to someone and try to make them laugh.","Listen & Learn: Watch a short funny story in English and repeat it."],"tip":"Use pauses and intonation to make your story more engaging."},{"id":"sm5","num":15,"level":2,"category":"Social & Fun Challenges","title":"Give a Recommendation","objective":"Recommend a book, restaurant, or TV show.","examples":[],"activities":["Write a Recommendation: Choose something you love and write a short review.","Speaking Challenge: Recommend something to a friend or family member.","Role-Play: One person asks for a recommendation, and the other gives one."],"tip":"Use phrases like \"I highly recommend…\" or \"You should try this because…\""},{"id":"sm6","num":16,"level":2,"category":"Social & Fun Challenges","title":"Explain a Simple Recipe","objective":"Describe how to make a simple dish.","examples":[],"activities":["Write a Recipe: Write 5 steps for making your favorite food.","Speaking Challenge: Explain a recipe to a friend.","Cooking Video Practice: Watch a recipe video and repeat the instructions."],"tip":"Use sequence words like first, next, then, finally to organize your explanation."},{"id":"sm7","num":17,"level":2,"category":"Social & Fun Challenges","title":"Role-Play a Job Interview","objective":"Practice answering common job interview questions.","examples":[],"activities":["Write Your Answers: Prepare answers for 3 common interview questions.","Role-Play: Practice with a friend or record yourself.","Challenge: Answer a question without preparing and see how you do!"],"tip":"Keep answers short and confident—don't overthink!"},{"id":"sm8","num":18,"level":2,"category":"Social & Fun Challenges","title":"Talk About a Recent Trip","objective":"Describe a place you visited.","examples":[],"activities":["Write a Short Story: Describe a place you visited in 5 sentences.","Speaking Challenge: Tell a friend about your last trip.","Travel Video Task: Watch a travel video and describe the place."],"tip":"Use past tense verbs (went, saw, ate, enjoyed) to talk about past experiences."},{"id":"sm9","num":19,"level":2,"category":"Social & Fun Challenges","title":"Ask Someone About Their Culture","objective":"Learn about another culture by asking questions.","examples":["\"What are some traditional foods in your country?\"","\"How do people celebrate birthdays in your culture?\""],"activities":["Prepare 3 Questions: Write down cultural questions and ask a friend.","Speaking Challenge: Find someone from another culture and ask about their traditions.","Watch & Learn: Watch a video about another country and describe its culture."],"tip":"Be curious! People love sharing their culture when you ask."},{"id":"sm10","num":20,"level":2,"category":"Social & Fun Challenges","title":"Make a New Friend in English","objective":"Start and maintain a natural conversation.","examples":[],"activities":["Introduce Yourself: Start a conversation with someone new.","Challenge: Talk to a stranger for 2 minutes in English.","Role-Play: Practice meeting new people with a friend."],"tip":"Ask open-ended questions (What do you do for fun?) to keep the conversation going."},{"id":"sm11","num":21,"level":2,"category":"Social & Fun Challenges","title":"Talk About a Favorite Holiday or Celebration – Describe Traditions","objective":"Learn how to describe a special holiday or celebration from your country.","examples":[],"activities":["Write About a Celebration: Write 5 sentences describing a holiday from your culture.","Speaking Challenge: Explain your favorite holiday to a friend or family member.","Listening Practice: Watch a video about a celebration in another country and summarize it in your own words.","Cultural Exchange: Ask a friend from a different culture about their favorite holiday and compare traditions.","Role-Play: Imagine you are explaining your holiday to someone who has never heard of it before."],"tip":"Use past tense when talking about how you celebrated in the past and present tense for general traditions."},{"id":"sm12","num":1,"level":1,"category":"Everyday Conversations","title":"Say Hello Like a Native","objective":"Learn different ways to greet people in English.","examples":["Formal: \"Good morning! How are you today?\"","Casual: \"Hey! What's up?\"","Friendly: \"Hi there! How's it going?\""],"activities":["Mirror Practice: Look in the mirror and say each greeting with different facial expressions.","Real-life Challenge: Greet three people today in English (family, friends, shopkeepers).","Voice Recording: Record yourself saying greetings and compare with native speakers (use YouTube or AI voice tools)."],"tip":"Adjust your greeting based on the situation (formal vs. casual)."},{"id":"sm13","num":2,"level":1,"category":"Everyday Conversations","title":"Introduce Yourself in Style","objective":"Learn how to introduce yourself confidently.","examples":[],"activities":["Write Your Introduction: Write a short introduction about yourself.","Pair Practice: Practice with a partner, introducing yourself to them.","Challenge: Introduce yourself in a video and watch it to improve fluency."],"tip":"Add an interesting fact about yourself to make your introduction memorable."},{"id":"sm14","num":3,"level":1,"category":"Everyday Conversations","title":"Order Food Like a Pro","objective":"Practice ordering food at a restaurant or café.","examples":[],"activities":["Role-Play: Practice ordering food with a friend or family member.","Restaurant Visit: Go to a café and try ordering in English.","Writing Task: Write your ideal order at a restaurant."],"tip":"Use polite words like please and thank you to sound more natural."},{"id":"sm15","num":4,"level":1,"category":"Everyday Conversations","title":"Go Shopping in English","objective":"Learn how to ask about prices and sizes in a store.","examples":["\"How much is this?\"","\"Do you have this in a medium size?\"","\"Can I try this on?\""],"activities":["Practice with a Friend: Pretend one person is a shopper and the other is a salesperson.","Go Shopping: Try asking prices in English at a real store.","Challenge: Ask about two different items in English."],"tip":"If you don't understand the price, say \"Can you repeat that, please?\""},{"id":"sm16","num":5,"level":1,"category":"Everyday Conversations","title":"Ask for Directions","objective":"Learn how to ask for and give directions.","examples":[],"activities":["Role-Play: Practice with a partner, switching roles between asking and giving directions.","Map Challenge: Look at a map and describe how to get from one place to another.","Real-life Challenge: Ask someone for directions in English."],"tip":"Use hand gestures while explaining to make directions clearer."},{"id":"sm17","num":6,"level":1,"category":"Everyday Conversations","title":"Make Small Talk","objective":"Learn to have light, casual conversations.","examples":["The weather: \"It's really hot today, isn't it?\"","Current events: \"Did you see the football match last night?\"","Compliments: \"I like your jacket! Where did you get it?\""],"activities":["Practice Questions: Write three small-talk questions and ask a friend.","Challenge: Try making small talk with a stranger.","Listening Task: Watch a small-talk conversation online and repeat key phrases."],"tip":"Start with a smile! Friendly body language helps small talk flow naturally."},{"id":"sm18","num":7,"level":1,"category":"Everyday Conversations","title":"Talk About Your Family","objective":"Describe your family members in English.","examples":["\"I have two sisters and one brother.\"","\"My mother is a teacher, and my father works in business.\"","\"We love spending time together on weekends.\""],"activities":["Writing Task: Write 5 sentences about your family.","Challenge: Describe your family to a friend in English.","Picture Talk: Look at a family picture and explain it in English."],"tip":"Use adjectives (kind, funny, smart) to describe your family."},{"id":"sm19","num":8,"level":1,"category":"Everyday Conversations","title":"Describe Your Favorite Hobby","objective":"Talk about what you love to do.","examples":["\"I love painting. It helps me relax.\"","\"My favorite hobby is playing football with my friends.\""],"activities":["Write a Short Paragraph: Describe your hobby in 5 sentences.","Challenge: Explain your hobby to someone and teach them how to do it.","Speaking Game: Guess your friend's hobby by asking questions."],"tip":"Use \"because\" to explain why you enjoy your hobby."},{"id":"sm20","num":9,"level":1,"category":"Everyday Conversations","title":"Book an Appointment","objective":"Learn how to schedule an appointment.","examples":[],"activities":["Role-Play: Pretend you're calling to book an appointment.","Writing Task: Write an email requesting an appointment.","Real-life Challenge: Try booking something in English (salon, dentist)."],"tip":"Always confirm the date and time at the end of the conversation."},{"id":"sm21","num":10,"level":1,"category":"Everyday Conversations","title":"Talk About Your Daily Routine","objective":"Describe your day from morning to night.","examples":["\"I wake up at 7 AM and brush my teeth.\"","\"In the afternoon, I go to work and have lunch at 1 PM.\"","\"I usually go to bed at 11 PM.\""],"activities":["Speaking Challenge: Record a 1-minute audio of your daily routine.","Writing Task: Write 10 sentences about your daily activities.","Flashcards: Make cards with different times (e.g., 7 AM, 12 PM) and describe what you do at those times."],"tip":"Use words like usually, sometimes, never to make your routine sound more natural."},{"id":"sm22","num":40,"level":4,"category":"Express Yourself","title":"Tell a Personal Story That Inspires – Share a Life Lesson","objective":"Learn how to tell a story that motivates others.","examples":[],"activities":["Write Your Story: Describe a personal experience in 5 sentences.","Speaking Challenge: Tell your story to a friend and ask for feedback.","Listening Exercise: Watch a TED Talk and summarize the speaker's lesson."],"tip":"Use emotions to make your story more powerful!"},{"id":"sm23","num":41,"level":4,"category":"Express Yourself","title":"Explain a Complex Topic Simply – Teach Like a Pro","objective":"Learn how to simplify difficult concepts.","examples":[],"activities":["Choose a Topic: Try explaining something technical in simple words.","Speaking Challenge: Teach a friend about a topic you know well.","Role-Play: Imagine explaining a complex topic to a child—use simple language!"],"tip":"Use examples and analogies to make things easier to understand."},{"id":"sm24","num":42,"level":4,"category":"Express Yourself","title":"Express Your Opinion on a Controversial Topic – Debate Confidently","objective":"Learn to express and defend your opinion respectfully.","examples":[],"activities":["Write Your Opinion: Choose a controversial topic and explain your view in 5 sentences.","Debate Game: Discuss with a friend and defend your position.","Speaking Challenge: Record a short video expressing your opinion on a topic."],"tip":"Support your opinion with facts and logical reasoning."},{"id":"sm25","num":43,"level":4,"category":"Express Yourself","title":"Give a Tour of Your City – Be a Virtual Tour Guide","objective":"Learn how to describe places and attractions.","examples":[],"activities":["Describe Your City in 5 Sentences: Include famous places and activities.","Speaking Challenge: Pretend you're a tour guide and describe a location.","Real-Life Test: Give directions to someone in English."],"tip":"Use adjectives like historic, lively, peaceful, breathtaking to describe places."},{"id":"sm26","num":44,"level":4,"category":"Express Yourself","title":"Describe an Unforgettable Experience – Use Emotion and Detail","objective":"Learn how to tell a memorable story.","examples":[],"activities":["Write Your Story: Describe a memorable experience in detail.","Speaking Challenge: Tell your story with excitement and emotion.","Listening Task: Watch a travel vlog and summarize their experience."],"tip":"Use sensory details (what you saw, heard, felt) to make your story engaging."},{"id":"sm27","num":45,"level":4,"category":"Express Yourself","title":"Talk About Your Goals and Dreams – Inspire and Motivate","objective":"Learn to talk about your ambitions with enthusiasm.","examples":[],"activities":["Write Your Goals: List 3 goals and explain why they matter to you.","Speaking Challenge: Share your goals with a friend and discuss how to achieve them.","Motivation Video: Watch an inspirational speech and repeat key phrases."],"tip":"Use positive and confident language to make your dreams sound possible!"},{"id":"sm28","num":46,"level":4,"category":"Express Yourself","title":"Tell a Ghost Story or Urban Legend – Build Suspense","objective":"Learn how to tell a spooky story.","examples":[],"activities":["Write a Short Ghost Story: Keep it suspenseful!","Speaking Challenge: Tell your story using different tones and pauses.","Listening Exercise: Watch a scary story and try to retell it."],"tip":"Use whispering and pauses to make your story scarier."},{"id":"sm29","num":47,"level":4,"category":"Express Yourself","title":"Narrate a Funny Incident from Your Childhood – Keep It Engaging","objective":"Learn how to tell a humorous story.","examples":[],"activities":["Write Your Story: Describe a funny childhood memory.","Speaking Challenge: Tell your story to a friend with humor.","Joke Practice: Watch a comedian and repeat their storytelling style."],"tip":"Use expressions and gestures to make your story funnier."},{"id":"sm30","num":48,"level":4,"category":"Express Yourself","title":"Give Constructive Feedback – Help Others Improve","objective":"Learn how to correct someone politely.","examples":[],"activities":["Role-Play: One person presents, and the other gives feedback.","Write a Review: Give constructive criticism on a video or speech.","Speaking Challenge: Give feedback to a friend on a skill they're practicing."],"tip":"Start with something positive, then suggest improvements."},{"id":"sm31","num":49,"level":4,"category":"Express Yourself","title":"Explain a Complicated Process Step by Step – Break It Down Clearly","objective":"Learn to explain tasks in simple steps.","examples":[],"activities":["Write Instructions: Pick a task and describe how to do it.","Speaking Challenge: Explain a process to a friend without showing them.","Listening Exercise: Watch a tutorial and summarize the steps."],"tip":"Use sequence words like first, then, next, finally."},{"id":"sm32","num":50,"level":4,"category":"Express Yourself","title":"Tell a Story Using Only 3 Sentences – Creativity Challenge","objective":"Learn how to summarize a story concisely.","examples":[],"activities":["Challenge: Write a short 3-sentence story.","Game: Exchange stories with a friend and guess what happened.","Speaking Challenge: Tell your story dramatically in just three sentences."],"tip":"Make your story funny, suspenseful, or surprising!"},{"id":"sm33","num":51,"level":4,"category":"Express Yourself","title":"Give Advice to Someone – Sound Like a Wise Friend","objective":"Learn how to offer helpful and supportive advice.","examples":[],"activities":["Role-Play: One person shares a problem, and the other gives advice.","Write a Response: Pick a common problem (e.g., stress, procrastination) and write an advice column.","Speaking Challenge: Give advice to a friend about something you've experienced."],"tip":"Use phrases like \"You should try...\", \"Have you considered...?\", and \"One thing that worked for me is...\""},{"id":"sm34","num":52,"level":4,"category":"Express Yourself","title":"Describe a Picture or Scene in Detail – Improve Observation Skills","objective":"Learn how to give vivid descriptions.","examples":[],"activities":["Picture Description Challenge: Choose a random picture and describe it in 5 sentences.","Memory Game: Look at a tive":"Learn to express dissatisfaction professionally.","examples":[],"activities":["Practice Sentences: Write and say three polite complaint sentences.","Role-Play: One person plays a customer, and the other is the manager.","Listening Exercise: Watch a customer complaint video and repeat key phrases."],"tip":"Use \"I understand mistakes happen, but could we fix this?\" instead of sounding aggressive."},{"id":"sm39","num":28,"level":3,"category":"Problem-Solving & Professional Skills","title":"Negotiate a Price – Bargaining in English","objective":"Learn how to ask for a discount or lower price.","examples":[],"activities":["Role-Play: One person is a shopkeeper, and the other is a customer bargaining.","Real-Life Challenge: Try negotiating a price at a market or store.","Write a Bargaining Script: Write 5 sentences you can use while negotiating."],"tip":"Use confidence and friendly tone—don't be too aggressive."},{"id":"sm40","num":29,"level":3,"category":"Problem-Solving & Professional Skills","title":"Give Someone Directions – Helping Others Navigate","objective":"Learn how to guide someone clearly.","examples":[],"activities":["Practice Giving Directions: Look at a map and explain how to reach a place.","Role-Play: One person asks for directions, and the other gives them.","Real-Life Test: Explain directions to someone in real life."],"tip":"Use hand gestures and words like \"next to, across from, straight ahead.\""},{"id":"sm41","num":30,"level":3,"category":"Problem-Solving & Professional Skills","title":"Cancel or Reschedule an Appointment – Speak Clearly and Confidently","objective":"Learn to change or cancel plans professionally.","examples":[],"activities":["Role-Play: Practice rescheduling a doctor's appointment.","Writing Task: Write an email requesting to change a meeting time.","Speaking Challenge: Call a service and ask to reschedule an appointment."],"tip":"Always confirm the new date and time to avoid misunderstandings."},{"id":"sm42","num":31,"level":3,"category":"Problem-Solving & Professional Skills","title":"Ask for Help in an Emergency – What to Say in a Crisis","objective":"Learn how to ask for help quickly and clearly.","examples":[],"activities":["Memorize Emergency Phrases: Learn five key emergency sentences.","Role-Play: Practice an emergency situation with a partner.","Listening Task: Watch a 911 call video and repeat key phrases."],"tip":"Stay calm and speak clearly when describing an emergency."},{"id":"sm43","num":32,"level":3,"category":"Problem-Solving & Professional Skills","title":"Describe a Technical Issue – Talking to IT Support","objective":"Learn how to report tech problems effectively.","examples":[],"activities":["Write a Help Request: Describe a tech problem in 5 sentences.","Role-Play: One person is the IT support, the other is the customer.","Real-Life Practice: Call or message tech support and describe a problem."],"tip":"Be specific about the issue—avoid just saying \"It's not working.\""},{"id":"sm44","num":33,"level":3,"category":"Problem-Solving & Professional Skills","title":"Give a Persuasive Speech – Convincing Others","objective":"Learn to persuade people effectively.","examples":[],"activities":["Write a Short Speech: Pick a topic and write 5 sentences to persuade others.","Speaking Challenge: Record yourself giving a persuasive speech.","Debate Game: Try to convince a friend about a fun topic (e.g., Cats are better than dogs!)."],"tip":"Use facts, emotions, and confidence to persuade people."},{"id":"sm45","num":34,"level":3,"category":"Problem-Solving & Professional Skills","title":"Write and Leave a Voice Message – Clear and Concise Communication","objective":"Learn how to leave a professional voicemail.","examples":[],"activities":["Write a Short Voicemail: Keep it under 30 seconds.","Practice Speaking: Record yourself leaving a voicemail.","Role-Play: One person leaves a message, and the other responds later."],"tip":"Speak slowly and clearly so the message is easy .\"","\"That's an interesting idea, but I respectfully disagree.\""],"activities":["Debate Game: Choose a fun topic (e.g., \"Pizza is better than burgers\") and debate politely with a friend.","Role-Play: One person shares an opinion, and the other disagrees politely.","Writing Exercise: Write a short response disagreeing with a statement politely."],"tip":"Use positive body language (smile, nod) to keep the conversation friendly."},{"id":"sm50","num":39,"level":3,"category":"Problem-Solving & Professional Skills","title":"Talk About Your Work or Studies – Professional Self-Introduction","objective":"Learn how to introduce your job or studies confidently.","examples":[],"activities":["Write a Short Introduction: Describe your job or studies in 5 sentences.","Speaking Challenge: Introduce your profession to a friend or colleague.","Role-Play: Pretend you're at a networking event and introduce yourself to someone new."],"tip":"Use simple and clear language to explain your work or studies, especially to non-experts."},{"id":"sm51","num":55,"level":5,"category":"Real-World Mastery","title":"Survive a Job Interview in English – Answer Like a Native","objective":"Learn to respond confidently to common interview questions.","examples":[],"activities":["Write Your Answers: Prepare answers for 5 common interview questions.","Mock Interview: Practice with a friend or record yourself answering questions.","Listening Exercise: Watch real job interviews online and note common phrases."],"tip":"Use STAR (Situation, Task, Action, Result) when answering experience-based questions."},{"id":"sm52","num":56,"level":5,"category":"Real-World Mastery","title":"Pitch a Business Idea – Speak Like an Entrepreneur","objective":"Learn how to present a business idea in a persuasive and clear way.","examples":[],"activities":["Write a 1-Minute Pitch: Summarize your business idea in a few sentences.","Practice Public Speaking: Present your pitch in front of a mirror or record yourself.","Challenge: Try explaining your idea in 30 seconds for a quick pitch."],"tip":"Focus on the problem, solution, and benefits to make your pitch strong."},{"id":"sm53","num":57,"level":5,"category":"Real-World Mastery","title":"Argue Your Opinion in a Debate – Win with Words","objective":"Learn to defend your viewpoint confidently.","examples":[],"activities":["Pick a Debate Topic: Choose a fun or serious topic to argue about.","Role-Play a Debate: Take turns debating with a friend.","Speaking Challenge: Record yourself arguing both sides of a debate."],"tip":"Use facts, logic, and emotions to make your argument stronger."},{"id":"sm54","num":58,"level":5,"category":"Real-World Mastery","title":"Give a Speech at a Wedding or Event – Public Speaking Practice","objective":"Learn how to give a heartfelt speech.","examples":[],"activities":["Write a Short Speech: Choose an event (wedding, birthday, farewell) and draft a speech.","Practice Delivery: Focus on tone, pauses, and confidence.","Listening Task: Watch great speeches and repeat key phrases."],"tip":"Use a personal story or joke to make your speech engaging."},{"id":"sm55","num":59,"level":5,"category":"Real-World Mastery","title":"Make a Toast in English – Sound Confident in Celebrations","objective":"Learn how to give a short, meaningful toast.","examples":[],"activities":["Write a 2-Sentence Toast: Keep it simple but meaningful.","Practice Raising a Glass: Say your toast aloud with confidence.","Challenge: Try making a toast without preparing in advance."],"tip":"Smile and make eye contact while giving a toast!"},{"id":"sm56","num":60,"level":5,"category":"Real-World Mastery","title":"Negotiate a Deal at Work – Convince and Persuade","objective":"Learn how to reach an agreement professionally.","examples":[],"activities":["Role-Play a Negotiation: One person plays a customer, the other a salesperson.","Writing Exercise: Write an email negotiating a price or deal.","Listening Challenge: Watch a business negotiation video and repeat key phrases."],"tip":"Always offer win-win solutions."},{"id":"sm57","num":61,"level":5,"category":"Real-World Mastery","title":"Explain an Unfamiliar Concept – Teach a New Idea","objective":"Learn how to explain something complex in simple terms.","examples":[],"activities":["Pick a Complex Topic: Try explaining AI, climate change, or cryptocurrency.","Challenge: Explain your topic in two sentences only.","Role-Play: Teach a friend a new concept in a simple way."],"tip":"Use examples and comparisons to simplify your explanation."},{"id":"sm58","num":62,"level":5,"category":"Real-World Mastery","title":"Defend Your Point of View – Handling Disagreements Gracefully","objective":"Learn how to stay calm and confident while defending your ideas.","examples":[],"activities":["Pick a Discussion Topic: Defend your opinion with logical arguments.","Debate Challenge: Discuss with a friend and try to persuade them.","Listening Task: Watch a debate and analyze how speakers defend their ideas."],"tip":"Use polite but firm language to make your point clear."},{"id":"sm59","num":63,"level":5,"category":"Real-World Mastery","title":"Persuade Someone to Try Something New – Selling an Idea","objective":"Learn to convince someone to try a new experience.","examples":[],"activities":["Write a Persuasive Speech: Choose something fun and convince a friend to try it.","Role-Play: One person is hesitant, the other persuades.","Speaking Challenge: Record yourself convincing someone."],"tip":"Use enthusiasm and positive language to be more persuasive!"},{"id":"sm60","num":64,"level":5,"category":"Real-World Mastery","title":"Host a Q&A Session – Answering Questions on the Spot","objective":"Learn to answer questions confidently in real time.","examples":[],"activities":["Practice Answering Random Questions: Have a friend ask you anything!","Speaking Challenge: Record a video answering 3 audience-style questions.","Listening Task: Watch a Q&A and repeat key phrases."],"tip":"If you need time, say \"That's a great question. Let me think for a second.\""},{"id":"sm61","num":65,"level":5,"category":"Real-World Mastery","title":"Describe a Historical Event – Practice Storytelling","objective":"Learn how to explain history in an engaging way.","examples":[],"activities":["Write a Short Story: Describe a historical event in 5 sentences.","Speaking Challenge: Explain an event to a friend like a storyteller.","Real-Life Challenge: Watch a history video and summarize it."],"tip":"Use dates, locations, and key figures to make your story accurate."},{"id":"sm62","num":66,"level":5,"category":"Real-World Mastery","title":"Act as a Travel Guide for a Friend – Explain Destinations","objective":"Learn how to describe a place like a real tour guide.","examples":[],"activities":["Pick a Destination: Describe a city or country in detail.","Speaking Challenge: Pretend to be a tour guide and introduce a place.","Real-Life Practice: Explain your hometown to a friend in English."],"tip":"Use descriptive words (historic, vibrant, breathtaking) to make the destination sound exciting!"},{"id":"sm63","num":67,"level":5,"category":"Real-World Mastery","title":"Tell a Riddle and Solve One – Fun with Words","objective":"Learn how to tell and solve riddles in English.","examples":["\"I have keys but open no locks. What am I?\" (Answer: A piano!)","\"The more you take, the more you leave behind. What are they?\" (Answer: Footsteps!)"],"activities":["Memorize 3 Riddles: Learn and tell them to a friend.","Challenge a Friend: Find new riddles and try to solve them together.","Listening Task: Watch a video of riddles and try to answer before the solution is given."],"tip":"Use pauses and emphasis to make riddles more engaging!"},{"id":"sm64","num":68,"level":5,"category":"Real-World Mastery","title":"Role-Play a Doctor-Patient Conversation – Medical English Practice","objective":"Learn how to describe symptoms and understand medical advice.","examples":[],"activities":["Write a Doctor-Patient Conversation: Include symptoms, questions, and a diagnosis.","Role-Play: One person is the doctor, and the other is the patient.","Real-Life Challenge: Practice explaining a medical issue in English."],"tip":"Learn common medical phrases like \"I have a headache,\" \"My stomach hurts,\" or \"I need a prescription.\""},{"id":"sm65","num":69,"level":5,"category":"Real-World Mastery","title":"Debate Which is Better: Cats or Dogs? – Fun Challenge","objective":"Learn how to debate a fun topic with confidence.","examples":["Pro-Cat: \"Cats are more independent and don't need as much attention as dogs.\"","Pro-Dog: \"Dogs are more loyal and can protect you better than cats.\""],"activities":["Pick a Side: Decide if you're on Team Cat or Team Dog.","Role-Play a Debate: Take turns arguing for and against each pet.","Speaking Challenge: Convince a friend why your pet is better."],"tip":"Use facts and emotions to support your argument!"},{"id":"sm66","num":70,"level":6,"category":"Bonus Missions","title":"Talk to a Stranger for 5 Minutes – Push Your Limits","objective":"Build confidence in real-life conversations with new people.","examples":["\"Hi! I love your jacket. Where did you get it?\"","\"This place has great coffee. Have you been here before?\""],"activities":["Real-Life Challenge: Start a conversation with a stranger.","Role-Play: Practice with a friend as if they were a stranger.","Listening Task: Watch social experiments where people talk to strangers."],"tip":"Start with a compliment or a question to break the ice."},{"id":"sm67","num":71,"level":6,"category":"Bonus Missions","title":"Tell a Story Using Only 10 Words – Creativity Challenge","objective":"Learn to tell a mini-story in just 10 words.","examples":[],"activities":["Write a 10-word story: Make it funny, scary, or surprising.","Challenge a Friend: See who can create the best 10-word story.","Speaking Challenge: Say your story dramatically and with emotion."],"tip":"Choose powerful words to create a bigger impact!"},{"id":"sm68","num":72,"level":6,"category":"Bonus Missions","title":"Give a TED-Style Talk on a Random Topic – Impromptu Speaking","objective":"Speak confidently on any topic for 1-2 minutes.","examples":["\"Why mistakes make you smarter.\"","\"The secret power of smiling.\""],"activities":["Pick a Topic at Random: Speak for 1-2 minutes without preparation.","Record Yourself: Listen and improve your delivery.","Improv Challenge: Have a friend give you a random topic to talk about."],"tip":"Use hand gestures and pauses for a stronger impact!"},{"id":"sm69","num":73,"level":6,"category":"Bonus Missions","title":"Act Like a News Reporter – Announce Something Exciting","objective":"Learn how to report news in an engaging way.","examples":[],"activities":["Write a Short News Story: Make it serious or funny.","Speaking Challenge: Report it in an excited, professional tone.","Role-Play: Have a \"live interview\" with a friend as a news reporter."],"tip":"Speak clearly and with energy like a real reporter."},{"id":"sm70","num":74,"level":6,"category":"Bonus Missions","title":"Try an Accent Challenge – British, American, or Australian?","objective":"Improve pronunciation by mimicking different English accents.","examples":[],"activities":["Pick an Accent: Try saying a phrase in British, American, or Australian English.","Listening Challenge: Watch native speakers and repeat their sentences.","Accent Battle: Compete with a friend to see who does the best accent!"],"tip":"Focus on vowel sounds and intonation to sound more natural."},{"id":"sm71","num":75,"level":6,"category":"Bonus Missions","title":"Explain a Movie Plot Badly – Make It Funny!","objective":"Describe a movie in the funniest way possible.","examples":["Titanic: \"Rich girl ignores mom, falls for poor guy, ship sinks.\"","Harry Potter: \"Orphan boy gets glasses, fights noseless guy for seven years.\""],"activities":["Write a Funny Movie Summary: Pick a movie and describe it badly.","Speaking Challenge: Explain a movie in a funny way to a friend.","Guessing Game: Have a friend guess the movie from your bad explanation."],"tip":"Use exaggeration and sarcasm for extra humor!"},{"id":"sm72","num":76,"level":6,"category":"Bonus Missions","title":"Role-Play a Famous Historical Speech – Sound Like a Leader","objective":"Improve public speaking skills by delivering a famous speech.","examples":["Martin Luther King Jr.: \"I have a dream…\"","Winston Churchill: \"We shall fight on the beaches…\""],"activities":["Choose a Famous Speech: Memorize a few sentences.","Perform It Dramatically: Use strong voice and gestures.","Challenge: Rewrite the speech in your own words and deliver it."],"tip":"Speak slowly and with power for a strong impact."},{"id":"sm73","num":77,"level":6,"category":"Bonus Missions","title":"Sing a Song in English – Pronunciation and Fun","objective":"Improve pronunciation and rhythm by singing in English.","examples":[],"activities":["Pick an English Song: Sing along with subtitles.","Challenge: Try singing without looking at the lyrics.","Listening Task: Repeat after a singer and match their pronunciation."],"tip":"Songs help with fluency and natural stress patterns in speech!"},{"id":"sm74","num":78,"level":6,"category":"Bonus Missions","title":"Translate a Joke from Your Language to English – Humor Challenge","objective":"Improve fluency by translating jokes between languages.","examples":[],"activities":["Find a Joke in Your Language: Translate it into English.","Challenge a Friend: Tell your translated joke and see if they laugh.","Listen to English Jokes: Repeat and explain them in your language."],"tip":"Humor can be cultural, so adjust jokes for better understanding!"},{"id":"sm75","num":79,"level":6,"category":"Bonus Missions","title":"Create and Record a Mini-Podcast – Storytelling on the Go","objective":"Improve fluency by recording a short audio episode.","examples":[],"activities":["Choose a Topic: Talk about something you love.","Record Yourself: Make a 2-minute podcast episode.","Challenge: Add background music and sound effects!"],"tip":"Speak naturally, like you're talking to a friend."},{"id":"sm76","num":80,"level":6,"category":"Bonus Missions","title":"Tell a Scary Story Using Only Sound Effects – Creative Speaking","objective":"Use voice and sound effects to make a story creepy!","examples":[],"activities":["Make a List of Sounds: (Whispers, footsteps, wind, heartbeat, etc.)","Record a Scary Scene: Use only sounds and let people guess the story.","Challenge: Tell a horror story using just sound effects and facial expressions."],"tip":"Use pauses and whispers for extra suspense!"},{"id":"sm77","num":80,"level":6,"category":"Bonus Missions","title":"Convince Someone of a Fake Story – Build Confidence in Speaking","objective":"Improve storytelling skills by making up a believable fake story.","examples":[],"activities":["Write a Fake Story: Make it sound real but fun.","Challenge a Friend: See if they believe your fake story.","Speaking Practice: Record yourself telling the story convincingly."],"tip":"Use a confident tone and details to make it sound real!"},{"id":"sm78","num":81,"level":6,"category":"Bonus Missions","title":"Describe a Silent Movie Scene in Words – Imagination Challenge","objective":"Improve description skills by explaining a movie scene without sound.","examples":[],"activities":["Watch a Silent Movie Clip: Describe what is happening in words.","Challenge: Explain a scene to a friend without showing them the video.","Writing Exercise: Describe a silent comedy scene like Charlie Chaplin's movies."],"tip":"Use action words and emotions to bring scenes to life!"},{"id":"sm79","num":82,"level":6,"category":"Bonus Missions","title":"Talk Like a TV Advertiser – Sell Something!","objective":"Learn to speak persuasively like a TV commercial.","examples":[],"activities":["Pick an Everyday Object: Sell it like a commercial.","Speaking Challenge: Make a 30-second ad for a fake product.","Role-Play: Compete with a friend to see who sells better."],"tip":"Use excitement, catchy phrases, and repetition to sound convincing."},{"id":"sm80","num":83,"level":6,"category":"Bonus Missions","title":"Debate a Funny Topic (Aliens vs. Robots) – Have Fun While Speaking","objective":"Practice debating skills with a silly topic.","examples":[],"activities":["Pick a Fun Debate Topic:","Are aliens smarter than humans?","Would robots make better friends than humans?","Debate with a Friend: Each person defends their side.","Speaking Challenge: Try switching sides and arguing both points."],"tip":"Use humor and exaggeration to make debates more fun!"},{"id":"sm81","num":84,"level":6,"category":"Bonus Missions","title":"Explain a Trend on Social Media – Stay Updated in English","objective":"Improve fluency by discussing popular trends.","examples":[],"activities":["Pick a Viral Trend: Explain it in simple English.","Speaking Challenge: Describe a meme or trend to a friend.","Listening Task: Watch trend videos and summarize them."],"tip":"Use casual language and enthusiasm like social media influencers."},{"id":"sm82","num":85,"level":6,"category":"Bonus Missions","title":"Order Coffee Using Only Questions – Fun Experiment","objective":"Practice creative speaking by asking only questions.","examples":["\"Hi! What's the best coffee here?\"","\"Can I get something sweet?\"","\"Is this available in a small size?\""],"activities":["Challenge Yourself: Try ordering something using only questions.","Role-Play: One person is the customer, the other is the barista.","Real-Life Test: Try it at a real café and see if they understand!"],"tip":"Use different tones and expressions to make it sound natural."},{"id":"sm83","num":86,"level":6,"category":"Bonus Missions","title":"Give a Fake News Headline and Defend It – Think Fast!","objective":"Improve quick thinking and speaking fluency.","examples":[],"activities":["Create a Fake News Headline: Make it funny or shocking.","Speaking Challenge: Defend your fake news as if it's real.","Debate with a Friend: Try to convince them it's true."],"tip":"Use confidence and extra details to make it sound real!"},{"id":"sm84","num":87,"level":6,"category":"Bonus Missions","title":"Create an Improv Story with a Friend – Build Speaking Skills Together","objective":"Improve creativity by making up a story together.","examples":[],"activities":["Start a Story: Say one sentence, and let your friend continue.","Speaking Challenge: Try telling a full story without planning.","Listening Exercise: Watch an improv scene and describe it."],"tip":"Say \"Yes, and…\" to continue the story naturally!"},{"id":"sm85","num":88,"level":6,"category":"Bonus Missions","title":"Write and Perform a Short Skit – Improve Speaking & Acting","objective":"Learn how to act out a scene in English.","examples":[],"activities":["Write a 1-Minute Skit: It can be funny, dramatic, or silly.","Act It Out: Perform it with a friend.","Challenge: Do a skit without any script—just improvise!"],"tip":"Use gestures, facial expressions, and emotions to make it fun."},{"id":"sm86","num":89,"level":6,"category":"Bonus Missions","title":"Describe a Meme or Viral Video to Someone – Explain Visuals in Words","objective":"Learn how to explain funny or trending content.","examples":[],"activities":["Find a Popular Meme or Video: Explain it in words.","Speaking Challenge: Describe a meme to a friend without showing it.","Real-Life Challenge: Try explaining something visual in detail."],"tip":"Use descriptive and exaggerated language to make it funnier!"},{"id":"sm87","num":90,"level":6,"category":"Bonus Missions","title":"Describe a Meme or Viral Video to Someone – Explain Visuals in Words","objective":"Learn how to describe internet memes or viral videos in an engaging way.","examples":[],"activities":["Pick a Meme or Viral Video: Choose something trending and describe it.","Speaking Challenge: Explain the meme to a friend without showing it.","Real-Life Practice: Try explaining something visual in detail to someone who hasn't seen it."],"tip":"Use clear and expressive words to make the scene come alive!"},{"id":"smc1","num":1,"level":7,"category":"Speaking Challenges","title":"Introduce Yourself in 30 Seconds","objective":"Introduce yourself in 30 seconds. Mention the following: Your name, Where you're from, A fun fact about yourself or something you're passionate about, One goal you have for the future.","examples":[],"activities":["This challenge helps you get comfortable with introducing yourself in a short amount of time, forcing you to speak concisely and confidently."],"tip":"Speak clearly and confidently, even if you're unsure about the exact words. The goal is to get your message across without hesitation."},{"id":"smc2","num":2,"level":7,"category":"Speaking Challenges","title":"Describe Your Day Without Pausing","objective":"Describe your day from the moment you woke up until now. Try not to pause for more than a couple of seconds. If you stumble, keep going—just keep the flow! Make sure to talk about: What you did, where you went, who you spoke to, and anything interesting that happened.","examples":[],"activities":["Get used to speaking fluidly without second-guessing yourself. This challenge forces you to think and speak quickly, just like in a real conversation."],"tip":"If you don't know what to say next, describe what's around you or anything you might be thinking about in that moment. Practice is key here!"},{"id":"smc3","num":3,"level":7,"category":"Speaking Challenges","title":"Impromptu Object Description","objective":"Pick an object from your environment (could be a pen, cup, book, etc.). Describe the object in detail for 1 minute. Include: What it looks like (color, size, shape, texture), What it's used for, Any memories or associations you have with it.","examples":[],"activities":["This challenge will help you think quickly on your feet and describe things clearly without overthinking."],"tip":"Don't worry if you don't have much to say at first. The goal is to push yourself to keep talking and describing things in real-time."},{"id":"smc4","num":4,"level":7,"category":"Speaking Challenges","title":"Share Your Favorite Memory in 60 Seconds","objective":"Share your favorite memory in 60 seconds. Make sure to describe: Where you were, Who you were with, What happened, Why it stands out to you.","examples":[],"activities":["This challenge helps you speak emotionally and creatively about something that's meaningful to you, keeping it short and impactful."],"tip":"Focus on the emotions tied to the memory and try to engage your listener with vivid details. Keep it concise but colorful!"},{"id":"smc5","num":5,"level":7,"category":"Speaking Challenges","title":"Random Word Challenge (Speak for 1 Minute)","objective":"Choose a random word (can be anything—a color, object, feeling, etc.). Speak for 1 minute, using that word as the central theme of your talk. Don't stop or hesitate. Try to build a small story or discussion around the word.","examples":[],"activities":["This challenge helps you think fast and make connections between random topics."],"tip":"If you can't think of an immediate story, just describe the word in as many ways as you can. Let your imagination flow!"},{"id":"smc6","num":6,"level":7,"category":"Speaking Challenges","title":"Talk About a Place You've Never Been","objective":"Choose a place you've never been to but would like to visit. Talk about: Why you want to go there, What you imagine it would be like, What activities you would do there, The people or culture you might encounter.","examples":[],"activities":["This challenge encourages you to think creatively and describe a place you've never visited, building on what you know or imagine."],"tip":"Even if you've never been there, try to visualize the place and let your imagination run wild. You can also look up information to add more details."},{"id":"smc7","num":7,"level":7,"category":"Speaking Challenges","title":"Predict the Future in 2 Minutes","objective":"Predict something about the future (could be technology, culture, or any field of interest). Speak for 2 minutes on: What changes you think will happen, How they'll impact people or the world, What it could mean for society.","examples":[],"activities":["This challenge helps you think ahead and communicate your ideas in a speculative, confident manner."],"tip":"Stay confident in your predictions! Even if they're imaginative, expressing a vision of the future will help you get comfortable with speaking on topics you're unsure of."},{"id":"smc8","num":8,"level":7,"category":"Speaking Challenges","title":"Explain a Simple Process","objective":"Choose a simple process that you know well (e.g., making coffee, tying shoelaces, setting up an email account). Explain it clearly in 1 minute, step by step, without pausing.","examples":[],"activities":["This challenge improves your ability to break down a task or process in an easy-to-understand way, which is important in both conversations and professional settings."],"tip":"Make sure you include all necessary details, but keep it simple enough that anyone can follow along. Imagine you're explaining it to a beginner!"},{"id":"smc9","num":9,"level":7,"category":"Speaking Challenges","title":"Give Your Opinion on a Hot Topic","objective":"Choose a hot topic in the news or something you feel strongly about. Speak for 1 minute on: What the topic is, Your opinion on it, Why you hold that opinion, What change or action you think is needed.","examples":[],"activities":["This challenge boosts your ability to speak confidently and express your opinions, which is useful for debates or casual discussions."],"tip":"Make sure to explain your opinion with confidence, but be prepared to back it up with reasons. The goal is to speak with clarity, even if you're uncertain about the subject."},{"id":"smc10","num":10,"level":7,"category":"Speaking Challenges","title":"Discuss a Recent News Event","objective":"Pick a recent news event (from any category like politics, health, sports, etc.). Talk for 1 minute about: What happened, Why it's important, Your thoughts on the event and its consequences.","examples":[],"activities":["This challenge helps you stay informed and practice speaking about current events, making your conversations more relevant and engaging."],"tip":"Don't overthink it—just talk about the key points and share your views on why it matters. This is a great way to practice speaking about things you're encountering daily."},{"id":"smc11","num":11,"level":7,"category":"Speaking Challenges","title":"Two-Minute Elevator Pitch","objective":"Imagine you're in an elevator with someone important (e.g., a potential client, investor, or employer). You have only 2 minutes to introduce yourself and make an impact. Talk about: Who you are, What you do, Why you're worth listening to, A call to action (e.g., a meeting, a conversation, etc.).","examples":[],"activities":["This challenge helps you practice delivering a concise and effective pitch about yourself or your idea in a very short time."],"tip":"Make sure your pitch is clear and engaging—don't focus too much on details. Keep it short but memorable."},{"id":"smc12","num":12,"level":7,"category":"Speaking Challenges","title":"1-Minute Commercial for Your Favorite Product","objective":"Pick your favorite product (anything you love or use often). Sell it in 1 minute by explaining: What it is, Why it's the best choice, The benefits it offers, Why someone should buy it.","examples":[],"activities":["This challenge helps you practice persuasive speaking and marketing skills by selling a product in a short amount of time."],"tip":"Try to be energetic and enthusiastic about the product. Convince the listener that it's a must-have!"},{"id":"smc13","num":13,"level":7,"category":"Speaking Challenges","title":"Describe a Movie Plot in 90 Seconds","objective":"Pick a movie you've seen recently or your favorite movie. Describe its plot in 90 seconds, focusing on: The main story, The key characters, The resolution or ending.","examples":[],"activities":["This challenge encourages you to summarize and communicate information clearly and effectively in a short time."],"tip":"Avoid over-explaining. Keep the description concise and emphasize what makes the movie interesting or exciting!"},{"id":"smc14","num":14,"level":7,"category":"Speaking Challenges","title":"Convince Someone to Buy Something (1-Minute)","objective":"Pick any item (real or imagined) and try to convince someone to buy it in 1 minute. Explain: Why the product is valuable, What problem it solves, Why it's worth the money.","examples":[],"activities":["This challenge sharpens your persuasive speaking skills, which are valuable for sales, marketing, and day-to-day interactions."],"tip":"Focus on the benefits rather than just the features of the product. Speak as if the person is already interested."},{"id":"smc15","num":15,"level":7,"category":"Speaking Challenges","title":"Talk About a Skill You'd Love to Learn","objective":"Choose a skill you'd love to learn (e.g., cooking, playing a musical instrument, coding, etc.). Speak for 1 minute about: Why you want to learn this skill, How you think it would improve your life, What steps you might take to learn it.","examples":[],"activities":["This challenge helps you speak about personal interests and goals, promoting both self-reflection and fluid expression of desires."],"tip":"Be enthusiastic and share what excites you about the skill. Expressing personal desires will help you speak with passion!"},{"id":"smc16","num":16,"level":7,"category":"Speaking Challenges","title":"Share Your Dream Vacation Destination in 60 Seconds","objective":"Pick your dream vacation spot (real or imaginary). Describe the destination in 60 seconds, including: Where it is, Why you want to go there, What you would do there (activities, food, sightseeing).","examples":[],"activities":["This challenge helps you practice storytelling and keeps your speaking interesting by talking about a place you long to visit."],"tip":"Use descriptive language to paint a picture for your listener. Make it sound like the perfect getaway!"},{"id":"smc17","num":17,"level":7,"category":"Speaking Challenges","title":"Impromptu Debate: Agree or Disagree in 2 Minutes","objective":"Pick a statement (e.g., \"Technology is making people less social\"). Spend 2 minutes either agreeing or disagreeing with the statement. Present your argument, supporting your position with reasons or examples.","examples":[],"activities":["This challenge sharpens your debating and argumentative skills, teaching you to think on your feet."],"tip":"Stay calm and organized. If you're disagreeing, make sure to provide a clear counter-argument with supporting points."},{"id":"smc18","num":18,"level":7,"category":"Speaking Challenges","title":"Make a Compliment in 30 Seconds","objective":"Choose someone (real or imaginary) and give them a genuine compliment in 30 seconds. It can be about their appearance, personality, or skills.","examples":[],"activities":["This challenge helps you practice giving compliments in a positive and effective way."],"tip":"Be specific and sincere with your compliment. Make it sound personal rather than generic."},{"id":"smc19","num":19,"level":7,"category":"Speaking Challenges","title":"Talk About a Recent Dream You Had","objective":"Talk about a dream you had recently. Spend 1 minute describing: What happened in the dream, Who was involved, What emotions you felt, Why you think the dream is significant (if you know).","examples":[],"activities":["This challenge encourages creative thinking and storytelling, helping you practice describing abstract experiences."],"tip":"Dreams can be odd or hard to describe, so don't worry about being perfect. Just focus on painting a vivid picture with your words."},{"id":"smc20","num":20,"level":7,"category":"Speaking Challenges","title":"Present a Fictional Invention in 60 Seconds","objective":"Imagine you're presenting a new invention. Describe it in 60 seconds, including: What it does, How it works, Why it's useful or revolutionary.","examples":[],"activities":["This challenge encourages creativity and forces you to think quickly about a fictional idea that could change the world."],"tip":"The more creative, the better! Try to make it sound like a real-world innovation, even if it's completely made up."},{"id":"smc21","num":21,"level":7,"category":"Speaking Challenges","title":"Introduction to Public Speaking: 1-Minute Speech","objective":"Deliver a 1-minute speech about anything that interests you. Focus on: Clear articulation, Engaging tone, Keeping your message simple and impactful.","examples":[],"activities":["This challenge introduces you to public speaking, helping you practice delivering a short speech with confidence."],"tip":"Imagine you're speaking to a large audience. Confidence is key! Make sure to speak slowly and clearly."},{"id":"smc22","num":22,"level":7,"category":"Speaking Challenges","title":"Give a Toast at a Wedding","objective":"Imagine you're at a wedding. Give a toast that lasts about 1 minute, addressing the couple and their future together. Include a short, positive message for the couple Mention something memorable or meaningful about their relationship","examples":[],"activities":["This challenge helps you practice speaking in a formal, yet heartfelt manner, ideal for social gatherings."],"tip":"Make your speech sincere and joyful, avoiding anything that might sound too generic. Keep it short and sweet."},{"id":"smc23","num":23,"level":7,"category":"Speaking Challenges","title":"Deliver a 60-Second Pitch for Your Business Idea","objective":"Deliver a 60-second pitch about your business idea or any project you're working on. Make sure to include: What your business/project is about, Why it's unique, What problem it solves, Who your target audience is.","examples":[],"activities":["This challenge helps you refine your ability to present an idea concisely and with enthusiasm."],"tip":"Remember to focus on the most important aspects and make the pitch clear and compelling. Use this as an opportunity to practice your entrepreneurial spirit!"},{"id":"smc24","num":24,"level":7,"category":"Speaking Challenges","title":"Deliver a Thank You Speech","objective":"Imagine you've just received an award, recognition, or any gesture of kindness. Deliver a 1-minute thank you speech. Thank the person or group who gave you the recognition Express how it made you feel Share why it's important to you","examples":[],"activities":["This challenge helps you practice gratitude and expressing appreciation in a formal context."],"tip":"Be genuine with your gratitude. Use this as an opportunity to express your authentic emotions."},{"id":"smc25","num":25,"level":7,"category":"Speaking Challenges","title":"Explain a Difficult Topic Simply","objective":"Choose a difficult topic (e.g., quantum physics, cryptocurrency, climate change). Explain it in 1 minute, making sure to break it down simply: Use basic language, Avoid jargon or technical terms, Focus on the core idea.","examples":[],"activities":["This challenge helps you simplify complex ideas, making them more accessible and understandable."],"tip":"Imagine you're explaining the topic to someone with little to no knowledge of it. Try to make it as relatable as possible."},{"id":"smc26","num":26,"level":7,"category":"Speaking Challenges","title":"Talk About Your Favorite Book","objective":"Talk about your favorite book in 1 minute. Include: What the book is about, Why you love it, A favorite moment or lesson from the book.","examples":[],"activities":["This challenge helps you practice enthusiasm and storytelling when discussing something personal, like a favorite book."],"tip":"Make sure to show passion while talking about the book. The goal is to make your listener interested in reading it too!"},{"id":"smc27","num":27,"level":7,"category":"Speaking Challenges","title":"Speak About a Historical Figure","objective":"Choose a historical figure you find interesting. Speak for 1 minute on: Who they are, What they are known for, Why they are significant or influential.","examples":[],"activities":["This challenge improves your ability to speak about history concisely while focusing on a person's influence."],"tip":"Focus on the key achievements or contributions of the person and why they matter. Keep it clear and engaging."},{"id":"smc28","num":28,"level":7,"category":"Speaking Challenges","title":"Share an Interesting Fact About Yourself","objective":"Share a surprising or interesting fact about yourself. Speak for 1 minute about: The fact itself, Why it's interesting or unexpected, Any story or context behind it.","examples":[],"activities":["This challenge helps you practice talking about yourself in a way that captures attention and sparks curiosity."],"tip":"Choose something unique or uncommon about yourself. This could be a hidden talent, a quirky habit, or a memorable experience."},{"id":"smc29","num":29,"level":7,"category":"Speaking Challenges","title":"Describe an Important Lesson You've Learned","objective":"Talk about an important lesson you've learned in life. Explain: What the lesson was, How you learned it, How it's impacted your life.","examples":[],"activities":["This challenge helps you reflect and express valuable life lessons, improving your storytelling ability."],"tip":"Focus on the positive outcome and the personal growth that came from learning this lesson."},{"id":"smc30","num":30,"level":7,"category":"Speaking Challenges","title":"Give a 2-Minute Motivational Speech","objective":"Give a 2-minute speech focused on motivation and encouragement. Include: A personal story or message that can inspire others, Words of encouragement, A call to action or challenge for the listener.","examples":[],"activities":["This challenge pushes you to inspire and motivate others with a short, powerful speech."],"tip":"Use strong and positive language. Make sure your speech feels genuine, as if you're speaking directly to someone who needs motivation."},{"id":"smc31","num":31,"level":7,"category":"Speaking Challenges","title":"Tell a Story in 60 Seconds","objective":"Think of a story you can tell in 60 seconds. Make sure to include: The setting and context, The main event or conflict, The conclusion or outcome.","examples":[],"activities":["This challenge improves your ability to tell a quick but engaging story with a clear beginning, middle, and end."],"tip":"Stay focused on the key elements of the story. Keep it concise, but make sure it's engaging enough to capture your listener's attention."},{"id":"smc32","num":32,"level":7,"category":"Speaking Challenges","title":"Create a Story Based on Random Words","objective":"Choose 3 random words (could be anything—a color, a noun, an action, etc.). Create a story that connects these words within 90 seconds. Your story doesn't have to be perfect, just make it flow naturally.","examples":[],"activities":["This challenge stimulates creativity and helps you think on your feet by building a story from random elements."],"tip":"Don't overthink the words. The point is to practice making connections and storytelling on the spot."},{"id":"smc33","num":33,"level":7,"category":"Speaking Challenges","title":"Tell a Horror Story Without Hesitation","objective":"Create a short horror story in 1 minute. Include: An eerie setting, A creepy character or event, A twist or scary ending.","examples":[],"activities":["This challenge helps you speak with dramatic flair and suspense, making your storytelling more captivating."],"tip":"Use your tone to build suspense and surprise. Make it as vivid and chilling as possible, but don't worry about being too detailed."},{"id":"smc34","num":34,"level":7,"category":"Speaking Challenges","title":"Impromptu Story About a Dream Vacation","objective":"Create an impromptu story about a dream vacation you wish to go on. Talk for 90 seconds about: Where you're going, Who you're with, What you'll do there.","examples":[],"activities":["This challenge helps you practice vivid description and excitement while talking about an imaginary or future event."],"tip":"The more creative and detailed, the better! Engage your listener by painting a picture of your dream vacation."},{"id":"smc35","num":35,"level":7,"category":"Speaking Challenges","title":"Create a Story Using Only 5 Words","objective":"Create a short story using only 5 words. Use your imagination to come up with something interesting with those words.","examples":[],"activities":["This challenge forces you to get creative with language and storytelling in a very limited framework."],"tip":"This is a fun way to practice storytelling with constraints. The goal is to be creative and concise!"},{"id":"smc36","num":36,"level":7,"category":"Speaking Challenges","title":"Talk About a Time You Overcame a Fear","objective":"Talk about a time you overcame a fear. Spend 1 minute explaining: What the fear was, How it affected you, What steps you took to overcome it, How you felt afterward.","examples":[],"activities":["This challenge helps you practice sharing personal experiences and speaking with vulnerability, which can make your message more relatable."],"tip":"Be honest and authentic about your experience. Sharing personal stories helps build a connection with your audience."},{"id":"smc37","num":37,"level":7,"category":"Speaking Challenges","title":"Share a Fun Fact and Explain It","objective":"Share an interesting or surprising fact (it could be about animals, history, technology, etc.). Spend 1 minute explaining: What the fact is, Why it's interesting, Any additional details or context to make it more intriguing.","examples":[],"activities":["This challenge helps you practice delivering interesting facts in a way that engages and educates your audience."],"tip":"Make sure to explain the fact in simple terms, so it's easy for your listener to understand and appreciate."},{"id":"smc38","num":38,"level":7,"category":"Speaking Challenges","title":"Tell a Funny Story in 90 Seconds","objective":"Tell a funny story in 90 seconds. Focus on: A humorous situation you've experienced, The characters involved, The funny twist or ending.","examples":[],"activities":["This challenge helps you develop humor and quick thinking while telling an engaging, lighthearted story."],"tip":"Don't be afraid to exaggerate a little for comedic effect. Keep your tone playful and light-hearted."},{"id":"smc39","num":39,"level":7,"category":"Speaking Challenges","title":"Recount a Myth or Legend in Your Own Words","objective":"Choose a myth or legend (could be from your culture or a famous one like Hercules or King Arthur). Recount it in your own words in 90 seconds: Summarize the plot, Highlight key characters or events, Add your personal twist or opinion if you like.","examples":[],"activities":["This challenge improves your ability to tell traditional stories in your own voice, making them more engaging and accessible."],"tip":"Feel free to adapt the story to make it more interesting or relatable to your audience. Keep it entertaining!"},{"id":"smc40","num":40,"level":7,"category":"Speaking Challenges","title":"Share a Childhood Memory with Details","objective":"Share a childhood memory in 90 seconds. Include: Where you were, Who you were with, What happened, Why it's memorable to you.","examples":[],"activities":["This challenge helps you practice storytelling by diving into personal memories and emotions."],"tip":"Try to evoke emotions by adding sensory details like sounds, sights, or feelings. Personal stories often resonate the most when they're vivid."},{"id":"smc41","num":41,"level":7,"category":"Speaking Challenges","title":"Debate a Friend: Is Technology a Blessing or Curse?","objective":"Take a position on whether technology is a blessing or a curse (or let your friend choose a side). Spend 2 minutes defending your position, offering: Benefits or drawbacks of technology, Examples or statistics (if possible).","examples":[],"activities":["This challenge hones your debating skills, encouraging you to argue a position with confidence and evidence."],"tip":"Even if you're unsure about the topic, try to structure your points logically. Use examples that are easy to understand."},{"id":"smc42","num":42,"level":7,"category":"Speaking Challenges","title":"Agree or Disagree with a Famous Quote","objective":"Choose a famous quote (e.g., \"The only thing we have to fear is fear itself\"). Spend 1 minute agreeing or disagreeing with the quote. Explain: Why you agree or disagree, How it applies to real life or personal experience.","examples":[],"activities":["This challenge allows you to practice speaking about popular ideas and formulating your opinion based on others' words."],"tip":"Feel free to back up your opinion with personal stories or well-known examples. This helps add weight to your argument."},{"id":"smc43","num":43,"level":7,"category":"Speaking Challenges","title":"Why Should People Learn a Second Language?","objective":"Spend 2 minutes talking about why learning a second language is important. Explain: The personal or professional benefits, How it opens doors to new opportunities, Any personal experiences you have with learning a second language.","examples":[],"activities":["This challenge encourages you to speak on a topic that's beneficial and educational, helping to practice persuasion and explanation."],"tip":"Think about the global advantages of language learning and share those benefits clearly to persuade your listener."},{"id":"smc44","num":44,"level":7,"category":"Speaking Challenges","title":"Is Social Media Making Us Smarter?","objective":"Discuss whether social media is making us smarter or dumber. Speak for 2 minutes, making sure to: Present both sides of the a
