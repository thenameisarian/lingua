<style>
  :root{--teal:#0f9d8e;--teal-dark:#0b7d72;--teal-soft:#e6f6f3;--ink:#16302c;--muted:#6b8480;--line:#e4ecea;--bg:#f4f8f7;--rose:#e85d6b;--amber:#f0a020;--blue:#3b82c4;--violet:#7b6cf6;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;min-height:100vh}
  h1,h2{font-family:'Lora',serif}
  .wrap{max-width:500px;margin:0 auto;min-height:100vh;padding:16px 16px 40px;position:relative;z-index:2}
  .eyebrow{text-transform:uppercase;letter-spacing:.14em;font-size:11px;font-weight:700;color:var(--teal);margin-bottom:6px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 6px 22px rgba(16,60,55,.06);padding:18px;margin-bottom:14px;color:var(--ink)}
  .btn{border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:15px;border-radius:13px;padding:13px 16px;background:var(--teal);color:#fff;width:100%;box-shadow:0 4px 12px rgba(15,157,142,.25)}
  .btn:hover{background:var(--teal-dark)} .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line);box-shadow:none}
  .btn.row{display:flex;gap:10px}.btn.row>*{flex:1}

  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .chips{display:flex;gap:10px;font-weight:700;font-size:14px}
  .progress-top{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .x{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)}
  .bar{flex:1;height:9px;background:var(--line);border-radius:99px;overflow:hidden}.bar>i{display:block;height:100%;background:var(--teal);transition:width .3s}
  .tag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#fff;padding:3px 8px;border-radius:99px}
  .tag.out{background:var(--amber)}.tag.in{background:var(--blue)}.tag.say{background:var(--teal)}.tag.voc{background:var(--violet)}
  .chunk{font-family:'Lora';font-size:25px;font-weight:700;line-height:1.3;margin:6px 0}
  .use{color:var(--muted);font-size:14px;margin-top:6px}
  .eg{background:var(--teal-soft);border-radius:11px;padding:11px 13px;margin-top:12px;font-size:15px}
  .passage{font-size:17px;line-height:1.75}.passage b{color:var(--teal-dark)}
  .q{font-family:'Lora';font-size:20px;font-weight:600;margin:6px 0}
  .choices{display:flex;flex-direction:column;gap:9px;margin-top:14px}
  .choice{padding:13px;border:1.5px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;font-weight:600;text-align:left;font-size:15px}

  .mic.rec{background:var(--rose);animation:pp 1s infinite}@keyframes pp{0%{box-shadow:0 0 0 0 rgba(232,93,107,.5)}70%{box-shadow:0 0 0 14px rgba(232,93,107,0)}100%{box-shadow:0 0 0 0 rgba(232,93,107,0)}}

  .meta{flex:1}.meta b{font-size:15px}.meta small{color:var(--muted);display:block;font-size:12px}
  .big{font-size:48px;text-align:center}.center{text-align:center}.muted{color:var(--muted)}
  .grade-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
  .grade{padding:11px 4px;border-radius:12px;border:1.5px solid var(--line);background:#fff;cursor:pointer;font-weight:700;font-size:13px;text-align:center}
  .grade small{display:block;font-weight:500;font-size:10px;color:var(--muted)}
  .timer{font-family:'Lora';font-size:40px;text-align:center;margin:10px 0}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--teal-soft);color:var(--teal-dark)}
  .why{font-size:12px;color:var(--muted);background:#fff;border:1px dashed #cdded9;border-radius:11px;padding:10px;margin-top:10px}.why b{color:var(--teal-dark)}
  .status{font-weight:700;color:var(--muted)}
  .code{font-family:ui-monospace,Menlo,monospace;font-size:20px;font-weight:800;letter-spacing:.16em;color:var(--teal-dark);background:var(--teal-soft);padding:8px 12px;border-radius:10px;display:inline-block}
  table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;color:var(--muted);font-weight:600;padding-bottom:4px}td{padding:7px 0;border-top:1px solid var(--line)}
  .brand{font-family:'Lora';font-weight:700;font-size:26px;text-align:center;color:var(--teal-dark)}
  .aurora,.wall,.grain{display:none}
  body.wallon{background:radial-gradient(120% 120% at 50% 0%,#0c2e29,#04201c 70%);color:#eafdf8}
  body.wallon .aurora,body.wallon .wall,body.wallon .grain{display:block}
  body.wallon .top>div:first-child{color:#eafdf8} body.wallon .muted{color:#9fc7bf}
  body.wallon .brand{color:#eafdf8}
  .aurora,.aurora::before{position:fixed;inset:-30%;z-index:-2;content:""}
  .aurora{background:radial-gradient(40% 50% at 20% 25%,rgba(31,182,166,.55),transparent 60%),radial-gradient(45% 55% at 80% 20%,rgba(22,160,106,.45),transparent 60%),radial-gradient(50% 50% at 65% 80%,rgba(64,224,208,.40),transparent 60%),radial-gradient(40% 45% at 30% 85%,rgba(20,120,140,.45),transparent 60%);filter:blur(20px);animation:drift 22s ease-in-out infinite alternate}
  .aurora::before{background:radial-gradient(35% 40% at 70% 35%,rgba(120,255,220,.30),transparent 60%),radial-gradient(40% 45% at 25% 60%,rgba(31,182,166,.35),transparent 60%);animation:drift2 28s ease-in-out infinite alternate}
  @keyframes drift{0%{transform:translate(0,0) scale(1) rotate(0)}50%{transform:translate(4%,-3%) scale(1.1) rotate(4deg)}100%{transform:translate(-3%,4%) scale(1.05) rotate(-3deg)}}
  @keyframes drift2{0%{transform:translate(0,0) scale(1.1)}100%{transform:translate(5%,-5%) scale(1)}}
  .grain{position:fixed;inset:0;z-index:-1;opacity:.05;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.6) .5px,transparent .5px);background-size:3px 3px}
  .wall{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none}
  .appx{pointer-events:auto;text-decoration:none;display:flex;align-items:center;justify-content:center;position:absolute;opacity:.45;filter:saturate(.72);transition:opacity .2s,transform .2s}
  .appx:hover{opacity:1;filter:saturate(1);transform:scale(1.12);z-index:2}
  .appx .tile{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;border:1px solid rgba(255,255,255,.18);box-shadow:0 10px 22px -12px rgba(0,0,0,.7)}
  .appx .tile svg{width:24px;height:24px}.appx .tile img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
  @media(max-width:560px){.appx{opacity:.35}}
</style>
</head>

let syncT=null,syncing=false;

async function pushProgress(){if(!CTX.classId||syncing)return;syncing=true;try{await SUPA.from('lingua_progress').upsert({student_id:CTX.user.id,class_id:CTX.classId,state:S,updated_at:new Date().toISOString()},{onConflict:'student_id,class_id'});}catch(e){}syncing=false;}
function dayXP(){if(!S.day||S.day.d!==today())S.day={d:today(),xp:0};return S.day;}
function gainXP(n){S.xp+=n;dayXP().xp+=n;checkBadges();}
function touchDay(){const t=today();if(S.lastActive===t)return;const y=new Date(Date.now()-864e5).toISOString().slice(0,10);S.streak=S.lastActive===y?S.streak+1:1;S.lastActive=t;save();checkBadges();}
function dueChunks(){const now=Date.now();return Object.keys(S.cards).filter(id=>S.cards[id].seen!==false&&S.cards[id].due<=now);}
function vocabSeen(){return VOCAB.filter(v=>S.cards[v.id]).length;}

const LVNAME=['Newcomer','Beginner','Explorer','Talker','Connector','Achiever','Confident','Advanced','Fluent','Expert','Master'];
function levelInfo(){const xp=S.xp;let l=0;for(let i=0;i<LV.length;i++){if(xp>=LV[i])l=i;}const cur=LV[l],next=LV[l+1];const need=next?next-cur:0;const into=xp-cur;const pct=need?Math.min(100,Math.round(into/need*100)):100;return {level:l,name:LVNAME[l],pct,into,need};}

function badgeToast(b){const d=document.createElement('div');d.style.cssText='position:fixed;left:50%;top:18px;transform:translateX(-50%);z-index:120;background:#0c2a26;color:#eafdf8;border:1px solid rgba(255,255,255,.18);padding:10px 16px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.4);font-weight:600;font-size:14px;opacity:0;transition:opacity .3s,transform .3s';d.innerHTML='<span style="font-size:18px">'+b.ic+'</span> Badge unlocked — '+b.t;document.body.appendChild(d);requestAnimationFrame(()=>{d.style.opacity='1';d.style.transform='translateX(-50%) translateY(6px)';});setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),400);},2700);}

async function boot(){
  const {data:{session}}=await SUPA.auth.getSession();
  if(!session){authScreen();return;}
  await route();
}
SUPA.auth.onAuthStateChange((ev)=>{if(ev==='SIGNED_OUT')authScreen();});

function authScreen(mode){mode=mode||'login';wallOn();
  $('app').innerHTML=`<div style="height:24px"></div><div class="brand">Lingua</div><p class="center muted" style="font-size:13px;margin-bottom:18px">English with Arian Academy</p>
   <div class="card">
     <div class="btn row" style="margin-bottom:8px"><button class="btn ${mode==='login'?'':'ghost'}" onclick="authScreen('login')">Log in</button><button class="btn ${mode==='signup'?'':'ghost'}" onclick="authScreen('signup')">Sign up</button></div>
     ${mode==='signup'?`<input id="nm" placeholder="Your name">
       <select id="role"><option value="student">I'm a student</option><option value="teacher">I'm a teacher</option></select>`:''}
     <input id="em" type="email" placeholder="Email" autocomplete="email">
     <input id="pw" type="password" placeholder="Password (6+ characters)" autocomplete="current-password">
     <div id="aerr" class="muted" style="font-size:12px;color:var(--rose);margin-top:8px"></div>
     <button class="btn" style="margin-top:12px" id="ago" onclick="${mode==='signup'?'doSignup()':'doLogin()'}">${mode==='signup'?'Create account':'Log in'}</button>
   </div>
   <p class="center muted" style="font-size:11px">Your progress is saved to your account.</p>`;
}
async function doLogin(){const em=$('em').value.trim(),pw=$('pw').value;$('ago').disabled=true;$('aerr').textContent='';
  const {error}=await SUPA.auth.signInWithPassword({email:em,password:pw});
  if(error){$('aerr').textContent=error.message;$('ago').disabled=false;return;}
  await route();}
async function doSignup(){const em=$('em').value.trim(),pw=$('pw').value,nm=$('nm').value.trim(),role=$('role').value;
  if(!nm){$('aerr').textContent='Please enter your name.';return;}
  $('ago').disabled=true;$('aerr').textContent='';
  const {data,error}=await SUPA.auth.signUp({email:em,password:pw});
  if(error){$('aerr').textContent=error.message;$('ago').disabled=false;return;}
  if(!data.session){$('app').innerHTML=`<div class="card center" style="margin-top:40px"><div class="big">✉️</div><h2 style="font-size:20px">Check your email</h2><p class="muted">Confirm your email, then come back and log in.</p><button class="btn" style="margin-top:12px" onclick="authScreen('login')">Back to log in</button></div>`;
    localStorage.setItem('lingua_pending',JSON.stringify({name:nm,role}));return;}
  await SUPA.from('lingua_profiles').upsert({id:data.user.id,name:nm,role});
  await route();}

async function route(){
  const {data:{user}}=await SUPA.auth.getUser();
  if(!user){authScreen();return;}
  CTX.user=user;
  let prof=(await SUPA.from('lingua_profiles').select('*').eq('id',user.id).maybeSingle()).data;
  if(!prof){const pend=localStorage.getItem('lingua_pending');const p=pend?JSON.parse(pend):{name:(user.email||'').split('@')[0],role:'student'};
    await SUPA.from('lingua_profiles').upsert({id:user.id,name:p.name,role:p.role});localStorage.removeItem('lingua_pending');
    prof={id:user.id,name:p.name,role:p.role};}
  CTX.role=prof.role;CTX.name=prof.name;
  if(prof.role==='admin'){adminHome();return;}
  if(prof.role==='teacher'){teacherHome();return;}
  const enr=(await SUPA.from('lingua_enrollments').select('class_id,lingua_classes(id,name,level)').eq('student_id',user.id).limit(1)).data;
  if(enr&&enr.length&&enr[0].lingua_classes){const c=enr[0].lingua_classes;CTX.classId=c.id;CTX.className=c.name;CTX.level=c.level;await hydrate();home();}
  else studentJoin();
}
async function logout(){await SUPA.auth.signOut();CTX={user:null,role:null,name:'',classId:null,className:'',level:null};S=fresh();authScreen();}

async function hydrate(){const r=(await SUPA.from('lingua_progress').select('state').eq('student_id',CTX.user.id).eq('class_id',CTX.classId).maybeSingle()).data;
  S=Object.assign(fresh(),(r&&r.state)||{});}

/* ===== STUDENT: join a class ===== */
function studentJoin(){wallOn();
  $('app').innerHTML=`<div class="top"><div class="brand" style="font-size:20px">Lingua</div><button class="x" onclick="logout()">log out</button></div>
   <div class="card"><div class="eyebrow">Join your class</div><h2 style="font-size:19px">Welcome, ${escH(CTX.name)}!</h2>
   <p class="muted" style="font-size:13px">Enter the class code your teacher gave you.</p>
   <input id="jc" placeholder="Class code (e.g. A2-7K3P)" style="text-transform:uppercase">
   <div id="jerr" class="muted" style="font-size:12px;color:var(--rose);margin-top:6px"></div>
   <button class="btn" style="margin-top:10px" id="jgo" onclick="doJoin()">Join class</button></div>`;
}
async function doJoin(){const code=$('jc').value.trim().toUpperCase();if(!code){return;}$('jgo').disabled=true;$('jerr').textContent='';
  const {data,error}=await SUPA.rpc('lingua_join_class',{p_code:code,p_name:CTX.name});
  if(error||!data||!data.length){$('jerr').textContent='That code didn\'t work. Check it with your teacher.';$('jgo').disabled=false;return;}
  const c=data[0];CTX.classId=c.class_id;CTX.className=c.class_name;CTX.level=c.level;await hydrate();toast('Joined '+c.class_name);home();}

/* ===== STUDENT: learning home (level-gated) ===== */
function home(){
  touchDay();wallOn();
  const mine=levelUnits();
  const due=dueChunks().length, vt=VOCAB.length, vs=vocabSeen();
  const li=levelInfo(),dx=dayXP(),goalPct=Math.min(100,Math.round(dx.xp/(S.goal||30)*100)),bc=Object.keys(S.badges||{}).length;
  const doneCount=mine.filter(u=>S.unitsDone[u.id]).length;
  $('app').innerHTML=`<div class="top"><div style="font-family:Lora;font-weight:700;font-size:20px">Lingua · ${CTX.level}</div>
     <div class="chips"><span>🔥 ${S.streak}</span><span>⭐ ${S.xp}</span><button class="x" onclick="logout()" title="Log out">⎋</button></div></div>
   <div class="card" style="display:flex;align-items:center;gap:14px;cursor:pointer" onclick="badgesView()">
     ${ring(li.pct,'Lv '+li.level,li.name)}
     <div style="flex:1"><b style="font-size:15px">${escH(CTX.name)} · ${escH(CTX.className)}</b>
       <div class="muted" style="font-size:12px">${li.need?(li.into+' / '+li.need+' XP to level '+(li.level+1)):'Max level'}</div>
       <div style="display:flex;gap:16px;margin-top:8px;font-size:12px"><span>🏅 ${bc}</span><span>🎯 ${dx.xp}/${S.goal} today</span><span>📘 ${doneCount}/${mine.length}</span></div>
       <div class="bar" style="margin-top:6px"><i style="width:${goalPct}%"></i></div></div></div>
   ${due>0?`<div class="card row-item" onclick="startReview()"><div class="dot">🔄</div><div class="meta"><b>Review ${due} item(s)</b><small>Spaced repetition — due now</small></div><span class="pill">Review →</span></div>`:''}
   ${vt>0?`<div class="card row-item" onclick="vocabStudy()"><div class="dot">📚</div><div class="meta"><b>Vocabulary</b><small>${vs}/${vt} learned · words, phrasal verbs, idioms…</small></div><span class="pill">Learn →</span></div>`:''}
   <div class="card row-item" onclick="leaderboardView()"><div class="dot">🏆</div><div class="meta"><b>Class leaderboard</b><small>See how you rank in your class</small></div><span class="pill">View →</span></div>
   <div class="eyebrow" style="margin-top:6px">Your ${CTX.level} lessons</div>
   ${mine.length?mine.map(u=>`<div class="card row-item" onclick="startUnit('${u.id}')"><div class="dot">📘</div>
     <div class="meta"><b>${escH(u.title)}</b><small>${u.level} · ${escH(u.theme)}</small></div><span class="status">${S.unitsDone[u.id]?'✓':'›'}</span></div>`).join(''):'<div class="card muted">No lessons assigned to this level yet.</div>'}
   ${certBlock()}`;
}
function badgesView(){wallOff();const li=levelInfo();
  let h=`<div class="progress-top"><button class="x" onclick="home()">✕</button></div><div class="eyebrow">Achievements</div>
   <h1 style="font-size:22px;margin-bottom:4px">Level ${li.level} · ${li.name}</h1>
   <p class="muted" style="font-size:13px;margin-bottom:8px">${S.xp} XP · 🔥 ${S.streak} · daily goal ${S.goal} XP</p>
   <div class="btn row" style="margin-bottom:12px"><button class="btn ghost" onclick="setGoal()">Change daily goal</button></div>
   <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">`;
  BADGES.forEach(b=>{const got=S.badges&&S.badges[b.id];h+=`<div class="card" style="text-align:center;margin:0;${got?'':'opacity:.45'}"><div style="font-size:32px">${b.ic}</div><b style="font-size:13px">${b.t}</b><div class="muted" style="font-size:11px">${b.d}</div>${got?`<div class="pill" style="margin-top:6px">${got}</div>`:'<div class="muted" style="font-size:10px;margin-top:6px">locked</div>'}</div>`;});
  h+=`</div>`;$('app').innerHTML=h;}
function setGoal(){const v=parseInt(prompt('Daily XP goal:',S.goal||30),10);if(v&&v>0){S.goal=v;save();badgesView();}}

/* ===== level test + certificate (only the class level) ===== */
var TEST=null;
function levelDone(L){const us=UNITS.filter(u=>u.level===L);return us.length>0&&us.every(u=>S.unitsDone[u.id]);}
function certBlock(){const L=CTX.level;if(!UNITS.some(u=>u.level===L))return '';let h='';
  if(S.certs&&S.certs[L])h+='<div class="card row-item" onclick="showCert(\''+L+'\')"><div class="dot">🎓</div><div class="meta"><b>'+L+' certificate</b><small>Passed '+S.certs[L].date+' · '+S.certs[L].score+'%</small></div><span class="status">view</span></div>';
  else if(levelDone(L))h+='<div class="card row-item" onclick="startTest(\''+L+'\')"><div class="dot">📝</div><div class="meta"><b>'+L+' level test</b><small>All lessons done — earn your certificate</small></div><span class="pill">Test →</span></div>';
  return h?('<div class="eyebrow" style="margin-top:6px">Test &amp; certificate</div>'+h):'';}
function startTest(L){wallOff();const items=[];UNITS.filter(u=>u.level===L).forEach(u=>(u.quiz||[]).forEach(q=>items.push(q)));TEST={L,items:shuffle(items).slice(0,10),i:0,correct:0};testStep();}
function testStep(){const t=TEST;if(t.i>=t.items.length)return testDone();const q=t.items[t.i];
  const head='<div class="progress-top"><button class="x" onclick="home()">✕</button><div class="bar"><i style="width:'+(t.i/t.items.length*100)+'%"></i></div></div><div class="eyebrow">'+t.L+' level test · '+(t.i+1)+'/'+t.items.length+'</div>';
  if(q.type==='situation'){$('app').innerHTML=head+'<div class="card"><p style="font-size:16px">'+q.q+'</p><div class="choices" id="tq">'+q.options.map((o,x)=>'<button class="choice" data-x="'+x+'">'+o+'</button>').join('')+'</div></div>';
    document.querySelectorAll('#tq .choice').forEach(b=>b.onclick=()=>{document.querySelectorAll('#tq .choice').forEach(z=>{z.style.pointerEvents='none';z.classList.add('dim');});const ok=(+b.dataset.x)===q.a;b.classList.remove('dim');b.classList.add(ok?'correct':'wrong');if(!ok)document.querySelectorAll('#tq .choice')[q.a].classList.add('correct');if(ok)t.correct++;t.i++;setTimeout(testStep,ok?450:900);});}
  else{$('app').innerHTML=head+'<div class="card"><div class="q" style="font-size:18px">'+q.q+'</div><input id="tc" placeholder="answer"><div id="tcf"></div></div><button class="btn" id="tcb">Check</button>';
    const go=()=>{const v=norm($('tc').value);const ok=(q.accept||[q.a]).some(a=>norm(a)===v);$('tcf').innerHTML='<div class="fb '+(ok?'ok':'no')+'">'+(ok?'Correct ✓':'Answer: '+q.a)+'</div>';if(ok)t.correct++;t.i++;setTimeout(testStep,ok?500:1000);};
    $('tcb').onclick=go;setTimeout(()=>{const el=$('tc');if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')go();});},40);}}
function testDone(){const t=TEST;const pct=Math.round(t.correct/t.items.length*100);const pass=pct>=80;
  if(pass){if(!S.certs)S.certs={};S.certs[t.L]={date:today(),score:pct};S.gems+=20;save();confetti();checkBadges();}
  $('app').innerHTML='<div class="card center"><div class="big">'+(pass?'🎓':'💪')+'</div><h1 style="font-size:22px">'+(pass?t.L+' passed!':'Almost there')+'</h1><p class="muted">You scored '+pct+'%'+(pass?'':' — you need 80% to pass.')+'</p><button class="btn" style="margin-top:12px" onclick="'+(pass?'showCert(\''+t.L+'\')':'home()')+'">'+(pass?'View certificate':'Back home')+'</button></div>';}
function showCert(L){wallOff();const c=(S.certs&&S.certs[L])||{date:today(),score:100};
  $('app').innerHTML='<div class="progress-top"><button class="x" onclick="home()">✕</button></div><div class="card" style="text-align:center;border:2px solid var(--teal);padding:26px"><div class="eyebrow">Arian Academy · Lingua</div><div class="big">🎓</div><h1 style="font-size:23px;margin:6px 0">Certificate of Achievement</h1><p class="muted">This certifies that</p><h2 style="color:var(--teal);font-size:22px;margin:6px 0">'+escH(CTX.name)+'</h2><p class="muted">completed CEFR Level</p><h2 style="color:var(--teal);font-size:28px;margin:6px 0">'+L+'</h2><p class="muted">score '+c.score+'% · '+c.date+'</p></div><button class="btn" onclick="window.print()">Print / Save as PDF</button>';}

/* ===== vocabulary ===== */
function vocabStudy(){wallOff();
  const freshC=VOCAB.filter(v=>!S.cards[v.id]); const due=VOCAB.filter(v=>S.cards[v.id]&&S.cards[v.id].due<=Date.now());
  let queue=shuffle(freshC).slice(0,8); if(!queue.length)queue=shuffle(due).slice(0,12);
  if(!queue.length){$('app').innerHTML='<div class="card center"><div class="big">✅</div><h2 style="font-size:20px">All caught up!</h2><p class="muted">No new or due vocabulary right now.</p><button class="btn" style="margin-top:12px" onclick="home()">Back home</button></div>';return;}
  let i=0;
  function card(){if(i>=queue.length){save();home();return;}const v=queue[i];
    const typeName={word:'Word',collocation:'Collocation',phrasal:'Phrasal verb',idiom:'Idiom'}[v.type]||'Phrase';
    $('app').innerHTML=`<div class="progress-top"><button class="x" onclick="home()">✕</button><div class="bar"><i style="width:${i/queue.length*100}%"></i></div></div>
      <div class="card center"><div class="eyebrow"><span class="tag voc">${typeName}</span></div><div class="chunk">${v.term}</div>
      <div id="rev" style="display:none"><div class="use">${v.meaning}</div><div class="eg" style="margin-top:8px">${v.example}</div></div></div>
      <div id="f"><div class="btn row"><button class="btn ghost" onclick="speak('${esc(v.term)}')">🔊 Hear it</button><button class="btn" id="show">What does it mean?</button></div></div>`;
    $('show').onclick=()=>{$('rev').style.display='';$('f').innerHTML=`<div class="grade-row"><div class="grade" onclick="vg(1)">Again<small>didn't know</small></div><div class="grade" onclick="vg(2)">Hard</div><div class="grade" onclick="vg(3)">Good</div><div class="grade" onclick="vg(4)">Easy</div></div>`;};
    window.vg=(g)=>{S.cards[v.id]=fsrsReview(S.cards[v.id],g);gainXP(g>=3?5:2);save();i++;card();};}
  card();}

/* ===== unit player ===== */
function startUnit(id){wallOff();const u=UNITS.find(x=>x.id===id);if(!u)return;touchDay();
  const steps=[{t:'unitintro'}];u.chunks.forEach(c=>steps.push({t:'chunk',c}));steps.push({t:'grammar'});steps.push({t:'reading'});
  u.reading.questions.forEach(q=>steps.push({t:'mc',q}));if(u.reading.vocabInContext)steps.push({t:'mc',q:u.reading.vocabInContext});
  steps.push({t:'listen'});steps.push({t:'mc',q:u.listening.gist});steps.push({t:'dictogloss'});steps.push({t:'gap'});steps.push({t:'script'});
  steps.push({t:'minpair'});steps.push({t:'fluency'});steps.push({t:'retell'});steps.push({t:'speaktask'});
  steps.push({t:'model'});u.writing.sentenceCombining.forEach(s=>steps.push({t:'combine',s}));steps.push({t:'writetask'});
  u.quiz.forEach(q=>steps.push({t:'quiz',q}));steps.push({t:'unitdone'});
  SESS={u,steps,i:0,correct:0,total:0,xp:0};renderStep();}
let SESS=null;
function frame(inner,foot){const ss=SESS;$('app').innerHTML=`<div class="progress-top"><button class="x" onclick="home()">✕</button><div class="bar"><i style="width:${ss.i/ss.steps.length*100}%"></i></div></div><div id="b">${inner}</div><div id="f" style="margin-top:14px">${foot||''}</div>`;}
function next(){SESS.i++;if(SESS.i>=SESS.steps.length)renderStep();else renderStep();}
function award(n){SESS.xp+=n;gainXP(n);save();}
function renderStep(){const ss=SESS,u=ss.u,st=ss.steps[ss.i];
  if(st.t==='unitintro'){frame(`<div class="card center"><div class="big">📘</div><h1 style="font-size:22px">${escH(u.title)}</h1><p class="muted">${u.level} · ${escH(u.theme)}</p><div class="why" style="text-align:left">${escH(u.canDo)}</div></div>`,`<button class="btn" onclick="next()">Start →</button>`);}
  else if(st.t==='chunk'){frame(`<div class="eyebrow"><span class="tag say">Phrase</span> Listen, then say it aloud</div><div class="card"><div class="chunk">${st.c.text}</div><div class="use">${st.c.use}</div><div class="eg">e.g. ${st.c.example}</div><button class="btn ghost" style="max-width:170px;margin:14px auto 6px" onclick="speak('${esc(st.c.text)}')">🔊 Hear it</button><button class="btn" id="prac" style="max-width:220px;margin:0 auto">🎙 My turn</button><div class="muted center" id="hint" style="margin-top:8px">Tap “Hear it”, then “My turn”, and repeat aloud after the beep</div></div>`,`<button class="btn ghost" id="nx" style="display:none" onclick="next()">Next →</button>`);
    $('prac').onclick=()=>{$('prac').disabled=true;speak(st.c.text);const wn=norm(st.c.text).split(' ').filter(Boolean).length;const wait=Math.max(1200,wn*420);setTimeout(()=>{beep();$('hint').textContent='Your turn — say it aloud!';let s=Math.max(4,Math.round(wn*1.3));$('prac').textContent='🎙 '+s+'s';const iv=setInterval(()=>{s--;if(s<=0){clearInterval(iv);beep(520,160);$('prac').textContent='Done ✓';$('hint').textContent='Nice work!';award(4);$('nx').style.display='';}else $('prac').textContent='🎙 '+s+'s';},1000);},wait);};}
  else if(st.t==='grammar'){frame(`<div class="eyebrow"><span class="tag in">Grammar focus</span></div><div class="card"><h2 style="font-size:19px">${escH(u.grammar.focus)}</h2><p style="margin:8px 0"><b>Pattern:</b> ${u.grammar.pattern}</p>${u.grammar.examples.map(e=>`<div class="eg" style="margin-top:6px">${e}</div>`).join('')}</div>`,`<button class="btn" onclick="next()">Got it</button>`);}
  else if(st.t==='reading'){let p=u.reading.passage;u.chunks.forEach(c=>{const k=c.text.replace(/[?.!,]/g,'').trim();if(k&&p.includes(k))p=p.replace(k,'<b>'+k+'</b>');});frame(`<div class="eyebrow"><span class="tag in">Reading</span> The phrases in context</div><div class="card"><div class="passage">${p}</div></div>`,`<div class="btn row"><button class="btn ghost" onclick="speak('${esc(u.reading.passage)}')">🔊 Read aloud</button><button class="btn" onclick="next()">Questions →</button></div>`);}
  else if(st.t==='mc'){frame(`<div class="eyebrow"><span class="tag in">Comprehension</span></div><div class="card"><div class="q" style="font-size:18px">${st.q.q}</div><div class="choices" id="ch">${st.q.choices.map((c,x)=>`<button class="choice" data-x="${x}">${c}</button>`).join('')}</div></div>`,'');
    document.querySelectorAll('#ch .choice').forEach(b=>b.onclick=()=>{document.querySelectorAll('#ch .choice').forEach(z=>{z.style.pointerEvents='none';z.classList.add('dim');});const ok=+b.dataset.x===st.q.a;b.classList.remove('dim');b.classList.add(ok?'correct':'wrong');if(!ok)document.querySelectorAll('#ch .choice')[st.q.a].classList.add('correct');ss.total++;if(ok){ss.correct++;award(5);}setTimeout(next,ok?550:1000);});}
  else if(st.t==='listen'){frame(`<div class="eyebrow"><span class="tag in">Listening</span> Script hidden — just listen</div><div class="card center"><div class="big">🎧</div><button class="btn" style="max-width:180px;margin:10px auto" onclick="playScript()">▶︎ Play</button></div>`,`<button class="btn ghost" onclick="next()">I'm ready →</button>`);setTimeout(playScript,300);}
  else if(st.t==='dictogloss'){frame(`<div class="eyebrow"><span class="tag in">Dictogloss</span> Hear it, then rebuild it</div><div class="card"><button class="btn ghost" style="max-width:170px;margin:0 auto 10px" onclick="speak('${esc(u.listening.dictogloss.sentence)}')">🔊 Play sentence</button><input id="dg" placeholder="Type the sentence you heard"><div id="dfb"></div></div>`,`<button class="btn" onclick="checkDG()">Check</button>`);}
  else if(st.t==='gap'){frame(`<div class="eyebrow"><span class="tag in">Listen &amp; complete</span></div><div class="card"><div class="q" style="font-size:18px">${u.listening.gap.q}</div><input id="gp" placeholder="missing word"><div id="gfb"></div></div>`,`<div class="btn row"><button class="btn ghost" onclick="playScript()">🔊 Replay</button><button class="btn" onclick="checkGap()">Check</button></div>`);}
  else if(st.t==='script'){frame(`<div class="eyebrow">The script</div><div class="card">${u.listening.script.map(l=>`<div class="dline"><span class="who">${l.s}</span><span>${l.t}</span></div>`).join('')}</div>`,`<button class="btn" onclick="next()">Done →</button>`);}
  else if(st.t==='minpair'){const mp=u.speaking.minimalPair;const target=Math.random()<.5?mp.a:mp.b;frame(`<div class="eyebrow"><span class="tag say">Pronunciation</span> Minimal pair</div><div class="card center"><p class="use" style="margin-bottom:8px">${mp.note}</p><div class="btn row" style="max-width:240px;margin:0 auto"><button class="btn ghost" onclick="speak('${esc(mp.a)}')">🔊 ${mp.a}</button><button class="btn ghost" onclick="speak('${esc(mp.b)}')">🔊 ${mp.b}</button></div><p class="muted" style="margin:14px 0 6px">Which word is this?</p><button class="btn" style="max-width:160px;margin:0 auto" onclick="speak('${esc(target)}')">🔊 Play mystery</button><div class="choices" id="mpc"><button class="choice center">${mp.a}</button><button class="choice center">${mp.b}</button></div></div>`,'');

  $('go').onclick=()=>{$('go').style.display='none';beep();$('hint').textContent='Speak now! 🎙';let s=secs;$('tm').textContent='0:'+(s<10?'0':'')+s;const iv=setInterval(()=>{s--;$('tm').textContent='0:'+(s<10?'0':'')+s;if(s<=0){clearInterval(iv);beep(440,320);$('tm').textContent='✓';$('hint').textContent='Well done — great speaking!';award(10);ss.total++;ss.correct++;$('nx').style.display='';}},1000);};}

function checkGap(){const u=SESS.u;const v=norm($('gp').value);const ok=(u.listening.gap.accept||[u.listening.gap.a]).some(a=>norm(a)===v);$('gfb').innerHTML=`<div class="fb ${ok?'ok':'no'}">${ok?'Correct! ✓':'Answer: '+u.listening.gap.a}</div>`;SESS.total++;if(ok){SESS.correct++;award(5);}setTimeout(next,ok?700:1300);}
function checkCombine(){const st=SESS.steps[SESS.i];const v=norm($('sc').value);const ok=norm(st.s.answer)===v||(v.length>=norm(st.s.parts.join(' ')).length*0.6&&st.s.parts.every(p=>{const w=norm(p).split(' ')[0];return v.includes(w);}));$('scfb').innerHTML=`<div class="fb ${ok?'ok':'no'}">${ok?'Nice sentence! ✓':'A good version: '+st.s.answer}</div>`;SESS.total++;if(ok){SESS.correct++;award(8);}setTimeout(next,1400);}
function checkWrite(){const u=SESS.u;const txt=$('wt').value;const words=norm(txt).split(' ').filter(Boolean).length;const inc=(u.writing.task.mustInclude||[]);const hit=inc.filter(id=>{const k=norm(CHUNK(id).text).split(' ').slice(0,3).join(' ');return norm(txt).includes(k);});const ok=words>=u.writing.task.minWords&&(inc.length===0||hit.length>=1);$('wfb').innerHTML=`<div class="fb ${ok?'ok':'no'}">${ok?'Nice work! ✓':(words<u.writing.task.minWords?('Add a little more — '+words+'/'+u.writing.task.minWords+' words.'):'Try to use one of the phrases.')}</div>`;if(ok){SESS.total++;SESS.correct++;award(12);setTimeout(next,900);}else{$('f').innerHTML='<button class="btn" onclick="next()">Continue anyway →</button>';}}
function checkQuizCloze(){const st=SESS.steps[SESS.i];const v=norm($('cz').value);const ok=(st.q.accept||[st.q.a]).some(a=>norm(a)===v);$('czfb').innerHTML=`<div class="fb ${ok?'ok':'no'}">${ok?'✓':'Answer: '+st.q.a}</div>`;SESS.total++;if(ok){SESS.correct++;award(5);}setTimeout(next,ok?700:1300);}

function confetti(){for(let k=0;k<24;k++){const c=document.createElement('div');c.style.cssText=`position:fixed;top:-10px;left:${Math.random()*100}vw;width:8px;height:8px;z-index:99;border-radius:2px;background:${['#0f9d8e','#f5b73d','#e85d6b','#3b82c4'][k%4]};transition:transform 1.3s ease,opacity 1.3s;pointer-events:none`;document.body.appendChild(c);requestAnimationFrame(()=>{c.style.transform=`translateY(${60+Math.random()*40}vh) rotate(${Math.random()*720}deg)`;c.style.opacity='0';});setTimeout(()=>c.remove(),1400);}}

  const lvlUnits=UNITS.filter(u=>u.level===c.level);
  const doneInLevel=lvlUnits.filter(u=>(st.unitsDone||{})[u.id]);
  const xp=st.xp||0;let lv=0;for(let i=0;i<LV.length;i++)if(xp>=LV[i])lv=i;
  const cert=(st.certs&&st.certs[c.level])?(st.certs[c.level].score+'% · '+st.certs[c.level].date):'—';
  const allCls=(await SUPA.from('lingua_classes').select('id,name,level').order('level')).data||[];
  let h=`<div class="progress-top"><button class="x" onclick="classView('${cid}')">✕</button></div>
   <div class="eyebrow">${escH(c.name)} · ${c.level}</div><h2 style="font-size:22px">${escH(name)}</h2>
   <div class="card"><div style="display:flex;gap:14px;flex-wrap:wrap;font-size:13px">
     <span><b>Level ${lv}</b> · ${LVNAME[lv]}</span><span>⭐ ${xp} XP</span><span>🔥 ${st.streak||0}</span>
     <span>📘 ${doneInLevel.length}/${lvlUnits.length}</span><span>📚 ${st.cards?Object.keys(st.cards).length:0}</span><span>🎓 ${cert}</span>
     <span class="muted">Last active: ${st.lastActive||'—'}</span></div></div>
   <div class="eyebrow">${c.level} units (${doneInLevel.length}/${lvlUnits.length})</div>
   <div class="card">${lvlUnits.map(u=>`<div class="row-item" style="cursor:default;margin:2px 0"><div class="dot" style="width:28px;height:28px;font-size:13px;background:${(st.unitsDone||{})[u.id]?'#e9f8f0':'var(--teal-soft)'}">${(st.unitsDone||{})[u.id]?'✓':'·'}</div><div class="meta"><small>${escH(u.title)}</small></div></div>`).join('')||'<p class="muted">No units at this level.</p>'}</div>
   <div class="eyebrow">Actions</div>
   <div class="card"><label class="muted" style="font-size:12px">Move to another class / level</label>
     <select id="mvc">${allCls.filter(x=>x.id!==cid).map(x=>`<option value="${x.id}">${escH(x.name)} (${x.level})</option>`).join('')||'<option value="">No other classes</option>'}</select>
     <button class="btn" style="margin-top:8px" onclick="moveStudent('${sid}','${cid}')">Move student</button>
     <button class="btn ghost" style="margin-top:8px" onclick="resetStudent('${sid}','${cid}')">Reset progress</button>
     <button class="btn ghost" style="margin-top:8px" onclick="removeStudent('${sid}','${cid}')">Remove from class</button></div>`;
  $('app').innerHTML=h;}
async function moveStudent(sid,cid){const to=$('mvc').value;if(!to){toast('No target class');return;}if(!confirm('Move this student to the selected class?'))return;
  const {error}=await SUPA.rpc('lingua_move_student',{p_student:sid,p_to_class:to});
  if(error){toast('Could not move student');return;}toast('Student moved');classView(to);}
async function resetStudent(sid,cid){if(!confirm('Reset progress for this student? This cannot be undone.'))return;
  const {error}=await SUPA.from('lingua_progress').update({state:{}}).eq('student_id',sid).eq('class_id',cid);
  if(error){toast('Could not reset');return;}toast('Progress reset');studentView(sid,cid);}
async function removeStudent(sid,cid){if(!confirm('Remove this student from the class?'))return;
  await SUPA.from('lingua_progress').delete().eq('student_id',sid).eq('class_id',cid);
  await SUPA.from('lingua_enrollments').delete().eq('student_id',sid).eq('class_id',cid);
  toast('Removed');classView(cid);}
async function usersView(){wallOff();
  const profs=(await SUPA.from('lingua_profiles').select('id,name,role')).data||[];
  const ord={admin:0,teacher:1,student:2};
  profs.sort((a,b)=>(ord[a.role]-ord[b.role])||((a.name||'').localeCompare(b.name||'')));
  let h=`<div class="progress-top"><button class="x" onclick="adminHome()">✕</button></div><div class="eyebrow">People (${profs.length})</div><h2 style="font-size:22px;margin-bottom:10px">Manage roles</h2>`;
  if(!profs.length)h+=`<p class="muted center">No users yet.</p>`;
  profs.forEach(p=>{h+=`<div class="card" style="display:flex;align-items:center;gap:10px"><div class="meta"><b>${escH(p.name||'(no name)')}</b><small>${p.role}</small></div>
    <select id="role_${p.id}" style="width:auto;margin:0">${['student','teacher','admin'].map(r=>`<option value="${r}" ${r===p.role?'selected':''}>${r}</option>`).join('')}</select>
    <button class="btn ghost" style="width:auto;padding:9px 12px" onclick="setUserRole('${p.id}')">Set</button></div>`;});
  $('app').innerHTML=h;}
async function setUserRole(uid){const role=$('role_'+uid).value;const {error}=await SUPA.rpc('lingua_set_role',{p_user:uid,p_role:role});
  if(error){toast('Could not update role');return;}toast('Role updated');usersView();}
async function exportCSV(){
  const [profsR,clsR,enrR,progR]=await Promise.all([SUPA.from('lingua_profiles').select('id,name,role'),SUPA.from('lingua_classes').select('*'),SUPA.from('lingua_enrollments').select('class_id,student_id,student_name'),SUPA.from('lingua_progress').select('student_id,class_id,state')]);
  const cls=(clsR.data||[]),enr=(enrR.data||[]),prog=(progR.data||[]);
  const pk={};prog.forEach(p=>pk[p.student_id+'|'+p.class_id]=p.state||{});
  const cmap={};cls.forEach(c=>cmap[c.id]=c);
  const rows=[['Name','Class','Level','XP','LevelNum','Streak','UnitsDone','Vocab','Certificate','LastActive']];
  enr.forEach(e=>{const st=pk[e.student_id+'|'+e.class_id]||{};const c=cmap[e.class_id]||{};const xp=st.xp||0;let lv=0;for(let i=0;i<LV.length;i++)if(xp>=LV[i])lv=i;const cert=(st.certs&&c.level&&st.certs[c.level])?st.certs[c.level].score+'%':'';rows.push([e.student_name||'',c.name||'',c.level||'',xp,lv,st.streak||0,Object.keys(st.unitsDone||{}).length,st.cards?Object.keys(st.cards).length:0,cert,st.lastActive||'']);});
  const csv=rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='lingua-students.csv';document.body.appendChild(a);a.click();a.remove();toast('CSV downloaded');}
async function leaderboardView(){wallOff();
  const r=await SUPA.rpc('lingua_leaderboard',{p_class:CTX.classId});const rows=r.data||[];
  let h=`<div class="progress-top"><button class="x" onclick="home()">✕</button></div><div class="eyebrow">${escH(CTX.className)} · ${CTX.level}</div><h1 style="font-size:22px;margin-bottom:10px">🏆 Leaderboard</h1>`;
  if(!rows.length)h+=`<p class="muted center">No scores yet — be the first!</p>`;
  else{h+=`<div class="card">`+rows.map((s,i)=>{const me=(s.name===CTX.name);const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';return `<div class="row-item" style="cursor:default;padding:7px 4px;${me?'background:var(--teal-soft);border-radius:10px':''}"><div style="width:32px;text-align:center;font-weight:700">${medal}</div><div class="meta"><b style="font-size:14px">${escH(s.name)}${me?' (you)':''}</b></div><div style="font-weight:700;width:64px;text-align:right">⭐ ${s.xp}</div><div class="muted" style="width:52px;text-align:right">🔥 ${s.streak}</div></div>`;}).join('')+`</div>`;}
  $('app').innerHTML=h;}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}
boot();
</script>
