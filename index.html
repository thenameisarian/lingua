t to confuse correlation with cause. Use signals like 'because', 'leads to', 'as a result', 'therefore' to make relationships clear.","model":"'Skipping sleep (cause) lowers focus and mood (effects).' Clear cause, clear effects.","practice":[{"q":"'As a result' signals…","choices":["an effect","a comparison"],"a":0,"explain":"It introduces a result."},{"q":"Correlation means…","choices":["two things happen together, not always one causing the other","one always causes the other"],"a":0,"explain":"Don't assume cause from correlation."}],"task":{"prompt":"Write a paragraph explaining one cause and at least two of its effects, using cause/effect signals.","minWords":65,"checklist":["One cause","2+ effects","Uses signals"]}},{"id":"w7-3","module":4,"moduleName":"Patterns of Development","week":7,"day":3,"title":"Classification","goal":"I can organize information by sorting it into categories.","idea":"Classification splits a topic into clear, non-overlapping categories using a single basis. Name your basis (the principle you sort by) and make sure every item fits one category.","model":"Topic: coffee drinkers, sorted by purpose: for energy, for taste, for social ritual. One basis, three clear groups.","practice":[{"q":"Good categories should be…","choices":["non-overlapping","mostly the same"],"a":0,"explain":"Each item fits one group."},{"q":"A 'basis' for classification is…","choices":["the principle you sort by","the conclusion"],"a":0,"explain":"Sort by one principle."}],"task":{"prompt":"Write a paragraph classifying a topic into three clear categories based on one principle.","minWords":65,"checklist":["3 categories","One sorting basis"]}},{"id":"w7-4","module":4,"moduleName":"Patterns of Development","week":7,"day":4,"title":"Process (how-to)","goal":"I can write clear step-by-step instructions.","idea":"Process writing explains how to do or how something works, in order. Use chronological steps, clear verbs, and signals ('first', 'next', 'then', 'finally'). Don't skip steps the reader needs.","model":"'First, gather your tools. Next, measure twice. Then cut once. Finally, sand the edges.'","practice":[{"q":"Process writing is organized by…","choices":["time order (steps)","importance"],"a":0,"explain":"Chronological steps."},{"q":"Each step should use…","choices":["clear action verbs","vague words"],"a":0,"explain":"Tell the reader exactly what to do."}],"task":{"prompt":"Write a clear how-to paragraph with at least four ordered steps and time signals.","minWords":65,"checklist":["4+ steps","Time signals","Clear verbs"]}},{"id":"w7-5","module":4,"moduleName":"Patterns of Development","week":7,"day":5,"title":"Choose a pattern & outline","goal":"I can pick the right pattern for my purpose and outline it.","idea":"The pattern should fit your purpose: comparing options? compare/contrast. Explaining why? cause/effect. Sorting types? classification. Teaching a method? process. Choose, then outline using that pattern's structure.","model":"To help readers choose a laptop, compare/contrast fits best.","practice":[{"q":"To explain why sales dropped, the best pattern is…","choices":["cause & effect","process"],"a":0,"explain":"It explains why."},{"q":"The pattern should fit your…","choices":["purpose","favorite color"],"a":0,"explain":"Purpose drives the pattern."}],"task":{"prompt":"Choose a topic and pattern, state why it fits, and outline a short essay using that pattern.","minWords":60,"checklist":["States pattern + why","Outline matches pattern"]}},{"id":"w8-1","module":4,"moduleName":"Patterns of Development","week":8,"day":1,"title":"Mixing patterns","goal":"I can combine patterns within one piece.","idea":"Real writing often blends patterns: a process essay may use cause/effect to explain why a step matters; a comparison may classify types first. Use a main pattern for structure and others as support where helpful.","model":"A 'how to save money' essay uses process (steps) but adds cause/effect ('skipping this leads to debt').","practice":[{"q":"When mixing patterns, you should…","choices":["keep one main pattern for structure","switch randomly"],"a":0,"explain":"One backbone, others support."},{"q":"Mixing patterns is…","choices":["normal in real writing","always wrong"],"a":0,"explain":"Blending is natural."}],"task":{"prompt":"Write a paragraph that uses one main pattern and brings in a second pattern to support a point.","minWords":65,"checklist":["Clear main pattern","Second pattern supports"]}},{"id":"w8-2","module":4,"moduleName":"Patterns of Development","week":8,"day":2,"title":"Description & narration","goal":"I can use vivid description and short narrative for impact.","idea":"Concrete details and brief stories make writing memorable. Show with specifics (sights, sounds, actions) instead of telling with labels. A short anecdote can hook a reader or prove a point.","model":"Telling: 'The market was busy.' Showing: 'Vendors shouted prices as the smell of grilled corn drifted over the crowd.'","practice":[{"q":"'Showing' means…","choices":["using concrete sensory detail","stating a label"],"a":0,"explain":"Specifics create images."},{"q":"A short anecdote can…","choices":["hook the reader","replace the thesis"],"a":0,"explain":"Stories engage readers."}],"task":{"prompt":"Rewrite a flat sentence into 2-3 vivid 'showing' sentences using concrete detail.","minWords":50,"checklist":["Concrete detail","Shows, not tells"]}},{"id":"w8-3","module":4,"moduleName":"Patterns of Development","week":8,"day":3,"title":"Argument & persuasion basics","goal":"I can make a claim and defend it against objections.","idea":"Persuasion = a clear claim + strong reasons + evidence + addressing the other side. Acknowledging a counterargument and answering it makes you more convincing, not less.","model":"'Some say remote work hurts teamwork. Yet regular video check-ins keep teams closer than ever.' — counter and rebuttal.","practice":[{"q":"Addressing the opposing view makes your argument…","choices":["stronger","weaker"],"a":0,"explain":"It shows fairness and strength."},{"q":"Persuasion needs…","choices":["claim, reasons, evidence","only opinion"],"a":0,"explain":"Back your claim."}],"task":{"prompt":"Write a persuasive paragraph: state a claim, give a reason with evidence, then answer one counterargument.","minWords":70,"checklist":["Clear claim","Evidence","Answers a counterargument"]}},{"id":"w8-4","module":4,"moduleName":"Patterns of Development","week":8,"day":4,"title":"Revise your pattern essay","goal":"I can revise a pattern-based piece for clarity and fit.","idea":"Check that your chosen pattern is carried out consistently, that signals match the pattern, and that support is specific. Revise anything that breaks the pattern or confuses the reader.","model":"In a compare/contrast essay, a writer fixes a paragraph that accidentally only discussed one subject.","practice":[{"q":"In a pattern essay, the pattern should be…","choices":["carried out consistently","abandoned halfway"],"a":0,"explain":"Stay consistent."},{"q":"Signals should…","choices":["match the chosen pattern","be random"],"a":0,"explain":"Pattern and signals align."}],"task":{"prompt":"Revise a pattern paragraph you wrote this module so the pattern is consistent and support is specific.","minWords":65,"checklist":["Consistent pattern","Specific support"]}},{"id":"w8-5","module":4,"moduleName":"Patterns of Development","week":8,"day":5,"title":"Project: a pattern-based essay","goal":"I can write a complete essay using a pattern of development.","idea":"Your Module 4 showcase: a short essay (intro, 2-3 bodies, conclusion) built on one pattern, with clear signals, specific support, and at least one persuasive or descriptive touch.","model":"A clean pattern essay makes its structure obvious and easy to follow.","practice":[{"q":"Your pattern essay should…","choices":["use one clear pattern throughout","change patterns each paragraph"],"a":0,"explain":"One backbone pattern."},{"q":"It should include…","choices":["specific support","no examples"],"a":0,"explain":"Support persuades."}],"task":{"prompt":"Write a complete pattern-based essay (intro, 2-3 body paragraphs, conclusion) using one pattern consistently.","minWords":180,"checklist":["One pattern","Intro + bodies + conclusion","Specific support"]}},{"id":"w9-1","module":5,"moduleName":"The Research Paper","week":9,"day":1,"title":"What a research paper is","goal":"I can choose a focused research question.","idea":"A research paper answers a question using evidence from sources, in your own structured argument. Start with a question that is focused (not too broad), arguable, and researchable. 'Is social media bad?' is too broad; narrow it.","model":"Too broad: 'social media'. Focused: 'How does social media use affect the sleep of teenagers?'","practice":[{"q":"A good research question is…","choices":["focused and researchable","as broad as possible"],"a":0,"explain":"Narrow enough to answer well."},{"q":"A research paper presents…","choices":["your argument backed by sources","only your opinion"],"a":0,"explain":"Evidence-based."}],"task":{"prompt":"Write one focused, researchable question and explain in a sentence why it interests you.","minWords":45,"checklist":["Focused question","Researchable"]}},{"id":"w9-2","module":5,"moduleName":"The Research Paper","week":9,"day":2,"title":"Finding credible sources","goal":"I can find sources that are relevant and trustworthy.","idea":"Look for sources that are relevant to your question and credible: books, academic articles, reputable organizations, and expert authors. Note where each source comes from — you'll need it for citations later.","model":"A university study on teen sleep is stronger than an anonymous blog post.","practice":[{"q":"A more credible source is…","choices":["a peer-reviewed study","an anonymous post"],"a":0,"explain":"Authority and review matter."},{"q":"You should record source details…","choices":["as you find them","never"],"a":0,"explain":"You'll need them for citations."}],"task":{"prompt":"List three possible sources for your question and note one reason each is credible.","minWords":55,"checklist":["3 sources","Credibility noted"]}},{"id":"w9-3","module":5,"moduleName":"The Research Paper","week":9,"day":3,"title":"Evaluating sources","goal":"I can judge whether a source is reliable.","idea":"Test each source: Who wrote it (expertise)? When (current)? Why (any bias or agenda)? Is it supported by evidence? Drop weak sources before they weaken your paper.","model":"A 2024 health-agency report beats a 2009 opinion column for a current health question.","practice":[{"q":"An out-of-date source is risky when…","choices":["the topic changes over time","never"],"a":0,"explain":"Currency matters for many topics."},{"q":"Checking the author's expertise tells you about…","choices":["credibility","length"],"a":0,"explain":"Who wrote it matters."}],"task":{"prompt":"Evaluate two of your sources using who/when/why/evidence. Keep the stronger one and say why.","minWords":60,"checklist":["Evaluates 2 sources","Justifies the keeper"]}},{"id":"w9-4","module":5,"moduleName":"The Research Paper","week":9,"day":4,"title":"Taking & organizing notes","goal":"I can take organized notes tied to my sources.","idea":"Take notes in your own words, labeled with the source and page. Group notes by subtopic so your evidence is ready to slot into the paper. Mark direct quotes clearly with quotation marks to avoid accidental plagiarism later.","model":"Note card: [Source A, p.4] 'teens average 6.5 hrs sleep on school nights' — subtopic: amount of sleep.","practice":[{"q":"Notes should be labeled with…","choices":["the source they came from","nothing"],"a":0,"explain":"Track where each fact came from."},{"q":"Direct quotes in notes should be…","choices":["marked with quotation marks","unmarked"],"a":0,"explain":"Prevents accidental plagiarism."}],"task":{"prompt":"Take four labeled notes (in your own words) from your sources and group them under two subtopics.","minWords":60,"checklist":["4 labeled notes","Grouped by subtopic"]}},{"id":"w9-5","module":5,"moduleName":"The Research Paper","week":9,"day":5,"title":"Working thesis & outline","goal":"I can turn my research into a working thesis and outline.","idea":"Once you've gathered evidence, form a working thesis that answers your question and previews your main points. Outline body sections by subtopic, slotting your notes under each. The thesis can evolve as you draft.","model":"Working thesis: 'Heavy nighttime social media use shortens teen sleep by delaying bedtime, raising stress, and disrupting routines.'","practice":[{"q":"A working thesis is…","choices":["a first answer that can evolve","fixed forever"],"a":0,"explain":"It can change as you learn."},{"q":"Outline body sections by…","choices":["subtopic","page count"],"a":0,"explain":"Group evidence by subtopic."}],"task":{"prompt":"Write a working thesis for your question and outline 2-3 body sections with your notes under each.","minWords":70,"checklist":["Working thesis","2-3 sections","Notes placed"]}},{"id":"w10-1","module":5,"moduleName":"The Research Paper","week":10,"day":1,"title":"Integrating sources","goal":"I can quote, paraphrase, and summarize sources.","idea":"Three ways to use a source: quote (exact words, in quotation marks, for striking phrasing), paraphrase (their idea in your words, same length), and summarize (their idea in your words, much shorter). Always make clear whose idea it is.","model":"Quote: She calls it 'a silent epidemic.' Paraphrase: She describes the problem as widespread but unnoticed.","practice":[{"q":"A paraphrase is…","choices":["their idea in your own words","their exact words"],"a":0,"explain":"Reworded, similar length."},{"q":"Exact words must be…","choices":["in quotation marks","left unmarked"],"a":0,"explain":"Quotes need quotation marks."}],"task":{"prompt":"Take one fact from a source and present it three ways: as a quote, a paraphrase, and a summary.","minWords":60,"checklist":["Quote","Paraphrase","Summary"]}},{"id":"w10-2","module":5,"moduleName":"The Research Paper","week":10,"day":2,"title":"Academic integrity","goal":"I can use sources honestly and avoid plagiarism.","idea":"Plagiarism is presenting someone else's words or ideas as your own — even by accident. Avoid it by citing every borrowed idea, quoting exact words, and paraphrasing properly (not just swapping a few words). When in doubt, cite.","model":"Changing two words of a sentence and dropping the citation is still plagiarism.","practice":[{"q":"Borrowed ideas must be…","choices":["cited","left uncited if reworded"],"a":0,"explain":"Cite ideas, not just quotes."},{"q":"Swapping a few words without citing is…","choices":["still plagiarism","fine"],"a":0,"explain":"Proper paraphrase + citation needed."}],"task":{"prompt":"Take a source sentence and write a proper paraphrase that you would cite. Then write one sentence on why citing protects you.","minWords":60,"checklist":["Proper paraphrase","Explains why to cite"]}},{"id":"w10-3","module":5,"moduleName":"The Research Paper","week":10,"day":3,"title":"In-text citation","goal":"I can mark borrowed material with in-text citations.","idea":"When you use a source, signal it in the text — usually the author and page in parentheses, or by naming the author in your sentence. This points readers to the full entry in your Works Cited. Be consistent with one style.","model":"Borrowed: Teens average under seven hours of sleep (Lee 12). The reader can now find 'Lee' in your Works Cited.","practice":[{"q":"An in-text citation points to…","choices":["the full Works Cited entry","nothing"],"a":0,"explain":"It links to the source list."},{"q":"You should use…","choices":["one consistent style","a different style each time"],"a":0,"explain":"Consistency matters."}],"task":{"prompt":"Write three sentences that each use a source, adding a simple in-text citation (author + page) to each.","minWords":55,"checklist":["3 cited sentences","Consistent style"]}},{"id":"w10-4","module":5,"moduleName":"The Research Paper","week":10,"day":4,"title":"Works Cited / references","goal":"I can build a complete, consistent source list.","idea":"The Works Cited (or References) lists every source you cited, with enough detail for a reader to find it: author, title, publisher/site, date, and location. Order it alphabetically and keep the format consistent.","model":"Entry: Lee, Sara. Teen Sleep and Screens. Health Press, 2024.","practice":[{"q":"The source list should be…","choices":["alphabetical and consistent","random"],"a":0,"explain":"Order and consistency help readers."},{"q":"It should include…","choices":["only sources you cited","every source you ever read"],"a":0,"explain":"List what you actually cited."}],"task":{"prompt":"Write Works Cited entries for two of your sources, in a consistent format, in alphabetical order.","minWords":50,"checklist":["2 entries","Alphabetical","Consistent format"]}},{"id":"w10-5","module":5,"moduleName":"The Research Paper","week":10,"day":5,"title":"Draft body sections","goal":"I can draft the body of my research paper with cited support.","idea":"Write each body section from your outline: a topic sentence stating the subtopic, your evidence (quoted/paraphrased) with in-text citations, and your own analysis explaining what the evidence shows. Don't let quotes speak alone — explain them.","model":"After a quote, add: 'This shows that the problem starts well before bedtime.'","practice":[{"q":"After presenting evidence, you should…","choices":["explain what it shows","move on immediately"],"a":0,"explain":"Analysis ties evidence to your point."},{"q":"Each body section needs…","choices":["a topic sentence + cited support","only quotes"],"a":0,"explain":"Frame and explain your evidence."}],"task":{"prompt":"Draft one body section of your research paper: topic sentence, one cited piece of evidence, and your analysis.","minWords":90,"checklist":["Topic sentence","Cited evidence","Your analysis"]}},{"id":"w11-1","module":5,"moduleName":"The Research Paper","week":11,"day":1,"title":"Complete first draft","goal":"I can assemble a full research-paper draft.","idea":"Bring it together: introduction (context + thesis), body sections with cited evidence and analysis, conclusion, and Works Cited. Aim for complete, not perfect — you'll revise next.","model":"A complete draft has every section in place and every borrowed idea cited.","practice":[{"q":"A complete research draft includes…","choices":["intro, bodies, conclusion, Works Cited","just the intro"],"a":0,"explain":"All parts present."},{"q":"Every borrowed idea must be…","choices":["cited","uncited"],"a":0,"explain":"Cite as you draft."}],"task":{"prompt":"Write the introduction (with thesis) and conclusion of your research paper, connecting to your body sections.","minWords":120,"checklist":["Intro with thesis","Conclusion","Connected to bodies"]}},{"id":"w11-2","module":5,"moduleName":"The Research Paper","week":11,"day":2,"title":"Revising for argument & flow","goal":"I can revise my paper so the argument is clear and connected.","idea":"Read the whole paper for the argument: does each section support the thesis? Is the evidence convincing and explained? Are sections in a logical order with transitions? Fix structure and weak support before editing.","model":"A writer reorders two sections so the cause comes before the effect, improving flow.","practice":[{"q":"Revising the paper means checking…","choices":["argument, support, order","only spelling"],"a":0,"explain":"Big picture first."},{"q":"Evidence should be…","choices":["explained, not left alone","dropped in without comment"],"a":0,"explain":"Always analyze evidence."}],"task":{"prompt":"Revise one section of your paper: strengthen the support or the analysis, and improve a transition. Note your change.","minWords":80,"checklist":["Real revision","Improved transition"]}},{"id":"w11-3","module":5,"moduleName":"The Research Paper","week":11,"day":3,"title":"Editing & citation check","goal":"I can edit my paper and verify every citation.","idea":"Edit sentences for grammar and clarity, then audit citations: every quote and borrowed idea has an in-text citation, and every in-text citation has a matching Works Cited entry. No orphans either way.","model":"Check: 'Lee 12' in the text → 'Lee, Sara…' in Works Cited. Match found.","practice":[{"q":"Every in-text citation should…","choices":["match a Works Cited entry","stand alone"],"a":0,"explain":"They must correspond."},{"q":"Citation auditing happens…","choices":["during editing","never"],"a":0,"explain":"Verify before submitting."}],"task":{"prompt":"Edit two paragraphs of your paper and confirm each citation has a matching source entry. List any fixes.","minWords":70,"checklist":["Edited paragraphs","Citations verified"]}},{"id":"w11-4","module":5,"moduleName":"The Research Paper","week":11,"day":4,"title":"Formatting the paper","goal":"I can format my paper cleanly and consistently.","idea":"A clean format helps readers and shows care: a clear title, readable spacing, consistent headings if used, in-text citations in one style, and a properly ordered Works Cited at the end. Consistency is the whole game.","model":"Same citation style throughout + alphabetical Works Cited = professional finish.","practice":[{"q":"Good formatting is mostly about…","choices":["consistency","decoration"],"a":0,"explain":"Be consistent throughout."},{"q":"The Works Cited goes…","choices":["at the end","in the intro"],"a":0,"explain":"Source list comes last."}],"task":{"prompt":"Write a clean title and a formatted Works Cited (alphabetical, consistent) for your paper.","minWords":50,"checklist":["Clear title","Formatted Works Cited"]}},{"id":"w11-5","module":5,"moduleName":"The Research Paper","week":11,"day":5,"title":"Capstone Part 1: research paper","goal":"I can submit a complete, cited short research paper.","idea":"This is the big one: a focused thesis answering your question, body sections with cited evidence and your analysis, a conclusion, and a complete Works Cited — revised, edited, and formatted.","model":"Your finished paper argues one point, supported by credible, properly cited sources.","practice":[{"q":"Your paper must include…","choices":["thesis, cited evidence, analysis, Works Cited","only quotes"],"a":0,"explain":"All research elements."},{"q":"It should be…","choices":["revised and edited","a first draft"],"a":0,"explain":"Submit your best work."}],"task":{"prompt":"Submit your complete short research paper: intro with thesis, cited body sections with analysis, conclusion, and Works Cited.","minWords":250,"checklist":["Thesis","Cited evidence + analysis","Conclusion","Works Cited"]}},{"id":"w12-1","module":6,"moduleName":"Polish","week":12,"day":1,"title":"Fix the big three","goal":"I can fix fragments, comma splices, and run-on sentences.","idea":"Three errors hurt clarity most. Fragment: an incomplete thought. Comma splice: two sentences joined by only a comma. Run-on (fused): two sentences with no punctuation. Fix by completing the thought, or joining with a period, a semicolon, or a comma + and/but/so.","model":"Comma splice: 'It rained, we left.' Fixed: 'It rained, so we left.'","practice":[{"q":"'It rained, we left.' is a…","choices":["comma splice","correct sentence"],"a":0,"explain":"Two sentences joined by only a comma."},{"q":"One fix for a run-on is…","choices":["a semicolon or period","more commas"],"a":0,"explain":"Separate or join properly."}],"task":{"prompt":"Write three flawed sentences (a fragment, a comma splice, a run-on), then write the corrected version of each.","minWords":60,"checklist":["Shows all 3 errors","Correct fixes"]}},{"id":"w12-2","module":6,"moduleName":"Polish","week":12,"day":2,"title":"Commas, semicolons, colons","goal":"I can use commas, semicolons, and colons correctly.","idea":"Comma: separates items in a list and sets off introductory parts. Semicolon: joins two closely related complete sentences. Colon: introduces a list or explanation after a complete sentence.","model":"List: 'I bought apples, bread, and milk.' Semicolon: 'She studied hard; she passed.' Colon: 'He had one goal: to win.'","practice":[{"q":"A semicolon joins…","choices":["two complete, related sentences","a list of three words"],"a":0,"explain":"It links full sentences."},{"q":"A colon comes after…","choices":["a complete sentence to introduce a list/explanation","any word"],"a":0,"explain":"Needs a complete sentence before it."}],"task":{"prompt":"Write three sentences: one using a comma in a list, one using a semicolon, one using a colon.","minWords":50,"checklist":["Comma list","Semicolon","Colon"]}},{"id":"w12-3","module":6,"moduleName":"Polish","week":12,"day":3,"title":"Apostrophes, quotation marks, dashes","goal":"I can punctuate possessives, quotes, and dashes correctly.","idea":"Apostrophe: shows possession ('Sara's book') or contraction ('it's' = it is; 'its' = belonging to it). Quotation marks: enclose exact words. Dash: adds emphasis or an aside — like this.","model":"Its vs it's: 'The dog wagged its tail.' / 'It's raining.'","practice":[{"q":"'It's' means…","choices":["it is","belonging to it"],"a":0,"explain":"'Its' (no apostrophe) shows possession."},{"q":"Quotation marks enclose…","choices":["exact words","paraphrases"],"a":0,"explain":"Only exact words."}],"task":{"prompt":"Write three sentences: one possessive with an apostrophe, one with a correct 'its/it's', one with a dash for emphasis.","minWords":50,"checklist":["Possessive","Correct its/it's","Dash"]}},{"id":"w12-4","module":6,"moduleName":"Polish","week":12,"day":4,"title":"Style: variety, parallelism, active voice, word choice","goal":"I can polish style for stronger, clearer sentences.","idea":"Four style upgrades: vary sentence length; use parallel structure in lists ('reading, writing, and speaking'); prefer active voice ('We made a mistake' over 'Mistakes were made'); and choose precise words over vague ones.","model":"Not parallel: 'I like reading, to write, and speech.' Parallel: 'I like reading, writing, and speaking.'","practice":[{"q":"Active voice example:","choices":["The team finished the project.","The project was finished by the team."],"a":0,"explain":"Active is more direct."},{"q":"Parallel structure means list items…","choices":["share the same grammatical form","are different forms"],"a":0,"explain":"Keep forms consistent."}],"task":{"prompt":"Take a dull sentence and rewrite it three ways: active voice, parallel list, and a more precise word.","minWords":55,"checklist":["Active voice","Parallel list","Precise word"]}},{"id":"w12-5","module":6,"moduleName":"Polish","week":12,"day":5,"title":"Capstone Part 2: final edit & portfolio","goal":"I can edit to a professional standard and submit my portfolio.","idea":"Apply everything: fix the big three, perfect your punctuation, and polish style. Then gather your best work — paragraph, essay, pattern essay, and research paper — into a portfolio. This completes the course and earns your certificate.","model":"A finished portfolio shows your growth from a single sentence to a cited research paper.","practice":[{"q":"Your portfolio should include…","choices":["your best pieces from each module","only rough drafts"],"a":0,"explain":"Showcase your best work."},{"q":"The final edit checks…","choices":["grammar, punctuation, and style","nothing"],"a":0,"explain":"Polish to a professional standard."}],"task":{"prompt":"Do a final edit of your favorite piece and write a short reflection (4-5 sentences) on how your writing improved across the course.","minWords":90,"checklist":["Final edit applied","Reflection on growth"]}}];
const CHUNK=id=>{for(const u of UNITS){const c=u.chunks.find(x=>x.id===id);if(c)return c;}const v=VOCAB.find(x=>x.id===id);if(v)return {text:v.term,use:v.meaning,example:v.example};return {id,text:id};};
function levelUnits(){return UNITS.filter(u=>u.level===CTX.level);}

function fresh(){return {xp:0,streak:0,gems:0,lastActive:null,unitsDone:{},cards:{},certs:{},badges:{},day:{d:null,xp:0},goal:30,sprint:{daysDone:{}},missions:{done:{}},writing:{done:{}}};}
let syncT=null,syncing=false;
function save(){if(!CTX.classId)return;if(syncT)clearTimeout(syncT);syncT=setTimeout(pushProgress,700);}
async function pushProgress(){if(!CTX.classId||syncing)return;syncing=true;try{await SUPA.from('lingua_progress').upsert({student_id:CTX.user.id,class_id:CTX.classId,state:S,updated_at:new Date().toISOString()},{onConflict:'student_id,class_id'});}catch(e){}syncing=false;}
function dayXP(){if(!S.day||S.day.d!==today())S.day={d:today(),xp:0};return S.day;}
function gainXP(n){S.xp+=n;dayXP().xp+=n;checkBadges();}
function touchDay(){const t=today();if(S.lastActive===t)return;const y=new Date(Date.now()-864e5).toISOString().slice(0,10);S.streak=S.lastActive===y?S.streak+1:1;S.lastActive=t;save();checkBadges();}
function dueChunks(){const now=Date.now();return Object.keys(S.cards).filter(id=>S.cards[id].seen!==false&&S.cards[id].due<=now);}
function vocabSeen(){return VOCAB.filter(v=>S.cards[v.id]).length;}

/* gamification */
const LV=[0,50,150,300,500,800,1200,1800,2600,3600,5000];
const LVNAME=['Newcomer','Beginner','Explorer','Talker','Connector','Achiever','Confident','Advanced','Fluent','Expert','Master'];
function levelInfo(){const xp=S.xp;let l=0;for(let i=0;i<LV.length;i++){if(xp>=LV[i])l=i;}const cur=LV[l],next=LV[l+1];const need=next?next-cur:0;const into=xp-cur;const pct=need?Math.min(100,Math.round(into/need*100)):100;return {level:l,name:LVNAME[l],pct,into,need};}

function badgeToast(b){const d=document.createElement('div');d.style.cssText='position:fixed;left:50%;top:18px;transform:translateX(-50%);z-index:120;background:#0c2a26;color:#eafdf8;border:1px solid rgba(255,255,255,.18);padding:10px 16px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.4);font-weight:600;font-size:14px;opacity:0;transition:opacity .3s,transform .3s';d.innerHTML='<span style="font-size:18px">'+b.ic+'</span> Badge unlocked — '+b.t;document.body.appendChild(d);requestAnimationFrame(()=>{d.style.opacity='1';d.style.transform='translateX(-50%) translateY(6px)';});setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),400);},2700);}
function ring(pct,label,sub){const r=26,c=2*Math.PI*r,off=c*(1-pct/100);return '<svg width="64" height="64" viewBox="0 0 64 64" style="flex:none"><circle cx="32" cy="32" r="'+r+'" fill="none" stroke="rgba(255,255,255,.16)" stroke-width="6"/><circle cx="32" cy="32" r="'+r+'" fill="none" stroke="#37d2bd" stroke-width="6" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" transform="rotate(-90 32 32)"/><text x="32" y="33" text-anchor="middle" font-size="13" font-weight="700" fill="#eafdf8">'+label+'</text><text x="32" y="45" text-anchor="middle" font-size="8" fill="#9fc7bf">'+(sub||'')+'</text></svg>';}

  $('app').innerHTML=h;}
async function saveNote(sid){const body=$('snote').value;const {error}=await SUPA.from('lingua_notes').upsert({author_id:CTX.user.id,student_id:sid,body,updated_at:new Date().toISOString()},{onConflict:'author_id,student_id'});if(error){toast('Could not save note');return;}toast('Note saved');}
async function loadContentOverrides(){try{const r=await SUPA.from('lingua_content').select('id,kind,data,deleted');(r.data||[]).forEach(row=>{const arr=row.kind==='unit'?UNITS:VOCAB;const i=arr.findIndex(x=>x.id===row.id);if(row.deleted){if(i>=0)arr.splice(i,1);}else{if(i>=0)arr[i]=row.data;else arr.push(row.data);}});}catch(e){}}
let CMS_VQ='';
function cmsHome(){wallOff();$('app').innerHTML=`<div class="progress-top"><button class="x" onclick="adminHome()">✕</button></div><div class="eyebrow">Content manager</div><h1 style="font-size:22px;margin-bottom:10px">Edit lessons & vocabulary</h1><div class="card row-item" onclick="cmsVocab()"><div class="dot">📚</div><div class="meta"><b>Vocabulary</b><small>${VOCAB.length} cards · add, edit, delete</small></div><span class="status">›</span></div><div class="card row-item" onclick="cmsUnits()"><div class="dot">📘</div><div class="meta"><b>Units</b><small>${UNITS.length} lessons · edit, add, delete</small></div><span class="status">›</span></div><p class="muted center" style="font-size:11px;margin-top:8px">Changes save to your database and appear for everyone on next load.</p>`;}
function cmsVocab(){wallOff();$('app').innerHTML=`<div class="progress-top"><button class="x" onclick="cmsHome()">✕</button></div><div class="eyebrow">Vocabulary (${VOCAB.length})</div><input id="vq" placeholder="Search a term…" value="${escH(CMS_VQ)}"><button class="btn" style="margin-top:8px" onclick="cmsVocabEdit()">+ Add new card</button><div id="vlist" style="margin-top:10px"></div>`;const el=$('vq');el.addEventListener('input',e=>{CMS_VQ=e.target.value;renderVList();});renderVList();}
function renderVList(){const ql=(CMS_VQ||'').toLowerCase();const list=VOCAB.filter(v=>!ql||(v.term||'').toLowerCase().includes(ql)).slice(0,60);let h=`<p class="muted" style="font-size:11px">${list.length} shown${(!ql&&VOCAB.length>60)?' — search to see more':''}</p>`;list.forEach(v=>{const t=({word:'W',collocation:'C',phrasal:'PV',idiom:'ID'})[v.type]||'?';h+=`<div class="card row-item" onclick="cmsVocabEdit('${v.id}')"><div class="dot" style="background:var(--violet);color:#fff;width:34px;height:34px;font-size:12px">${t}</div><div class="meta"><b style="font-size:14px">${escH(v.term)}</b><small>${escH(v.meaning)}</small></div><span class="status">edit</span></div>`;});const lf=$('vlist');if(lf)lf.innerHTML=h;}
function cmsVocabEdit(id){wallOff();const v=id?VOCAB.find(x=>x.id===id):{id:'',term:'',meaning:'',example:'',type:'word'};if(!v){toast('Not found');return;}const ex=(v.example||'').split('<br>').join('\n');
  $('app').innerHTML=`<div class="progress-top"><button class="x" onclick="cmsVocab()">✕</button></div><div class="eyebrow">${id?'Edit':'New'} vocabulary card</div><div class="card"><label class="muted" style="font-size:12px">Term</label><input id="ev_term" value="${escH(v.term)}"><label class="muted" style="font-size:12px;margin-top:6px;display:block">Meaning</label><input id="ev_mean" value="${escH(v.meaning)}"><label class="muted" style="font-size:12px;margin-top:6px;display:block">Examples (one per line)</label><textarea id="ev_ex" style="min-height:90px">${escH(ex)}</textarea><label class="muted" style="font-size:12px;margin-top:6px;display:block">Type</label><select id="ev_type">${['word','collocation','phrasal','idiom'].map(t=>`<option value="${t}" ${t===v.type?'selected':''}>${t}</option>`).join('')}</select><button class="btn" style="margin-top:12px" onclick="cmsVocabSave('${id||''}')">Save card</button>${id?`<button class="btn ghost" style="margin-top:8px" onclick="cmsDelete('vocab','${id}')">Delete card</button>`:''}</div>`;}
async function cmsVocabSave(id){const term=$('ev_term').value.trim();if(!term){toast('Term is required');return;}const ex=$('ev_ex').value.split('\n').map(x=>x.trim()).filter(Boolean).join('<br>');const obj={id:id||('cv_'+Date.now().toString(36)),term,meaning:$('ev_mean').value.trim(),example:ex,type:$('ev_type').value};const {error}=await SUPA.from('lingua_content').upsert({id:obj.id,kind:'vocab',data:obj,deleted:false,updated_at:new Date().toISOString()},{onConflict:'id'});if(error){toast('Save failed');return;}const i=VOCAB.findIndex(x=>x.id===obj.id);if(i>=0)VOCAB[i]=obj;else VOCAB.push(obj);toast('Saved');cmsVocab();}
async function cmsDelete(kind,id){if(!confirm('Delete this item? It will be hidden from everyone.'))return;const arr=kind==='unit'?UNITS:VOCAB;const cur=arr.find(x=>x.id===id)||{id};const {error}=await SUPA.from('lingua_content').upsert({id,kind,data:cur,deleted:true,updated_at:new Date().toISOString()},{onConflict:'id'});if(error){toast('Delete failed');return;}const i=arr.findIndex(x=>x.id===id);if(i>=0)arr.splice(i,1);toast('Deleted');if(kind==='unit')cmsUnits();else cmsVocab();}
function cmsUnits(){wallOff();let h=`<div class="progress-top"><button class="x" onclick="cmsHome()">✕</button></div><div class="eyebrow">Units (${UNITS.length})</div><button class="btn" style="margin:8px 0" onclick="cmsUnitEdit()">+ Add new unit</button>`;['A1','A2','B1','B2','C1','C2'].forEach(L=>{const us=UNITS.filter(u=>u.level===L);if(!us.length)return;h+=`<div class="eyebrow" style="margin-top:6px">${L}</div>`;us.forEach(u=>{h+=`<div class="card row-item" onclick="cmsUnitEdit('${u.id}')"><div class="dot">📘</div><div class="meta"><b style="font-size:14px">${escH(u.title)}</b><small>${escH(u.theme||'')}</small></div><span class="status">edit</span></div>`;});});$('app').innerHTML=h;}
function cmsUnitEdit(id){wallOff();const u=id?UNITS.find(x=>x.id===id):null;const tmpl={id:"newunit1",level:"A2",module:1,title:"",theme:"",canDo:"",chunks:[],grammar:{focus:"",pattern:"",examples:[]},reading:{passage:"",questions:[],vocabInContext:null},listening:{script:[],gist:{q:"",choices:[],a:0},dictogloss:{sentence:""},gap:{q:"",a:""}},speaking:{minimalPair:{a:"",b:"",note:""},fluency432:{prompt:""},retell:{prompt:"",useChunks:[]},task:{prompt:"",useChunks:[]}},writing:{model:"",sentenceCombining:[],task:{prompt:"",minWords:30}},review:{srItems:[]},quiz:[]};const json=JSON.stringify(u||tmpl,null,2);
  $('app').innerHTML=`<div class="progress-top"><button class="x" onclick="cmsUnits()">✕</button></div><div class="eyebrow">${id?'Edit':'New'} unit</div><p class="muted" style="font-size:12px">Edit the unit's content as JSON. Keep the structure valid (same shape as other units).</p><textarea id="ujson" spellcheck="false" style="min-height:360px;font-family:ui-monospace,monospace;font-size:12px">${escH(json)}</textarea><button class="btn" style="margin-top:10px" onclick="cmsUnitSave('${id||''}')">Save unit</button>${id?`<button class="btn ghost" style="margin-top:8px" onclick="cmsDelete('unit','${id}')">Delete unit</button>`:''}`;}
async function cmsUnitSave(id){let obj;try{obj=JSON.parse($('ujson').value);}catch(e){toast('Invalid JSON: '+e.message);return;}if(!obj||!obj.id||!obj.level||!obj.title){toast('Need id, level and title');return;}const {error}=await SUPA.from('lingua_content').upsert({id:obj.id,kind:'unit',data:obj,deleted:false,updated_at:new Date().toISOString()},{onConflict:'id'});if(error){toast('Save failed');return;}const i=UNITS.findIndex(x=>x.id===obj.id);if(i>=0)UNITS[i]=obj;else UNITS.push(obj);toast('Unit saved');cmsUnits();}
let PREVIEW_LEVEL='A1';
function startPreview(){CTX.preview=true;CTX.classId=null;CTX.level=PREVIEW_LEVEL;CTX.className='Preview';S=fresh();home();}
function exitPreview(){CTX.preview=false;CTX.level=null;CTX.className='';adminHome();}
function setPreviewLevel(l){PREVIEW_LEVEL=l;CTX.level=l;S=fresh();home();}
function previewBar(){return `<div class="card" style="background:var(--teal-soft);display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px"><b style="font-size:13px;color:var(--teal-dark)">👁 Student preview</b><select onchange="setPreviewLevel(this.value)" style="width:auto;margin:0">${['A1','A2','B1','B2','C1','C2'].map(l=>`<option value="${l}" ${l===CTX.level?'selected':''}>${l}</option>`).join('')}</select><button class="btn ghost" style="width:auto;padding:8px 12px;margin-left:auto" onclick="exitPreview()">← Admin</button></div>`;}
async function adminUnlock(sid,cid,uid){const {error}=await SUPA.from('lingua_unlocks').upsert({student_id:sid,class_id:cid,unit_id:uid},{onConflict:'student_id,unit_id'});if(error){toast('Could not unlock');return;}toast('Unlocked');studentView(sid,cid);}
async function adminLock(sid,cid,uid){await SUPA.from('lingua_unlocks').delete().eq('student_id',sid).eq('unit_id',uid);toast('Locked');studentView(sid,cid);}
boot();
</script>
</body>
</html>
