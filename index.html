rgument (the benefits and the drawbacks), Share your opinion and reasons for it.","examples":[],"activities":["This challenge sparks a critical discussion, allowing you to weigh pros and cons and formulate an argument."],"tip":"Use examples from your own experience with social media, whether it's educational, inspirational, or even distracting."},{"id":"smc45","num":45,"level":7,"category":"Speaking Challenges","title":"Should Everyone Have the Right to Own a Business?","objective":"Spend 2 minutes discussing whether everyone should have the right to own a business. Consider: The pros of entrepreneurship (freedom, creativity, economic growth), The cons (challenges, risks, skills required).","examples":[],"activities":["This challenge helps you explore the idea of entrepreneurship and discuss whether or not it should be accessible to all."],"tip":"Think about who benefits from entrepreneurship and whether barriers like education or capital should be removed."},{"id":"smc46","num":46,"level":7,"category":"Speaking Challenges","title":"Convince Someone to Try Your Favorite Food","objective":"Spend 1 minute convincing someone to try your favorite food. Explain what it is Why you love it How it tastes or the experience of eating it Why they should try it (what makes it unique or delicious)","examples":[],"activities":["This challenge helps you practice persuasive speaking in a fun and relatable way, while also sharing a personal favorite."],"tip":"Focus on describing the sensory experience: the smell, the texture, the taste. Your passion for the food will make the listener want to try it!"},{"id":"smc47","num":47,"level":7,"category":"Speaking Challenges","title":"Talk About the Importance of Mental Health Awareness","objective":"Spend 2 minutes talking about why mental health awareness is important. Discuss: Why it's vital to understand mental health, The impact of mental health on daily life, Ways people can support mental health awareness.","examples":[],"activities":["This challenge encourages you to speak on an important topic, while promoting understanding and empathy."],"tip":"Be empathetic and use real-world examples of how mental health awareness has helped individuals or communities. The more relatable you make it, the more impactful."},{"id":"smc48","num":48,"level":7,"category":"Speaking Challenges","title":"Defend or Oppose the Idea of Traveling Abroad","objective":"Spend 2 minutes defending or opposing the idea of traveling abroad. If defending, talk about the benefits (e.g., learning new cultures, personal growth, opportunities). If opposing, talk about the challenges (e.g., costs, risks, environmental impact).","examples":[],"activities":["This challenge helps you express an opinion and defend it, either supporting or opposing the idea of international travel."],"tip":"Stay calm and reasoned while presenting your argument. Consider the pros and cons carefully and use clear examples to back up your opinion."},{"id":"smc49","num":49,"level":7,"category":"Speaking Challenges","title":"Debate: Is It Better to Work Alone or in Teams?","objective":"Choose a side (agree or disagree) on whether it's better to work alone or in teams. Spend 2 minutes explaining your stance: Why do you think one is better than the other?, Discuss the pros and cons of both working styles, Use examples to support your argument.","examples":[],"activities":["This challenge sharpens your debating skills by weighing the benefits of individual versus group work."],"tip":"Think about your own experiences. If you have examples from personal or professional life, include them to strengthen your argument."},{"id":"smc50","num":50,"level":7,"category":"Speaking Challenges","title":"Debate: Should Everyone Have Access to Free Education?","objective":"Spend 2 minutes debating whether everyone should have access to free education. If you agree, explain why education is a fundamental right and should be available to all. If you disagree, present your reasons (e.g., costs, sustainability issues, etc.)","examples":[],"activities":["This challenge encourages you to dive into an important societal issue and present a persuasive argument."],"tip":"Use facts, statistics, or personal experiences to strengthen your argument. Try to anticipate counterarguments and address them in your explanation."},{"id":"smc51","num":51,"level":7,"category":"Speaking Challenges","title":"Talk About a Social Issue in 2 Minutes","objective":"Choose a current social issue (e.g., homelessness, gender equality, racism). Talk about it for 2 minutes, covering: What the issue is, Why it's important, Possible solutions or actions that can be taken.","examples":[],"activities":["This challenge helps you practice speaking on significant social issues that require thought and attention."],"tip":"Focus on raising awareness and presenting possible solutions in a clear, actionable way. Stay informed about the topic to make your argument stronger."},{"id":"smc52","num":52,"level":7,"category":"Speaking Challenges","title":"Discuss the Importance of Art in Society","objective":"Spend 2 minutes discussing the importance of art in society. Explain: How art reflects culture, The emotional and intellectual benefits of engaging with art, Why art is necessary for personal and collective growth.","examples":[],"activities":["This challenge encourages you to explore the cultural and social value of art and creativity."],"tip":"Use examples from history, modern-day art, or personal experiences to highlight the role of art in shaping society."},{"id":"smc53","num":53,"level":7,"category":"Speaking Challenges","title":"Defend the Value of Education","objective":"Spend 2 minutes defending the value of education, talking about: How education shapes individuals and societies, The long-term benefits of having access to quality education, The role of education in economic and social development.","examples":[],"activities":["This challenge strengthens your ability to speak on the transformative power of education and why it should be valued."],"tip":"Use real-life examples or studies that show how education has positively impacted people's lives and the world around them."},{"id":"smc54","num":54,"level":7,"category":"Speaking Challenges","title":"Discuss an Ethical Dilemma in 90 Seconds","objective":"Choose an ethical dilemma (e.g., lying for a good cause, choosing between two equally deserving causes). Discuss it for 90 seconds, addressing: What the dilemma is, The two sides of the issue, Your opinion on what the right course of action would be.","examples":[],"activities":["This challenge helps you think critically and communicate your moral beliefs on complex issues."],"tip":"Be thoughtful and balanced, showing both sides of the argument before explaining your own position. This demonstrates your critical thinking skills."},{"id":"smc55","num":55,"level":7,"category":"Speaking Challenges","title":"Speak on the Role of Innovation in Business","objective":"Spend 2 minutes discussing the role of innovation in business. Explain: Why innovation is crucial for growth, How businesses benefit from embracing new ideas and technologies, Examples of businesses that have thrived due to innovation.","examples":[],"activities":["This challenge encourages you to explore the importance of innovation in the business world."],"tip":"Be specific and use concrete examples of businesses or industries that have undergone innovation and succeeded."},{"id":"smc56","num":56,"level":7,"category":"Speaking Challenges","title":"Share Your Opinion on a Controversial Topic","objective":"Choose a controversial topic (e.g., climate change, free speech, etc.). Spend 2 minutes sharing your opinion: What's your position on the issue?, Why do you hold this view?, How can it be addressed or resolved?.","examples":[],"activities":["This challenge helps you speak with confidence on a topic that may provoke disagreement, which can strengthen your ability to defend your views."],"tip":"Stay calm and respectful. Acknowledge opposing views but focus on presenting your argument logically and clearly."},{"id":"smc57","num":57,"level":7,"category":"Speaking Challenges","title":"Explain the Impact of Climate Change in 60 Seconds","objective":"Spend 1 minute explaining the impact of climate change. Focus on: Key effects on the environment, How it affects people and economies, What can be done to combat it.","examples":[],"activities":["This challenge helps you speak clearly on an important global issue, breaking it down into digestible points."],"tip":"Keep it simple, focusing on the most pressing issues and emphasizing the urgency of addressing climate change."},{"id":"smc58","num":58,"level":7,"category":"Speaking Challenges","title":"Explain a Complex Concept in Simple Terms","objective":"Choose a complex concept (e.g., blockchain, artificial intelligence). Spend 1 minute explaining it in the simplest terms possible: Break down the concept into its basic components, Use analogies or comparisons to make it easier to understand.","examples":[],"activities":["This challenge helps you improve your ability to explain complicated subjects clearly and concisely."],"tip":"The simpler you can explain a complex idea, the better. Aim to make it accessible to someone with no prior knowledge."},{"id":"smc59","num":59,"level":7,"category":"Speaking Challenges","title":"Give a Speech on Future Technological Advancements","objective":"Spend 2 minutes giving a speech about future technological advancements. Discuss: What technology might look like in 10, 20, or 50 years, How it could impact our lives, What challenges might arise with these advancements.","examples":[],"activities":["This challenge allows you to speak confidently on futuristic concepts and innovations."],"tip":"Be creative and imaginative! You don't have to be 100% accurate—focus on creating a vision of the future."},{"id":"smc60","num":60,"level":7,"category":"Speaking Challenges","title":"Discuss the Role of Social Responsibility in Business","objective":"Spend 2 minutes discussing the role of social responsibility in business. Explain: What social responsibility means for businesses, How it benefits both the company and society, Real-life examples of companies doing good in the world.","examples":[],"activities":["This challenge encourages you to talk about how businesses can contribute to society in meaningful ways."],"tip":"Use examples from well-known companies or organizations that have integrated social responsibility into their business practices."},{"id":"smc61","num":61,"level":7,"category":"Speaking Challenges","title":"Imitate Your Favorite Celebrity","objective":"Pick your favorite celebrity and imitate them for 1 minute. Focus on: Their speaking style or accent, Their gestures or personality traits, A famous quote or line they've said.","examples":[],"activities":["This challenge helps you practice tone, mannerisms, and speech patterns, making your speaking more dynamic."],"tip":"The more animated and fun, the better! This is all about having fun while practicing speaking with enthusiasm."},{"id":"smc62","num":62,"level":7,"category":"Speaking Challenges","title":"Describe a Day as a Superhero","objective":"Spend 1 minute describing a day in the life of a superhero. Talk about: The superhero's powers, How they spend their day (saving people, fighting villains, etc.), What makes them unique.","examples":[],"activities":["This challenge encourages you to think creatively and practice storytelling in an imaginative setting."],"tip":"Use your imagination! Think about all the exciting and fun aspects of being a superhero. Make it dramatic and engaging."},{"id":"smc63","num":63,"level":7,"category":"Speaking Challenges","title":"Share a Fun Fact About Animals","objective":"Share a fun fact about an animal and talk about it for 1 minute. Include: What the fact is, Why it's surprising or interesting, Any additional details or stories related to the animal.","examples":[],"activities":["This challenge helps you speak about interesting and quirky topics in a way that engages listeners."],"tip":"Make the fact sound exciting and engaging. The more surprising and delightful, the better!"},{"id":"smc64","num":64,"level":7,"category":"Speaking Challenges","title":"Tell a Joke You've Heard Recently","objective":"Tell a joke that you've heard recently. Focus on: The setup (keep it brief but clear), The punchline (make sure to deliver it with good timing), How you deliver the joke to make it funny.","examples":[],"activities":["This challenge helps you practice timing and delivery when telling a joke, which is important for engaging conversations."],"tip":"Make sure your tone and delivery are aligned with the humor of the joke. Don't rush it—timing is key to making it funny."},{"id":"smc65","num":65,"level":7,"category":"Speaking Challenges","title":"Describe Your Dream Job in 60 Seconds","objective":"Spend 1 minute describing your dream job. Include: What the job is, Why you want it, What kind of work you would do, How it aligns with your values or passions.","examples":[],"activities":["This challenge helps you articulate your career aspirations in a clear, concise, and confident manner."],"tip":"Be enthusiastic and specific. Talk about what excites you most about your dream job!"},{"id":"smc66","num":66,"level":7,"category":"Speaking Challenges","title":"Talk Like You're From Another Country","objective":"Pick a country or region and try speaking with its accent or dialect for 1 minute. You can choose to tell a story, make an introduction, or simply describe something.","examples":[],"activities":["This challenge allows you to have fun while practicing speaking with a different accent or dialect."],"tip":"Have fun with this! Focus on the accent and the rhythm of the language. This is all about practicing your adaptability in speech."},{"id":"smc67","num":67,"level":7,"category":"Speaking Challenges","title":"Tell a Story About an Encounter with a Stranger","objective":"Share a story about an encounter you had with a stranger. Include: Who the stranger was, What happened during the encounter, How it made you feel.","examples":[],"activities":["This challenge helps you develop your storytelling ability by sharing a meaningful or memorable interaction with a stranger."],"tip":"Try to make the story engaging by focusing on details that bring the encounter to life. If it was an unusual or impactful experience, emphasize that."},{"id":"smc68","num":68,"level":7,"category":"Speaking Challenges","title":"Talk About a Recent Dream You Had","objective":"Describe a recent dream you had in 1 minute. Focus on: What happened in the dream, The setting, characters, or events, How it made you feel (was it strange, fun, or scary?).","examples":[],"activities":["This challenge encourages you to describe dreams and experiences creatively."],"tip":"Dreams are often bizarre, so feel free to be creative and descriptive. It's all about engaging your listener with the experience!"},{"id":"smc69","num":69,"level":7,"category":"Speaking Challenges","title":"Discuss Your Favorite Food in Detail","objective":"Spend 1 minute describing your favorite food. Include: What the food is, How it looks, smells, and tastes, Why it's your favorite food.","examples":[],"activities":["This challenge helps you speak descriptively and passionately about something you love—food!"],"tip":"Be as descriptive as possible! Focus on making the food sound so delicious that your listener can almost taste it."},{"id":"smc70","num":70,"level":7,"category":"Speaking Challenges","title":"Share Your Bucket List","objective":"Share 3 items from your bucket list and talk about why they're important to you. Discuss: What they are, Why you want to achieve them, How you plan to make them happen.","examples":[],"activities":["This challenge encourages you to speak about your goals and aspirations in a way that's personal and motivating."],"tip":"Be passionate and positive. Speaking about your bucket list can be an inspiring experience for both you and your audience."},{"id":"smc71","num":71,"level":7,"category":"Speaking Challenges","title":"Speak with Confidence Despite Doubts","objective":"Choose any topic you're not 100% confident about (e.g., a subject you've never spoken about before). Spend 2 minutes speaking on that topic, no pauses or second-guessing. Focus on maintaining a confident tone and posture.","examples":[],"activities":[],"tip":"Even if you're not sure of every detail, focus on sounding confident. If you doubt something, move forward without hesitation. The more you practice, the easier it becomes to manage doubt."},{"id":"smc72","num":72,"level":7,"category":"Speaking Challenges","title":"Talk Without Using Fillers (\"uh,\" \"like,\" \"you know\")","objective":"Choose any topic (e.g., hobbies, recent events) and speak for 1 minute without using fillers like \"uh,\" \"like,\" or \"you know.\" Practice speaking clearly, without pausing unnecessarily or using filler words.","examples":[],"activities":[],"tip":"If you catch yourself using a filler word, stop and continue without it. The key is to pause briefly if needed rather than filling the silence with unnecessary words."},{"id":"smc73","num":73,"level":7,"category":"Speaking Challenges","title":"Speak in Public with Zero Preparation","objective":"Choose a random topic (it can be as simple as \"the importance of breakfast\" or \"the benefits of exercising\"). Speak for 2 minutes on that topic without any prior preparation or notes.","examples":[],"activities":[],"tip":"Don't overthink it. Start by saying whatever comes to mind and organize your thoughts as you speak."},{"id":"smc74","num":74,"level":7,"category":"Speaking Challenges","title":"Speak in Front of a Mirror","objective":"Stand in front of a mirror and speak for 2 minutes about any topic. Pay attention to your facial expressions, hand gestures, and body posture. Try to sound natural and engaging, as if you're talking to a real audience.","examples":[],"activities":[],"tip":"Look at yourself in the mirror and smile! Being aware of your expressions helps you speak with more confidence and connection."},{"id":"smc75","num":75,"level":7,"category":"Speaking Challenges","title":"Talk About Something You're Not Knowledgeable About","objective":"Choose a topic you know little to nothing about (e.g., space exploration, cooking techniques). Speak for 2 minutes on the subject, making it sound like you're knowledgeable. Try to sound confident, even though you're not an expert.","examples":[],"activities":[],"tip":"Use general knowledge, analogies, or ask questions that lead to an interesting conversation. It's more about being confident than being accurate!"},{"id":"smc76","num":76,"level":7,"category":"Speaking Challenges","title":"Describe an Object You've Never Seen Before","objective":"Imagine an object you've never seen before (it can be anything, like a futuristic gadget or mythical creature). Spend 2 minutes describing it in detail: its appearance, purpose, and how it works. Be imaginative and detailed in your description.","examples":[],"activities":[],"tip":"Make the description as vivid and engaging as possible. Don't worry about it being realistic—let your imagination run wild!"},{"id":"smc77","num":77,"level":7,"category":"Speaking Challenges","title":"Do a Group Speaking Activity (with Friends)","objective":"Gather 2–3 friends and engage in a conversation or debate about a topic (e.g., the best holiday destination, whether technology is good or bad). Take turns speaking, making sure to listen to others and add your thoughts. Ensure everyone has a chance to speak.","examples":[],"activities":[],"tip":"Listen actively to others and build on their ideas. Your goal is to contribute thoughtfully while keeping the conversation flowing smoothly."},{"id":"smc78","num":78,"level":7,"category":"Speaking Challenges","title":"Respond to Random Questions Rapid-Fire","objective":"Ask a friend or use a list of random questions (e.g., \"What's your favorite movie?\" or \"What's your dream job?\"). Respond to each question within 10 seconds, without overthinking. Aim to answer as quickly and confidently as possible.","examples":[],"activities":[],"tip":"Focus on spontaneity. Don't worry about the perfect answer—just respond naturally."},{"id":"smc79","num":79,"level":7,"category":"Speaking Challenges","title":"Repeat a Speech Without Looking at Notes","objective":"Choose a short speech or quote (can be a famous one or one you've written yourself). Spend 2 minutes delivering the speech without looking at any notes. Aim to speak fluidly and naturally.","examples":[],"activities":[],"tip":"Practice beforehand to make the delivery smooth. You can even record yourself and listen to improve."},{"id":"smc80","num":80,"level":7,"category":"Speaking Challenges","title":"Overcome Stage Fright","objective":"Imagine you're about to speak in front of a large audience. Spend 2 minutes speaking on any topic (it can be as simple as introducing yourself or talking about a recent experience). Focus on controlling your nerves and staying calm.","examples":[],"activities":[],"tip":"Take deep breaths and visualize success. The more you practice, the easier it becomes to handle nerves."},{"id":"smc81","num":81,"level":7,"category":"Speaking Challenges","title":"Deliver a TED Talk in 5 Minutes","objective":"Choose a topic you're passionate about and deliver a 5-minute TED-style talk. Structure it with an introduction, body, and conclusion. Focus on making your message clear and engaging.","examples":[],"activities":[],"tip":"Keep the talk concise and impactful. Use storytelling, data, or anecdotes to engage the audience."},{"id":"smc82","num":82,"level":7,"category":"Speaking Challenges","title":"Host a Talk Show for 10 Minutes","objective":"Imagine you're hosting a talk show. Speak for 10 minutes, covering different segments (e.g., introducing a topic, asking questions, or telling a personal story). Keep the energy up and engage your \"audience\" (even if they're imaginary!).","examples":[],"activities":[],"tip":"Add humor and variety to your talk show. Keep the conversation lively and interesting throughout the 10 minutes."},{"id":"smc83","num":83,"level":7,"category":"Speaking Challenges","title":"Perform a Stand-Up Comedy Routine","objective":"Write a short stand-up comedy routine (2–3 minutes). Perform it as if you're on stage, making sure to focus on timing and delivery of punchlines.","examples":[],"activities":[],"tip":"Use humor that's relatable and personal. Confidence is key, so practice your timing and delivery to keep the audience engaged."},{"id":"smc84","num":84,"level":7,"category":"Speaking Challenges","title":"Lead a Group Discussion for 5 Minutes","objective":"Lead a group discussion (real or imagined) on any topic. Ensure everyone has a chance to speak and contribute. Keep the conversation on track while making it interactive and engaging.","examples":[],"activities":[],"tip":"Make sure to ask open-ended questions that encourage people to share their thoughts. Don't dominate the conversation—guide it instead."},{"id":"smc85","num":85,"level":7,"category":"Speaking Challenges","title":"Speak Impromptu on a Random Topic for 2 Minutes","objective":"Choose a random topic (e.g., \"The importance of exercise,\" \"What makes a good leader\"). Speak for 2 minutes without any preparation.","examples":[],"activities":[],"tip":"Stay calm and focus on the key points of the topic. If you get stuck, use filler phrases like \"One important point is…\" to keep the flow going."},{"id":"smc86","num":86,"level":7,"category":"Speaking Challenges","title":"Prepare a 2-Minute Speech on Anything You Want","objective":"Pick any topic you care about. Prepare a 2-minute speech, focusing on: An engaging opening, A clear body with key points, A strong closing.","examples":[],"activities":[],"tip":"Use personal stories, quotes, or examples to make your speech engaging and relatable."},{"id":"smc87","num":87,"level":7,"category":"Speaking Challenges","title":"Share Your Biggest Achievements","objective":"Spend 2 minutes sharing your biggest achievements. Talk about: What they were, Why they were important, How they impacted your life.","examples":[],"activities":[],"tip":"Be proud of your accomplishments, but stay humble and focused on how they've shaped who you are."},{"id":"smc88","num":88,"level":7,"category":"Speaking Challenges","title":"Give a Farewell Speech","objective":"Imagine you're leaving a job or moving away from a group of people. Give a farewell speech that includes: Expressing gratitude, Sharing memories, Offering well wishes for the future.","examples":[],"activities":[],"tip":"Keep it heartfelt and sincere. Farewell speeches are a great way to show appreciation and leave a lasting impression."},{"id":"smc89","num":89,"level":7,"category":"Speaking Challenges","title":"Make an Announcement in Front of an Audience","objective":"Imagine you're in front of an audience, making an announcement (e.g., a company update, a community event). Speak for 1 minute, focusing on delivering the information clearly and confidently.","examples":[],"activities":[],"tip":"Maintain a calm, authoritative voice, and speak slowly to ensure everyone hears your message."},{"id":"smc90","num":90,"level":7,"category":"Speaking Challenges","title":"Deliver a Protest Speech","objective":"Choose an issue you care deeply about (e.g., environmental protection, human rights). Spend 2 minutes delivering a passionate speech about why change is needed and what action should be taken.","examples":[],"activities":[],"tip":"Use strong language and emotional appeals to inspire action, but stay focused on the message you want to convey."},{"id":"smc91","num":91,"level":7,"category":"Speaking Challenges","title":"Teach a Skill in 3 Minutes","objective":"Choose a skill you know well (e.g., cooking a simple recipe, how to tie a tie). Spend 3 minutes teaching that skill step-by-step.","examples":[],"activities":[],"tip":"Break it down into small steps and make it easy to follow. Imagine you're teaching someone with zero experience."},{"id":"smc92","num":92,"level":7,"category":"Speaking Challenges","title":"Speak Like a Motivational Coach","objective":"Imagine you're a motivational coach and deliver a 2-minute speech to inspire someone to take action or overcome a challenge.","examples":[],"activities":[],"tip":"Use confident language, positive energy, and strong, clear messages to motivate and empower your listener."},{"id":"smc93","num":93,"level":7,"category":"Speaking Challenges","title":"Teach a Lesson About Overcoming Fear","objective":"Deliver a 2-minute lesson on how to overcome fear. Focus on personal experiences, tips, and mindset shifts that help people face their fears.","examples":[],"activities":[],"tip":"Use relatable stories to help others understand the concept. Make it personal and uplifting."},{"id":"smc94","num":94,"level":7,"category":"Speaking Challenges","title":"Give a Speech on the Importance of Resilience","objective":"Deliver a 2-minute speech on resilience. Discuss: What resilience means, Why it's important, Personal or historical examples of resilience.","examples":[],"activities":[],"tip":"Speak from the heart and emphasize the value of perseverance in tough times."},{"id":"smc95","num":95,"level":7,"category":"Speaking Challenges","title":"Perform a Role-Play Scenario (e.g., Job Interview, Presentation)","objective":"Choose a role-play scenario (e.g., job interview, business pitch). Spend 3 minutes playing out the situation, speaking confidently and clearly.","examples":[],"activities":[],"tip":"Be prepared to think on your feet. Role-playing helps simulate real-world speaking experiences."},{"id":"smc96","num":96,"level":7,"category":"Speaking Challenges","title":"Speak as if You're the Expert in the Room","objective":"Choose any topic and speak as though you are the world's leading expert on it. Spend 2 minutes discussing the topic confidently, sharing facts, opinions, and insights.","examples":[],"activities":[],"tip":"Speak with authority, and don't be afraid to make bold claims. Remember, confidence is key to sounding like an expert."},{"id":"smc97","num":97,"level":7,"category":"Speaking Challenges","title":"Take a Position on a Political Debate","objective":"Choose a political issue you feel strongly about (e.g., climate policies, healthcare reform). Spend 2 minutes defending your position, supporting your argument with facts and reasoning.","examples":[],"activities":[],"tip":"Stay respectful, even if the topic is contentious. Focus on presenting a strong, logical argument."},{"id":"smc98","num":98,"level":7,"category":"Speaking Challenges","title":"Summarize a Book or Article in 2 Minutes","objective":"Choose a book or article you've read recently. Spend 2 minutes summarizing the main points or lessons from it.","examples":[],"activities":[],"tip":"Focus on the key themes and ideas. Avoid unnecessary details, and try to leave your audience with a clear takeaway."},{"id":"smc99","num":99,"level":7,"category":"Speaking Challenges","title":"Give a Closing Speech with a Call to Action","objective":"Deliver a 2-minute closing speech on any topic, and end with a strong call to action. Encourage your audience to take specific steps or make a change.","examples":[],"activities":[],"tip":"Make your call to action clear and direct. Encourage your audience to act, and inspire them to make a difference."},{"id":"smr1","num":1,"level":8,"category":"Role-plays","title":"Meeting Someone New","objective":"You're visiting a relative's home, and they introduce you to a guest. You want to have a polite and friendly conversation. Your role: The polite guest who can introduce yourself and ask friendly questions.","examples":["Relative: \"This is my friend Ahmad. He's visiting from Herat.\"","You: \"Nice to meet you, Ahmad! How was your journey?\"","Ahmad: \"It was good, but a bit long.\"","You: \"Yes, the road from Herat is long. How do you like Kabul so far?\""],"activities":["Try adding one interesting fact about yourself in the conversation.","Keep the chat going instead of just saying \"yes\" or \"no.\""],"tip":"Fun Task:"},{"id":"smr2","num":2,"level":8,"category":"Role-plays","title":"Ordering at a Restaurant or Tea House","objective":"You visit a small restaurant or tea house, and you need to order food confidently. Your role: A customer who knows exactly how to order.","examples":["Waiter: \"Welcome! What would you like to have?\"","You: \"I'd like a plate of Kabuli Pulao and a glass of tea, please.\"","Waiter: \"Sure! Would you like it spicy or mild?\"","You: \"Mild, please.\""],"activities":["Try asking about the menu: \"What do you recommend?\"","Change your order: \"Actually, I'll have mantu instead.\""],"tip":"Fun Task:"},{"id":"smr3","num":3,"level":8,"category":"Role-plays","title":"Shopping at a Bazaar or Store","objective":"You visit a clothing store to buy a new outfit for a family gathering. Your role: A smart shopper who knows how to ask for details and negotiate politely.","examples":["Shop Assistant: \"How can I help you?\"","You: \"I'm looking for a traditional dress in blue. Do you have it in my size?\"","Shop Assistant: \"Yes, we do! This one is medium. Would you like to try it?\"","You: \"Yes, and how much does it cost?\"","Shop Assistant: \"It's 1,200 Afghanis.\"","You: \"That's a bit expensive. Can you give me a discount?\""],"activities":["Try asking for a different color or size.","Practice bargaining politely."],"tip":"Fun Task:"},{"id":"smr4","num":4,"level":8,"category":"Role-plays","title":"Making an Appointment","objective":"You need to book a doctor's appointment over the phone. Your role: A patient who speaks clearly and understands appointment details.","examples":["Receptionist: \"Hello, Dr. Kamal's clinic. How can I help you?\"","You: \"Hi, I'd like to book an appointment for a check-up.\"","Receptionist: \"Sure. Are you available on Monday at 10 AM?\"","You: \"Can we do the afternoon instead?\""],"activities":["Try asking for another time if the given time doesn't work.","Ask about what documents you need to bring."],"tip":"Fun Task:"},{"id":"smr5","num":5,"level":8,"category":"Role-plays","title":"Calling Customer Service","objective":"You bought a new mobile phone, but there's a problem. You call customer support for help. Your role: A customer explaining a problem clearly and politely.","examples":["Support: \"Hello, this is XYZ Mobile. How can I help?\"","You: \"Hi, I just bought a new phone, but it keeps shutting down on its own.\"","Support: \"I see. Have you tried restarting it?\"","You: \"Yes, I have, but the problem is still there.\"","Support: \"Alright, let's check your warranty. Can you provide your receipt number?\""],"activities":["Describe another common issue, like slow internet or a broken screen.","Ask about warranty and repair options."],"tip":"Fun Task:"},{"id":"smr6","num":6,"level":8,"category":"Role-plays","title":"Talking to a Neighbor","objective":"You see your neighbor outside, and they start a conversation. Your role: A polite and friendly neighbor who keeps the conversation natural.","examples":["Neighbor: \"Hello! How's your family?\"","You: \"They're doing well, thank you! How about yours?\"","Neighbor: \"We're good, Alhamdulillah. By the way, I heard your brother started university?\"","You: \"Yes! He's studying engineering now. He's very excited.\""],"activities":["Ask your neighbor about their family, work, or plans.","End the conversation politely: \"It was nice talking to you! See you soon.\""],"tip":"Fun Task:"},{"id":"smr7","num":7,"level":8,"category":"Role-plays","title":"Visiting a Relative's House","objective":"You're visiting an elder relative, and they offer you tea and snacks. You want to have a polite and engaging conversation. Your role: A respectful guest who knows how to speak formally.","examples":["Aunt: \"It's so nice to see you! How's your work going?\"","You: \"Alhamdulillah, it's going well. I've been busy, but I enjoy it.\"","Aunt: \"That's good. Have some tea! Would you like more sugar?\"","You: \"Thank you! No sugar, please. The tea is perfect.\""],"activities":["Ask your relative about their health and family.","Use formal and polite expressions."],"tip":"Fun Task:"},{"id":"smr8","num":8,"level":8,"category":"Role-plays","title":"The Job Interview Simulation","objective":"You just arrived at a company for your first job interview. The interviewer looks serious. Your goal? Impress them and get the job! Your role: A confident job applicant who answers questions professionally.","examples":["Interviewer: \"Tell me about yourself.\""],"activities":["Answer at least three common job interview questions.","Add a story about a past experience to make your answers interesting."],"tip":"Fun Task:"},{"id":"smr9","num":9,"level":8,"category":"Role-plays","title":"Presenting an Idea – Business Pitch","objective":"You have an amazing startup idea and need to pitch it to an investor. But investors are tough. If they don't like your idea, they won't fund it. Your role: A passionate entrepreneur who explains an idea clearly and persuasively.","examples":["Investor: \"Alright, tell me about your idea.\""],"activities":["Present your own startup idea in three sentences.","Answer the tough question: \"Why should we invest in this?\""],"tip":"Fun Task:"},{"id":"smr10","num":10,"level":8,"category":"Role-plays","title":"Negotiating a Deal – Salary or Business Contract","objective":"You got a job offer, but the salary is lower than expected. Now, you need to negotiate like a pro! Your role: A confident employee who knows their worth.","examples":["Boss: \"We'd love to have you on our team. Your starting salary will be $800 per month.\"","You: \"Thank you for the offer! I'm excited about this role. However, based on my experience and the industry standard, I believe a salary of $1,000 would be more appropriate.\""],"activities":["Negotiate politely without sounding rude.","Suggest a win-win compromise."],"tip":"Fun Task:"},{"id":"smr11","num":11,"level":8,"category":"Role-plays","title":"Office Conflict Resolution","objective":"Your coworker is upset because they think you took credit for their work. You need to calm them down and clear the misunderstanding. Your role: A professional who handles conflict diplomatically.","examples":["Coworker: \"Hey, I heard you told the boss you finished the report. But I worked on that report too!\"","You: \"I completely understand why you're upset. That wasn't my intention at all. I actually mentioned your contribution, but maybe the boss misunderstood.\""],"activities":["Apologize and clarify without blaming the other person.","Offer a solution to fix the issue."],"tip":"Fun Task:"},{"id":"smr12","num":12,"level":8,"category":"Role-plays","title":"Client Meeting – Handling a Difficult Client","objective":"A client is angry because a product they ordered was delayed. You need to calm them down and offer a solution. Your role: A calm, professional customer service agent.","examples":["Client: \"This is unacceptable! My order was supposed to arrive yesterday, and it's still not here!\"","You: \"I completely understand your frustration, and I sincerely apologize for the delay. Let me check the status right now.\""],"activities":["Stay polite even when the client is rude.","Offer a clear solution."],"tip":"Fun Task:"},{"id":"smr13","num":13,"level":8,"category":"Role-plays","title":"Workplace Small Talk","objective":"It's lunchtime, and a colleague starts a casual conversation. You want to chat naturally. Your role: A friendly colleague who keeps the conversation flowing.","examples":["Colleague: \"So, how was your weekend?\"","You: \"It was good! I visited my family. What about you?\""],"activities":["Keep the conversation going for at least three turns.","Ask about their weekend, hobbies, or family."],"tip":"Fun Task:"},{"id":"smr14","num":14,"level":8,"category":"Role-plays","title":"Leaving a Voicemail & Email Etiquette","objective":"You need to leave a voicemail for your boss about an urgent issue. Your role: A professional who speaks clearly and concisely.","examples":[],"activities":["Keep it short and professional.","End with a polite request."],"tip":"Fun Task:"},{"id":"smr15","num":15,"level":8,"category":"Role-plays","title":"Detective Mystery – Solving a Crime","objective":"A valuable necklace has been stolen from a museum, and you—the best detective in town—must solve the case! Your role: A sharp detective questioning suspects and making deductions.","examples":["Police Officer: \"Detective, we have three suspects. The janitor, the security guard, and the rich businessman. Who should we question first?\"","You: \"Let's start with the security guard. He was on duty last night.\""],"activities":["Ask three strong questions to solve the case.","Find the liar and prove them guilty!"],"tip":"Fun Task:"},{"id":"smr16","num":16,"level":8,"category":"Role-plays","title":"Surviving a Plane Crash","objective":"Your plane has crashed in the middle of a jungle, and you and a group of survivors must decide how to survive! Your role: A survivor making important decisions in English.","examples":["You: \"Okay, everyone, we need a plan! Should we stay near the crash site or try to find help?\"","Survivor 1: \"We should stay! Rescuers might find us.\"","Survivor 2: \"But we have no food! We need to explore.\"","You: \"Alright, let's split into teams—one stays, one searches for food.\""],"activities":["Make three survival decisions in English.","Convince others why your idea is the best."],"tip":"Fun Task:"},{"id":"smr17","num":17,"level":8,"category":"Role-plays","title":"Time Travel Scenario ⏳","objective":"You accidentally fall into a time machine and wake up in the year 1850! You must explain modern life to people from the past. Your role: A time traveler trying to explain modern technology.","examples":["Old Man: \"What is that strange object in your hand?\"","You: \"This is a phone! It lets me talk to people far away.\"","Old Man: \"Impossible! Only pigeons can send messages.\"","You: \"No, look! I'll call my friend right now.\""],"activities":["Explain three modern inventions to people from the past.","Answer their funny and confused questions."],"tip":"Fun Task:"},{"id":"smr18","num":18,"level":8,"category":"Role-plays","title":"Escape Room Challenge","objective":"You are locked in a mysterious room, and you have one hour to escape! The only way out is to find clues and solve puzzles. Your role: A puzzle solver asking for clues and making decisions.","examples":["You: \"There's a locked box here! Maybe the key is hidden somewhere.\"","Friend: \"Look! There's a note on the table. It says, 'The answer is in the mirror.'\"","You: \"Quick! Let's check the mirror for a hidden code!\""],"activities":["Ask three smart questions to find clues.","Work with a team and suggest escape ideas."],"tip":"Fun Task:"},{"id":"smr19","num":19,"level":8,"category":"Role-plays","title":"Traveling in a Foreign Country","objective":"You are traveling in another country and must ask for directions, book a hotel, and order food—all in English! Your role: A tourist navigating a new place.","examples":["You: \"Excuse me, can you tell me where the nearest hotel is?\"","Local Person: \"Yes, go straight, then turn left at the mosque. It's next to the bank.\"","You: \"Thank you so much! Also, where can I get good local food?\""],"activities":["Ask for directions to three places.","Order food in a restaurant."],"tip":"Fun Task:"},{"id":"smr20","num":20,"level":8,"category":"Role-plays","title":"A Magic School Role-Play","objective":"You have just arrived at a school for magic, and today is your first spell-casting lesson! Your role: A wizard-in-training learning new spells.","examples":["Professor: \"Today, we will learn the 'Flying Feather' spell. Repeat after me: 'Levioso!'\"","You: \"Levioso!\"","Professor: \"Excellent! Now, use it to lift this book.\""],"activities":["Invent your own magic spell and explain how it works.","Debate with a classmate: \"Which magic is better—fire or water?\""],"tip":"Fun Task:"},{"id":"smr21","num":21,"level":8,"category":"Role-plays","title":"Sci-Fi Space Mission","objective":"You are an astronaut, and your spaceship is facing a serious problem—the oxygen is running out! You must work with your team to fix the issue before time runs out. Your role: A space crew member communicating with Earth.","examples":["Mission Control: \"Commander, we have detected an oxygen leak!\"","You: \"Understood! Checking the control panel now.\"","Mission Control: \"Can you repair it?\"","You: \"We'll try! We need more time!\""],"activities":["Use scientific words like \"oxygen levels,\" \"control panel,\" or \"emergency protocol.\"","Ask for help from Mission Control."],"tip":"Fun Task:"},{"id":"smr22","num":22,"level":8,"category":"Role-plays","title":"Debating a Controversial Topic","objective":"You're in a debate competition, and today's topic is \"Should students have to wear uniforms?\" Your role: A passionate debater arguing for or against the topic.","examples":["Opponent: \"I believe school uniforms help students focus on education instead of fashion.\"","You: \"I disagree! School uniforms limit personal expression, which is important for creativity.\""],"activities":["Give three strong arguments supporting your side.","Use persuasive phrases like \"That's a good point, but…\" and \"I see your argument, however…\""],"tip":"Fun Task:"},{"id":"smr23","num":23,"level":8,"category":"Role-plays","title":"A Dramatic Argument","objective":"Your best friend forgot your birthday, and now you're upset! You have a big argument. Your role: The upset friend or the one who forgot.","examples":["You: \"How could you forget my birthday? I thought we were close!\"","Friend: \"I'm really sorry! I was busy with work, and I lost track of time.\"","You: \"That's not an excuse! Birthdays are important to me!\""],"activities":["Act both sides—the angry friend and the apologizing one.","Try to resolve the fight at the end instead of staying angry."],"tip":"Fun Task:"},{"id":"smr24","num":24,"level":8,"category":"Role-plays","title":"Breaking Bad News","objective":"You have to tell a friend that they didn't get the job they applied for. Your role: A caring friend delivering difficult news.","examples":["You: \"I have some bad news… I just heard from the company, and they chose another candidate.\"","Friend: \"Oh… I really wanted that job.\"","You: \"I know. You worked so hard, and I'm really sorry. But this isn't the end! There will be more chances.\""],"activities":["Use soft, empathetic phrases like \"I'm really sorry to tell you this.\"","End on a positive note to encourage the person."],"tip":"Fun Task:"},{"id":"smr25","num":25,"level":8,"category":"Role-plays","title":"Apologizing & Making Amends","objective":"You accidentally spilled coffee on your coworker's laptop and need to apologize. Your role: A guilty coworker trying to fix the mistake.","examples":["You: \"I'm so, so sorry! I wasn't paying attention, and I knocked over my coffee.\"","Coworker: \"My laptop isn't working now! What am I supposed to do?\"","You: \"I'll take full responsibility. I'll help pay for the repairs.\""],"activities":["Use sincere and direct apologies.","Offer a solution to fix the mistake."],"tip":"Fun Task:"},{"id":"smr26","num":26,"level":8,"category":"Role-plays","title":"Public Speaking Challenge","objective":"You are giving a speech about \"The most important lesson I've learned in life.\" Your role: A confident public speaker sharing a powerful story.","examples":["You: \"Good afternoon, everyone. Today, I want to share a lesson that changed my life. One year ago, I failed at something important… but that failure taught me something valuable.\""],"activities":["Tell a short personal story.","Speak clearly and with confidence."],"tip":"Fun Task:"},{"id":"smr27","num":27,"level":8,"category":"Role-plays","title":"A Courtroom Drama","objective":"You are a lawyer defending your client in court. The other lawyer says your client is guilty, but you must prove them innocent. Your role: A lawyer making a strong case.","examples":["Judge: \"Lawyer, present your defense.\"","You: \"Your Honor, my client is innocent! The evidence clearly shows that they were not at the scene of the crime.\""],"activities":["Use formal courtroom language.","Make a powerful argument to convince the judge."],"tip":"Fun Task:"},{"id":"smr28","num":28,"level":8,"category":"Role-plays","title":"Convincing a Friend to Try Something New","objective":"Your friend is afraid to learn English. You must convince them that they can do it! Your role: A motivational friend encouraging them.","examples":["You: \"Come on! Learning English is not as hard as you think.\"","Friend: \"But I'm terrible at languages.\"","You: \"That's not true! You just need the right practice. Let's start together!\""],"activities":["Use three motivational reasons to convince them.","Avoid forcing them—use encouragement instead."],"tip":"Fun Task:"},{"id":"smr29","num":29,"level":8,"category":"Role-plays","title":"Parent-Child Conflict","objective":"You are a parent, and your teenager wants to drop out of school. Your role: A parent explaining why school is important.","examples":["You: \"I understand that school is hard, but dropping out is not the answer.\"","Teenager: \"I don't like studying! I want to start working instead.\"","You: \"Education will give you more opportunities in the future. Let's find a way to make school easier for you.\""],"activities":["Speak as both the parent and the child.","End the conversation with a compromise."],"tip":"Fun Task:"}];
const WRITING=[{"id":"w1-1","module":1,"moduleName":"Foundations","week":1,"day":1,"title":"How this course works & what clear writing is","goal":"I can explain what clear writing is and start my writing habit.","idea":"Clear writing puts the reader first. Before you write, ask two questions: who is my reader, and what do I want them to understand or do? Good writing is not about big words — it is about making one idea land cleanly. In this course you will write a little every day and build from one strong sentence up to a full research paper.","model":"Weak: 'The utilization of vehicular transport was undertaken by myself.' Clear: 'I drove to work.' Same meaning, but the clear version respects the reader's time.","practice":[{"q":"Which sentence is clearer?","choices":["I drove to work.","The utilization of vehicular transport was undertaken by myself."],"a":0,"explain":"Short, direct, reader-first."},{"q":"Before writing, you should first decide…","choices":["how long it will be","who your reader is and your purpose","which font to use"],"a":1,"explain":"Audience and purpose guide every choice."}],"task":{"prompt":"Write 3-4 sentences about why you want to improve your writing. Keep each sentence clear and direct.","minWords":40,"checklist":["Names your reader/purpose","Each sentence is one clear idea"]}},{"id":"w1-2","module":1,"moduleName":"Foundations","week":1,"day":2,"title":"The strong sentence","goal":"I can write a complete sentence with a clear subject and verb.","idea":"Every sentence needs a subject (who/what) and a verb (the action or state) and must express a complete thought. If a group of words leaves the reader waiting for the rest, it is a fragment, not a sentence.","model":"Fragment: 'Because the market changed.' Complete: 'Because the market changed, we lowered our prices.'","practice":[{"q":"Which is a complete sentence?","choices":["Running late this morning.","She arrived late this morning."],"a":1,"explain":"It has a subject (She) and verb (arrived) and a complete thought."},{"q":"'When the rain stopped.' is…","choices":["a complete sentence","a fragment"],"a":1,"explain":"It leaves the reader waiting — what happened when the rain stopped?"}],"task":{"prompt":"Write 4 complete sentences about your morning. Make sure each has a clear subject and verb.","minWords":40,"checklist":["4 complete sentences","No fragments"]}},{"id":"w1-3","module":1,"moduleName":"Foundations","week":1,"day":3,"title":"Joining ideas: coordination & subordination","goal":"I can combine two ideas into one smooth sentence.","idea":"Short sentences are clear, but too many in a row feel choppy. Join related ideas with coordination (and, but, so, or) for equal ideas, or subordination (because, although, when, if) to show one idea depends on another.","model":"Choppy: 'It was raining. We stayed home.' Joined: 'Because it was raining, we stayed home.'","practice":[{"q":"Best way to join 'I was tired' + 'I finished the report'?","choices":["I was tired. I finished the report.","Although I was tired, I finished the report."],"a":1,"explain":"'Although' shows the relationship between the two ideas."},{"q":"'and, but, so' are used for…","choices":["equal ideas (coordination)","dependent ideas (subordination)"],"a":0,"explain":"Coordinating words join ideas of equal weight."}],"task":{"prompt":"Write 3 sentences, each joining two ideas. Use 'because', 'although', and 'but' at least once.","minWords":45,"checklist":["Uses because/although/but","Ideas clearly connected"]}},{"id":"w1-4","module":1,"moduleName":"Foundations","week":1,"day":4,"title":"The writing process","goal":"I can move a piece through prewrite, draft, revise, and edit.","idea":"Good writing is rewriting. Prewrite to gather ideas (lists, notes). Draft fast without judging. Revise for big things (is the point clear? is it supported?). Edit last for small things (grammar, spelling). Mixing these steps slows you down — separate them.","model":"A writer brainstorms 8 ideas, drafts a messy paragraph, then revises to keep the best 3 ideas, and finally fixes commas. Four steps, in order.","practice":[{"q":"Revising means fixing…","choices":["commas and spelling","big things like clarity and support"],"a":1,"explain":"Editing handles the small stuff; revising handles the big stuff."},{"q":"The best first step is to…","choices":["write a perfect first sentence","gather ideas (prewrite)"],"a":1,"explain":"Prewriting frees you from perfectionism."}],"task":{"prompt":"Pick a topic and prewrite: list 6 ideas about it, then write one sentence saying which idea is strongest.","minWords":40,"checklist":["Lists 6 ideas","Picks the strongest"]}},{"id":"w1-5","module":1,"moduleName":"Foundations","week":1,"day":5,"title":"Project: five clear sentences","goal":"I can write five clear, varied sentences on one topic.","idea":"Bring together everything from Week 1: complete sentences, clear subjects and verbs, and a mix of joined and short sentences. Variety keeps the reader interested.","model":"Topic: my city. 'My city is small but lively. Because it sits by the river, summers are humid. Markets open early. Although traffic is light, parking is hard. I love it.'","practice":[{"q":"Sentence variety means…","choices":["all sentences the same length","mixing short and longer joined sentences"],"a":1,"explain":"Variety keeps writing from feeling flat."},{"q":"A five-sentence piece should be about…","choices":["one focused topic","five different topics"],"a":0,"explain":"Stay focused on a single topic."}],"task":{"prompt":"Write 5 clear sentences about one topic of your choice. Use at least one joined sentence and keep them varied.","minWords":55,"checklist":["One focused topic","At least one joined sentence","Varied lengths"]}},{"id":"w2-1","module":2,"moduleName":"The Paragraph","week":2,"day":1,"title":"The one-paragraph essay","goal":"I can structure a paragraph: topic sentence, support, restatement.","idea":"A strong paragraph follows a simple, powerful shape: tell readers your point (topic sentence), prove it (middle sentences of support), then remind them of the point (a reworded closing sentence). This structure makes you organized automatically.","model":"Topic: 'Walking daily improves health.' Support: examples of better sleep, mood, and energy. Close: 'A short daily walk pays off for both body and mind.'","practice":[{"q":"The first sentence of the paragraph is the…","choices":["topic sentence","conclusion"],"a":0,"explain":"It states the main point."},{"q":"The last sentence should…","choices":["introduce a new idea","reword the main point"],"a":1,"explain":"It reminds the reader of your point."}],"task":{"prompt":"Write a 5-sentence paragraph: a topic sentence, three supports, and a reworded closing sentence.","minWords":60,"checklist":["Has a topic sentence","3 supports","Reworded closing"]}},{"id":"w2-2","module":2,"moduleName":"The Paragraph","week":2,"day":2,"title":"Topic sentences","goal":"I can write a focused, arguable topic sentence.","idea":"A good topic sentence makes one clear claim that the rest of the paragraph can prove. Avoid topics that are too broad ('Sports are good') or simple facts ('I play football'). Aim for a point you can support.","model":"Too broad: 'Technology is important.' Focused: 'Smartphones have made small businesses easier to run.'","practice":[{"q":"Best topic sentence?","choices":["Food is interesting.","Cooking at home saves money and improves health."],"a":1,"explain":"Focused and arguable — you can support it."},{"q":"A topic sentence should be…","choices":["a simple fact","a claim you can support"],"a":1,"explain":"It sets up the paragraph's argument."}],"task":{"prompt":"Write 3 topic sentences on 3 different topics. Each must be focused and arguable, not just a fact.","minWords":45,"checklist":["3 topic sentences","Each is arguable"]}},{"id":"w2-3","module":2,"moduleName":"The Paragraph","week":2,"day":3,"title":"Support that persuades","goal":"I can support a point with examples, facts, and expert statements.","idea":"Readers believe points that are backed up. Three strong kinds of support are: examples (a specific case), facts/statistics (numbers), and statements by authorities (what an expert says). Specific beats vague every time.","model":"Vague: 'Reading is good for you.' Supported: 'Studies show that 20 minutes of reading a day builds vocabulary, and teachers report calmer, more focused students.'","practice":[{"q":"Which is the strongest support?","choices":["Many people agree it helps.","A 2021 study found a 15% improvement."],"a":1,"explain":"A specific statistic is persuasive."},{"q":"An 'authority' is…","choices":["a famous friend","an expert on the topic"],"a":1,"explain":"Expert statements add credibility."}],"task":{"prompt":"Write a paragraph that supports one claim using at least two different kinds of support (example, fact, or expert).","minWords":60,"checklist":["One clear claim","2+ kinds of support"]}},{"id":"w2-4","module":2,"moduleName":"The Paragraph","week":2,"day":4,"title":"Unity","goal":"I can keep every sentence focused on one point.","idea":"A unified paragraph sticks to one idea. If a sentence does not help prove the topic sentence, it breaks unity and should be cut or moved. Readers get lost when paragraphs wander.","model":"Breaks unity: a paragraph about saving money that suddenly mentions a favorite movie. The movie sentence does not support the point and should be removed.","practice":[{"q":"A sentence that doesn't support the topic should be…","choices":["kept for variety","cut or moved"],"a":1,"explain":"Unity means every sentence serves the point."},{"q":"Unity is about…","choices":["one focused idea per paragraph","using long words"],"a":0,"explain":"One idea, fully supported."}],"task":{"prompt":"Write a unified paragraph (5-6 sentences) where every sentence clearly supports the topic sentence.","minWords":60,"checklist":["Every sentence on-topic","No wandering"]}},{"id":"w2-5","module":2,"moduleName":"The Paragraph","week":2,"day":5,"title":"Coherence","goal":"I can order ideas logically and link them with transitions.","idea":"Coherence means readers always know where they are. Put supports in a logical order (time, importance, or cause) and use transition signals — 'first', 'also', 'for example', 'as a result', 'finally' — to guide the reader between ideas.","model":"'First, plan your week. Next, block time for the hardest task. Finally, review what you finished.' The signals make the order obvious.","practice":[{"q":"Transition signals help by…","choices":["adding length","showing how ideas connect"],"a":1,"explain":"They guide the reader."},{"q":"Which is a transition signal?","choices":["because of the","as a result"],"a":1,"explain":"'As a result' links cause and effect."}],"task":{"prompt":"Write a paragraph using at least three transition signals to connect your supports in a logical order.","minWords":60,"checklist":["3+ transitions","Logical order"]}},{"id":"w3-1","module":2,"moduleName":"The Paragraph","week":3,"day":1,"title":"Stage II: subtopic sentences","goal":"I can organize support under subtopic sentences.","idea":"As paragraphs grow, group related supports under a 'subtopic sentence' — a mini point that sits between the topic sentence and its details. This adds a second layer of organization for richer paragraphs.","model":"Topic: 'Remote work has clear benefits.' Subtopic 1: 'It saves time' (details). Subtopic 2: 'It cuts costs' (details).","practice":[{"q":"A subtopic sentence is…","choices":["a smaller point under the main point","the conclusion"],"a":0,"explain":"It groups related supports."},{"q":"Subtopics are useful when…","choices":["the paragraph has several groups of support","the paragraph is one sentence"],"a":0,"explain":"They organize larger paragraphs."}],"task":{"prompt":"Write a paragraph with a topic sentence and two subtopic sentences, each followed by a detail.","minWords":65,"checklist":["Topic sentence","2 subtopics with details"]}},{"id":"w3-2","module":2,"moduleName":"The Paragraph","week":3,"day":2,"title":"Grouping and ordering support","goal":"I can arrange my support in the most persuasive order.","idea":"Not all orders are equal. Common strong orders: most-to-least important, least-to-most important (building to a climax), or chronological. Choose the order that best serves your point and keep related ideas together.","model":"For 'why exercise helps', ending on the strongest benefit (better mental health) leaves the reader with your best point.","practice":[{"q":"Ending with your strongest point is called…","choices":["climax order","random order"],"a":0,"explain":"Build to your best point."},{"q":"Related supports should be…","choices":["scattered","kept together"],"a":1,"explain":"Grouping aids coherence."}],"task":{"prompt":"Take three supports for any claim and write them in a deliberate order (state which order you chose).","minWords":55,"checklist":["3 supports","States the order chosen"]}},{"id":"w3-3","module":2,"moduleName":"The Paragraph","week":3,"day":3,"title":"Revising a paragraph","goal":"I can revise a paragraph for structure and support.","idea":"Revision is about big improvements. Re-read and ask: Is my topic sentence clear? Does every sentence support it (unity)? Is the order logical (coherence)? Is the support specific? Cut weak sentences and strengthen vague ones.","model":"A writer notices a vague support ('it's helpful') and revises it to a specific one ('it cut my study time by half').","practice":[{"q":"Revision focuses on…","choices":["structure, support, clarity","only spelling"],"a":0,"explain":"Big things first."},{"q":"A vague support should be…","choices":["left alone","made specific"],"a":1,"explain":"Specific support persuades."}],"task":{"prompt":"Take a paragraph you wrote earlier this week and rewrite it, improving the topic sentence and one weak support.","minWords":60,"checklist":["Improved topic sentence","Strengthened a support"]}},{"id":"w3-4","module":2,"moduleName":"The Paragraph","week":3,"day":4,"title":"Editing & proofreading","goal":"I can edit a paragraph for grammar, punctuation, and spelling.","idea":"Editing is the last step. Read slowly, ideally aloud, to catch run-ons, missing commas, and typos. Check that each sentence is complete and that subjects and verbs agree. Editing protects all the good work you did revising.","model":"Before: 'The plan was good it worked.' After: 'The plan was good, and it worked.' (Fixed a run-on.)","practice":[{"q":"Editing should happen…","choices":["before drafting","after revising"],"a":1,"explain":"Polish last."},{"q":"Reading aloud helps you catch…","choices":["run-ons and awkward spots","your topic"],"a":0,"explain":"Your ear catches what your eye misses."}],"task":{"prompt":"Write a short paragraph, then edit it: fix any run-ons, add needed commas, and check spelling. Submit the edited version.","minWords":55,"checklist":["Clean grammar","Correct punctuation"]}},{"id":"w3-5","module":2,"moduleName":"The Paragraph","week":3,"day":5,"title":"Project: a polished Stage II paragraph","goal":"I can produce a fully polished, well-organized paragraph.","idea":"Combine the whole module: a focused topic sentence, subtopic sentences grouping specific support, full unity and coherence, then revised and edited. This is your paragraph showcase.","model":"A clean Stage II paragraph reads smoothly, proves its point, and contains no errors — small but complete.","practice":[{"q":"A polished paragraph has…","choices":["structure, support, unity, coherence, and clean editing","just correct spelling"],"a":0,"explain":"All the pieces together."},{"q":"The final step before submitting is…","choices":["editing","prewriting"],"a":0,"explain":"Edit last."}],"task":{"prompt":"Write a polished Stage II paragraph (7-9 sentences) on a topic you care about: topic sentence, 2 subtopics with specific support, transitions, revised and edited.","minWords":90,"checklist":["Topic + 2 subtopics","Specific support","Transitions","Edited clean"]}},{"id":"w4-1","module":3,"moduleName":"The Essay","week":4,"day":1,"title":"From paragraph to essay","goal":"I can see how a paragraph grows into a five-paragraph essay.","idea":"The five-paragraph essay is the paragraph model, scaled up. The topic sentence becomes the thesis (in the introduction). Each support becomes its own body paragraph. The restatement becomes the conclusion. Same shape, more room.","model":"Paragraph: topic + 3 supports + restatement. Essay: intro (thesis) + 3 body paragraphs + conclusion.","practice":[{"q":"In an essay, each support becomes…","choices":["its own body paragraph","one word"],"a":0,"explain":"Each point gets a full paragraph."},{"q":"The thesis is like the paragraph's…","choices":["topic sentence","last word"],"a":0,"explain":"It states the essay's main point."}],"task":{"prompt":"Outline a five-paragraph essay: write your thesis and a one-line summary of each of the three body paragraphs.","minWords":50,"checklist":["Thesis","3 body points"]}},{"id":"w4-2","module":3,"moduleName":"The Essay","week":4,"day":2,"title":"The thesis statement","goal":"I can write a clear thesis that states my essay's main point.","idea":"The thesis is the single sentence that tells readers what your whole essay will argue. It should be specific and arguable — not a fact, not a question. Everything in the essay must support it.","model":"Weak: 'This essay is about pollution.' Strong: 'Cities can cut air pollution by investing in public transport, bike lanes, and green spaces.'","practice":[{"q":"A thesis should be…","choices":["a question","a specific, arguable claim"],"a":1,"explain":"It states your position."},{"q":"Which is the stronger thesis?","choices":["Exercise is good.","Three habits — sleep, diet, and exercise — most improve student focus."],"a":1,"explain":"Specific and arguable."}],"task":{"prompt":"Write a strong thesis for a topic you choose. Make it specific and arguable.","minWords":40,"checklist":["Specific","Arguable"]}},{"id":"w4-3","module":3,"moduleName":"The Essay","week":4,"day":3,"title":"Thesis with a blueprint","goal":"I can write a thesis that previews my main points.","idea":"A 'blueprint' thesis names the points the essay will cover, in order. This tells readers exactly what to expect and gives your essay an automatic structure: one body paragraph per blueprint item.","model":"'Remote work benefits companies by cutting costs, widening the talent pool, and boosting morale.' — three points = three body paragraphs.","practice":[{"q":"A blueprint thesis…","choices":["previews the main points in order","hides the points"],"a":0,"explain":"It maps the essay."},{"q":"A three-point blueprint suggests…","choices":["three body paragraphs","one paragraph"],"a":0,"explain":"One paragraph per point."}],"task":{"prompt":"Rewrite your thesis from yesterday as a blueprint thesis that names three points in order.","minWords":40,"checklist":["Names 3 points","In order"]}},{"id":"w4-4","module":3,"moduleName":"The Essay","week":4,"day":4,"title":"Layout: mapping ideas to paragraphs","goal":"I can map my blueprint points to organized body paragraphs.","idea":"Each blueprint point becomes a body paragraph with its own mini topic sentence and specific support. Keep the body order the same as the blueprint order so readers can follow. This is the skeleton of your essay.","model":"Blueprint order: cost, talent, morale. Body 1 = cost; Body 2 = talent; Body 3 = morale. Same order, no surprises.","practice":[{"q":"Body paragraph order should…","choices":["match the blueprint order","be random"],"a":0,"explain":"Consistency helps readers."},{"q":"Each body paragraph needs…","choices":["its own topic sentence and support","only a title"],"a":0,"explain":"It's a mini-paragraph."}],"task":{"prompt":"Take your blueprint thesis and write a topic sentence for each of the three body paragraphs.","minWords":50,"checklist":["3 body topic sentences","Match blueprint order"]}},{"id":"w4-5","module":3,"moduleName":"The Essay","week":4,"day":5,"title":"Outline your essay","goal":"I can build a full essay outline before drafting.","idea":"An outline saves time. List the thesis, then each body paragraph's topic sentence with 2-3 supports beneath it, then a note for the introduction and conclusion. With a good outline, drafting is just filling in.","model":"Outline: Thesis → Body1 (topic + 3 supports) → Body2 (...) → Body3 (...) → Intro idea → Conclusion idea.","practice":[{"q":"An outline should come…","choices":["before drafting","after editing"],"a":0,"explain":"Plan first."},{"q":"Under each body topic sentence you list…","choices":["supports","the conclusion"],"a":0,"explain":"Supports for that point."}],"task":{"prompt":"Write a complete outline for your essay: thesis, three body topic sentences each with two supports.","minWords":70,"checklist":["Thesis","3 bodies x 2 supports"]}},{"id":"w5-1","module":3,"moduleName":"The Essay","week":5,"day":1,"title":"Central (body) paragraphs","goal":"I can write a strong body paragraph that proves one point.","idea":"Each body paragraph is a mini one-paragraph essay: a topic sentence stating that point, specific support, and a sentence that ties back to the thesis. Stay unified — one point per paragraph.","model":"Body topic: 'Remote work cuts costs.' Support: less office rent, lower commuting expense, fewer supplies. Tie-back: 'These savings strengthen the company.'","practice":[{"q":"Each body paragraph proves…","choices":["one point","all points at once"],"a":0,"explain":"One point per paragraph."},{"q":"A body paragraph should connect back to…","choices":["the thesis","a new topic"],"a":0,"explain":"Keep it tied to your main claim."}],"task":{"prompt":"Write one full body paragraph from your outline: topic sentence, 2-3 specific supports, and a tie-back to your thesis.","minWords":70,"checklist":["Topic sentence","Specific support","Tie-back to thesis"]}},{"id":"w5-2","module":3,"moduleName":"The Essay","week":5,"day":2,"title":"Transitions between paragraphs","goal":"I can connect paragraphs so the essay flows.","idea":"Between paragraphs, use transition phrases to show movement: 'A second benefit…', 'Beyond cost…', 'Most importantly…'. These bridges keep a long piece feeling connected instead of like separate blocks.","model":"Start of body 2: 'Beyond saving money, remote work widens the talent pool.' The phrase links it to body 1.","practice":[{"q":"Transitions between paragraphs…","choices":["bridge one point to the next","repeat the thesis word for word"],"a":0,"explain":"They show movement between ideas."},{"q":"'Most importantly' signals…","choices":["the strongest point is coming","the end"],"a":0,"explain":"It flags importance."}],"task":{"prompt":"Write opening transition sentences for body paragraphs 2 and 3 of your essay.","minWords":45,"checklist":["2 transition openers","Clearly link points"]}},{"id":"w5-3","module":3,"moduleName":"The Essay","week":5,"day":3,"title":"Introductions","goal":"I can write an introduction with a hook, context, and thesis.","idea":"An introduction does three jobs: grab attention (a hook — a question, surprising fact, or short story), give brief context, and end with the thesis. Move from general to specific, landing on your thesis as the last sentence.","model":"Hook: 'What if your office could be anywhere?' Context: remote work is rising. Thesis (blueprint) closes the paragraph.","practice":[{"q":"The thesis usually appears…","choices":["as the last sentence of the intro","in the middle of body 2"],"a":0,"explain":"Intro funnels down to the thesis."},{"q":"A hook is meant to…","choices":["grab attention","list sources"],"a":0,"explain":"It draws the reader in."}],"task":{"prompt":"Write an introduction for your essay: a hook, one or two context sentences, and your blueprint thesis at the end.","minWords":60,"checklist":["Hook","Context","Thesis last"]}},{"id":"w5-4","module":3,"moduleName":"The Essay","week":5,"day":4,"title":"Conclusions","goal":"I can write a conclusion that restates and broadens.","idea":"A conclusion reminds readers of your thesis (in fresh words), briefly echoes the main points, and ends with a broader thought — why it matters or what to do next. Do not introduce new arguments here.","model":"'Remote work is more than a trend; by saving money, widening talent, and lifting morale, it reshapes how good companies grow.'","practice":[{"q":"A conclusion should…","choices":["add a brand-new argument","restate the point and broaden it"],"a":1,"explain":"No new arguments at the end."},{"q":"Restating the thesis means…","choices":["copying it exactly","saying it in fresh words"],"a":1,"explain":"Reword, don't repeat."}],"task":{"prompt":"Write a conclusion for your essay: reword the thesis, echo the three points, and end with a broader thought.","minWords":55,"checklist":["Reworded thesis","Echoes points","Broader closing"]}},{"id":"w5-5","module":3,"moduleName":"The Essay","week":5,"day":5,"title":"Draft the full essay","goal":"I can assemble a complete five-paragraph essay draft.","idea":"Now put the pieces together: introduction, three body paragraphs, conclusion. Draft it in one sitting using your outline. Don't aim for perfect — aim for complete. You'll revise next week.","model":"A finished draft has all five paragraphs in order, each doing its job, connected by transitions.","practice":[{"q":"A first draft should be…","choices":["complete, not perfect","perfect on the first try"],"a":0,"explain":"Get it all down, then improve."},{"q":"The five paragraphs are…","choices":["intro, 3 bodies, conclusion","five conclusions"],"a":0,"explain":"Standard essay shape."}],"task":{"prompt":"Write a complete five-paragraph essay draft from your outline (intro, 3 bodies, conclusion).","minWords":180,"checklist":["5 paragraphs","Intro with thesis","3 bodies","Conclusion"]}},{"id":"w6-1","module":3,"moduleName":"The Essay","week":6,"day":1,"title":"Revising the essay","goal":"I can revise my essay for structure and support.","idea":"Re-read your whole draft as a reader. Does the intro lead to a clear thesis? Does each body prove one blueprint point with specific support? Is anything off-topic? Strengthen weak support and fix the structure before touching grammar.","model":"A writer notices body 2 drifted off-topic and rewrites its topic sentence to match the blueprint.","practice":[{"q":"When revising the whole essay, check first that…","choices":["each paragraph supports the thesis","commas are perfect"],"a":0,"explain":"Structure before polish."},{"q":"Off-topic sentences should be…","choices":["cut or fixed","kept"],"a":0,"explain":"Protect unity."}],"task":{"prompt":"Revise your essay draft: improve the thesis or one body paragraph, and remove anything off-topic. Describe what you changed in one sentence.","minWords":80,"checklist":["Made a real revision","Notes the change"]}},{"id":"w6-2","module":3,"moduleName":"The Essay","week":6,"day":2,"title":"Editing the essay","goal":"I can edit my essay at sentence level.","idea":"With structure solid, polish sentences: fix run-ons and fragments, vary sentence length, replace vague words, and check subject-verb agreement. Read aloud to catch awkward spots.","model":"Before: 'The plan it was good and helped alot.' After: 'The plan was good, and it helped a lot.'","practice":[{"q":"Editing happens…","choices":["after revising structure","before outlining"],"a":0,"explain":"Polish last."},{"q":"'alot' should be…","choices":["'a lot'","left as is"],"a":0,"explain":"Common spelling fix."}],"task":{"prompt":"Edit one body paragraph of your essay for grammar, punctuation, and word choice. Submit the cleaned version.","minWords":70,"checklist":["Clean grammar","Better word choice"]}},{"id":"w6-3","module":3,"moduleName":"The Essay","week":6,"day":3,"title":"Peer & teacher feedback","goal":"I can use feedback to improve my essay.","idea":"Feedback shows you what a real reader experiences. When you get notes, look for patterns: if a reader was confused at the same spot, fix the structure there. Be specific when giving feedback to others — point to the exact sentence.","model":"Useful feedback: 'Your body 3 topic sentence doesn't match the blueprint.' Vague feedback: 'It's good.'","practice":[{"q":"Useful feedback is…","choices":["specific and points to a spot","just 'good job'"],"a":0,"explain":"Specific notes help."},{"q":"If two readers stumble at the same line, you should…","choices":["fix that line","ignore them"],"a":0,"explain":"Patterns reveal real problems."}],"task":{"prompt":"Read your essay as if you were a stranger. Write 3 specific notes to yourself about what to improve.","minWords":50,"checklist":["3 specific notes","Actionable"]}},{"id":"w6-4","module":3,"moduleName":"The Essay","week":6,"day":4,"title":"Final polish","goal":"I can finalize my essay to a clean standard.","idea":"Apply your feedback and do a final read. Check the title, the thesis, paragraph order, transitions, and that the conclusion lands. Then a last edit pass for errors. This is the version you're proud to share.","model":"A polished essay has a clear title, a sharp thesis, smooth transitions, and no obvious errors.","practice":[{"q":"A finished essay should have…","choices":["a title, clear thesis, smooth flow, no errors","at least 10 paragraphs"],"a":0,"explain":"Quality, not just length."},{"q":"The very last pass is for…","choices":["catching errors","writing the thesis"],"a":0,"explain":"Final proofread."}],"task":{"prompt":"Apply your notes and write the final, polished introduction and conclusion of your essay.","minWords":80,"checklist":["Polished intro","Polished conclusion"]}},{"id":"w6-5","module":3,"moduleName":"The Essay","week":6,"day":5,"title":"Project: complete five-paragraph essay","goal":"I can submit a complete, polished five-paragraph essay.","idea":"This is your Module 3 showcase: a full essay with a hook, a blueprint thesis, three unified body paragraphs with specific support, smooth transitions, and a strong conclusion — revised and edited.","model":"Your finished essay should read as one connected argument from first line to last.","practice":[{"q":"Your submitted essay should be…","choices":["revised and edited","a rough first draft"],"a":0,"explain":"Submit your best version."},{"q":"The body paragraphs should follow…","choices":["the blueprint order","no order"],"a":0,"explain":"Match the blueprint."}],"task":{"prompt":"Submit your complete, polished five-paragraph essay (intro with blueprint thesis, 3 body paragraphs, conclusion).","minWords":200,"checklist":["Blueprint thesis","3 unified bodies","Transitions","Strong conclusion"]}},{"id":"w7-1","module":4,"moduleName":"Patterns of Development","week":7,"day":1,"title":"Comparison & contrast","goal":"I can organize an essay that compares two things.","idea":"Comparison shows similarities; contrast shows differences. Organize two ways: point-by-point (alternate between the two subjects on each feature) or block (everything about A, then everything about B). Pick one and stay consistent.","model":"Point-by-point: 'On cost, A is cheaper; on speed, B wins.' Block: a paragraph on A, then a paragraph on B.","practice":[{"q":"Point-by-point organization…","choices":["alternates subjects feature by feature","covers all of A then all of B"],"a":0,"explain":"Alternating each feature."},{"q":"Comparison shows…","choices":["similarities","only differences"],"a":0,"explain":"Contrast shows differences."}],"task":{"prompt":"Write a paragraph comparing two things using point-by-point organization on two features.","minWords":70,"checklist":["Two subjects","Point-by-point","2 features"]}},{"id":"w7-2","module":4,"moduleName":"Patterns of Development","week":7,"day":2,"title":"Cause & effect","goal":"I can explain causes and effects clearly.","idea":"Cause-and-effect writing answers 'why' or 'what happens as a result'. Be careful no
